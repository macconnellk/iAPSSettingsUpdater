<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Insulin Settings Review v3.4.1 - Target BG Schedule (SPEC 6 - Fixed)</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');
        
        :root {
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
        }
        
        body {
            font-family: var(--font-sans);
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
        }
        
        .font-mono { font-family: var(--font-mono); }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .state-badge {
            animation: pulse-glow 2s ease-in-out infinite;
        }
        
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 5px currentColor; }
            50% { box-shadow: 0 0 20px currentColor; }
        }
        
        .protection-locked { color: #ef4444; }
        .protection-protected { color: #f97316; }
        .protection-caution { color: #eab308; }
        .protection-clear { color: #22c55e; }
        
        .tier-1 { border-left-color: #ef4444; }
        .tier-2 { border-left-color: #f97316; }
        .tier-3 { border-left-color: #3b82f6; }
        .tier-4 { border-left-color: #22c55e; }
        
        .scroll-fade {
            mask-image: linear-gradient(to bottom, black 90%, transparent 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useRef, useEffect, useMemo, useCallback } = React;

        // =========================================================================
        // ENUMS AND CONSTANTS
        // =========================================================================
        
        const BodyStateType = {
            STABLE: 'stable',
            TRANSIENT_RESISTANCE: 'transient_resistance',
            TRANSIENT_SENSITIVITY: 'transient_sensitivity',
            RECOVERY: 'recovery',
            OVERRIDE_ACTIVE: 'override_active',
            HIGH_VARIABILITY: 'high_variability'
        };
        
        const FindingType = {
            DIRECT_MEAL_LOW: 'direct_meal_low',
            // TRANSIENT_HIGH_CRASH removed -- dead code, no detector produced this type
            TRANSIENT_HIGH_LOW: 'transient_high_low', // Meal â†’ Brief spike â†’ Crash (no corrections) -- Detector 1b
            ISF_INDUCED_LOW: 'isf_induced_low',
            UNEXPLAINED_LOW: 'unexplained_low',
            RESISTANT_LOW: 'resistant_low', // Low with IOB<0.2 -- not insulin-caused; Detector 5 Path A
            POST_MEAL_HIGH: 'post_meal_high',
            CORRECTION_INEFFECTIVE: 'correction_ineffective',
            // FASTING_DRIFT_HIGH removed -- dead code, no detector produced this type
            BASAL_SIGNAL_HIGH: 'basal_signal_high',
            BASAL_SIGNAL_LOW: 'basal_signal_low',
            BASAL_RATIO_EXCEEDED: 'basal_ratio_exceeded',
            REBOUND_HIGH: 'rebound_high'
        };
        
        const ProtectionLevel = {
            CLEAR: 'clear',
            CAUTION: 'caution',
            PROTECTED: 'protected',
            LOCKED: 'locked'
        };
        
        const OutcomeType = {
            PENDING: 'pending',
            EFFECTIVE: 'effective',
            CAUSED_LOW: 'caused_low',
            CAUSED_HIGH: 'caused_high',
            REVERTED: 'reverted',
            INDETERMINATE: 'indeterminate'
        };
        
        const Tier = {
            SAFETY: 1,
            FOUNDATIONAL: 2,
            SIGNIFICANT_BASAL: 3,
            ROUTINE: 4
        };
        
        const STATE_DESCRIPTIONS = {
            [BodyStateType.STABLE]: "Normal operation. Full optimization enabled.",
            [BodyStateType.TRANSIENT_RESISTANCE]: "Transient resistance detected (possible growth spurt, illness, or stress). All signals trending high. Recommend temporary profile override rather than permanent parameter changes.",
            [BodyStateType.TRANSIENT_SENSITIVITY]: "Transient sensitivity detected (possible end of growth spurt or illness recovery). All signals trending low. Watch for hypoglycemia and consider reducing any active overrides.",
            [BodyStateType.RECOVERY]: "Recovery period (recent state change or override adjustment). Using elevated confidence thresholds. Only high-certainty recommendations shown.",
            [BodyStateType.OVERRIDE_ACTIVE]: "Profile override active. All recommendations are informational only. Do not make permanent parameter changes during override.",
            [BodyStateType.HIGH_VARIABILITY]: "High variability detected. Conflicting signals in multiple time windows. Recommend holding changes until patterns stabilize."
        };
        
        const CONFIG = {
            // Thresholds
            lowThreshold: 70,
            highThreshold: 180,
            targetBG: 110,
            
            // URGENCY thresholds - severe events that warrant immediate action
            urgentLowThreshold: 55,      // Severe low - always address
            urgentHighThreshold: 250,    // Severe high - address if extended
            urgentHighDurationHours: 3,  // How long high must persist
            
            // Adjustment limits
            maxCRChangeHigh: 0.03,
            maxCRChangeLow: 0.075,
            maxISFStrengthen: 0.03,
            
            // Basal constraints
            basalRatioCap: 2.5,
            pumpIncrement: 0.05,
            
            // State detection
            transientDirectionThreshold: 0.8,
            transientTDDVelocity: 0.10,
            recoveryDays: 3,
            
            // Compound effect
            compoundWarnStrengthenConcentrated: 0.05,
            compoundWarnStrengthenSpread: 0.08,
            compoundWarnWeaken: 0.10,
            compoundBlockStrengthen: 0.10,
            
            // Minimum carb threshold - meals below this are not substantial enough to cause lows
            minMealCarbsForAttribution: 10,
            
            // Confidence
            minEventsHighConfidence: 5,
            minEventsMediumConfidence: 3,
            minConfidenceRecoveryState: 0.9,
            
            // Protection
            changeLockoutDays: 3,
            resistantLowLookbackDays: 7,
            oscillationLookbackDays: 14
        };
        
        // Helper to get local date in YYYY-MM-DD format
        // Using toISOString().split('T')[0] returns UTC date, which can be wrong near midnight
        // This returns the LOCAL date which is what users expect
        const getLocalDateString = (date = new Date()) => {
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };
        
        const CIRCADIAN_PERIODS = [
            { name: 'Deep Sleep', emoji: '🌙', startHour: 0, endHour: 4, description: 'GH peaks, lowest cortisol' },
            { name: 'Dawn', emoji: '🌅', startHour: 4, endHour: 8, description: 'Cortisol surge (dawn phenomenon)' },
            { name: 'Morning', emoji: '☀️', startHour: 8, endHour: 12, description: 'Peak insulin sensitivity' },
            { name: 'Afternoon', emoji: '🌤️', startHour: 12, endHour: 17, description: 'Stable, declining sensitivity' },
            { name: 'Evening', emoji: '🌆', startHour: 17, endHour: 21, description: 'Melatonin onset, insulin nadir' },
            { name: 'Sleep Onset', emoji: '😴', startHour: 21, endHour: 24, description: 'High melatonin, lowest insulin' }
        ];
        
        // Independent time blocks for multi-action support
        // Changes in different blocks don't compound with each other
        const TIME_BLOCKS = [
            { name: 'Overnight', startHour: 0, endHour: 6 },
            { name: 'Morning', startHour: 6, endHour: 12 },
            { name: 'Afternoon', startHour: 12, endHour: 18 },
            { name: 'Evening', startHour: 18, endHour: 24 }
        ];
        
        // Helper to get time block for a schedule time
        const getTimeBlock = (scheduleTime) => {
            if (!scheduleTime || scheduleTime === 'Multiple' || scheduleTime === 'All') return 'General';
            const hour = parseInt(scheduleTime.split(':')[0]);
            if (isNaN(hour)) return 'General';
            const block = TIME_BLOCKS.find(b => hour >= b.startHour && hour < b.endHour);
            return block ? block.name : 'General';
        };

        // =========================================================================
        // CHANGE TRACKER MODULE
        // =========================================================================
        
        const ChangeTracker = {
            STORAGE_KEY: 'insulin_review_change_history',
            
            getHistory() {
                try {
                    const stored = localStorage.getItem(this.STORAGE_KEY);
                    return stored ? JSON.parse(stored) : { changes: [], overrides: [] };
                } catch (e) {
                    console.error('Failed to load change history:', e);
                    return { changes: [], overrides: [] };
                }
            },
            
            saveHistory(history) {
                try {
                    localStorage.setItem(this.STORAGE_KEY, JSON.stringify(history));
                } catch (e) {
                    console.error('Failed to save change history:', e);
                }
            },
            
            logChange(change) {
                const history = this.getHistory();
                const newChange = {
                    id: `change_${Date.now()}`,
                    date: getLocalDateString(),
                    timestamp: new Date().toISOString(),
                    ...change,
                    outcome: OutcomeType.PENDING,
                    outcomeDate: null,
                    outcomeNotes: null
                };
                history.changes.push(newChange);
                this.saveHistory(history);
                return newChange;
            },
            
            logOverride(override) {
                const history = this.getHistory();
                const newOverride = {
                    id: `override_${Date.now()}`,
                    date: getLocalDateString(),
                    timestamp: new Date().toISOString(),
                    ...override
                };
                history.overrides.push(newOverride);
                this.saveHistory(history);
                return newOverride;
            },
            
            logOutcome(changeId, outcome, notes = null) {
                const history = this.getHistory();
                const change = history.changes.find(c => c.id === changeId);
                if (change) {
                    change.outcome = outcome;
                    change.outcomeDate = getLocalDateString();
                    change.outcomeNotes = notes;
                    this.saveHistory(history);
                }
            },
            
            getRecentChanges(days = 7) {
                const history = this.getHistory();
                const cutoff = new Date();
                cutoff.setDate(cutoff.getDate() - days);
                return history.changes.filter(c => new Date(c.date) >= cutoff);
            },
            
            getChangesForSlot(param, scheduleTime) {
                const history = this.getHistory();
                return history.changes.filter(c => 
                    c.param === param && c.scheduleTime === scheduleTime
                );
            },
            
            getActiveOverride() {
                const history = this.getHistory();
                const recent = history.overrides.filter(o => {
                    if (o.endDate) return false;
                    return true;
                });
                return recent.length > 0 ? recent[recent.length - 1] : null;
            },
            
            endOverride(overrideId) {
                const history = this.getHistory();
                const override = history.overrides.find(o => o.id === overrideId);
                if (override) {
                    override.endDate = getLocalDateString();
                    this.saveHistory(history);
                }
            },
            
            daysSinceChange(param, scheduleTime) {
                const changes = this.getChangesForSlot(param, scheduleTime);
                if (changes.length === 0) return null;
                
                const lastChange = changes[changes.length - 1];
                const lastDate = new Date(lastChange.date);
                const today = new Date();
                const diffTime = today - lastDate;
                return Math.floor(diffTime / (1000 * 60 * 60 * 24));
            },
            
            getParameterVelocity(param, scheduleTime) {
                const changes = this.getChangesForSlot(param, scheduleTime);
                const lookback = CONFIG.oscillationLookbackDays;
                const cutoff = new Date();
                cutoff.setDate(cutoff.getDate() - lookback);
                
                const recentChanges = changes.filter(c => new Date(c.date) >= cutoff);
                
                if (recentChanges.length === 0) {
                    return {
                        param,
                        scheduleTime,
                        changesInPeriod: 0,
                        netChangePercent: 0,
                        consecutiveSameDirection: 0,
                        oscillationDetected: false,
                        history: []
                    };
                }
                
                // Calculate net change
                const netChangePercent = recentChanges.reduce((sum, c) => sum + (c.changePercent || 0), 0);
                
                // Detect oscillation (direction changes)
                let directionChanges = 0;
                let consecutiveSameDirection = 1;
                let lastDirection = null;
                
                for (const change of recentChanges) {
                    const direction = (change.changePercent || 0) > 0 ? 'up' : 'down';
                    if (lastDirection && direction !== lastDirection) {
                        directionChanges++;
                        consecutiveSameDirection = 1;
                    } else if (lastDirection === direction) {
                        consecutiveSameDirection++;
                    }
                    lastDirection = direction;
                }
                
                // Oscillation = 2+ direction changes in 7 days
                const weekCutoff = new Date();
                weekCutoff.setDate(weekCutoff.getDate() - 7);
                const weekChanges = recentChanges.filter(c => new Date(c.date) >= weekCutoff);
                
                let weekDirectionChanges = 0;
                lastDirection = null;
                for (const change of weekChanges) {
                    const direction = (change.changePercent || 0) > 0 ? 'up' : 'down';
                    if (lastDirection && direction !== lastDirection) {
                        weekDirectionChanges++;
                    }
                    lastDirection = direction;
                }
                
                return {
                    param,
                    scheduleTime,
                    changesInPeriod: recentChanges.length,
                    netChangePercent,
                    consecutiveSameDirection,
                    oscillationDetected: weekDirectionChanges >= 2,
                    history: recentChanges.map(c => [c.date, c.newValue])
                };
            },
            
            detectOscillation(param, scheduleTime) {
                const velocity = this.getParameterVelocity(param, scheduleTime);
                return velocity.oscillationDetected;
            },
            
            clearHistory() {
                localStorage.removeItem(this.STORAGE_KEY);
            }
        };

        // =========================================================================
        // STATE DETECTION MODULE
        // =========================================================================
        
        const StateDetector = {
            detect(signalAnalysis, tddHistory, changeHistory, userOverride = null) {
                // Check for user-declared override first
                if (userOverride && userOverride.active) {
                    return {
                        state: BodyStateType.OVERRIDE_ACTIVE,
                        confidence: 1.0,
                        daysInState: this.calculateOverrideDays(userOverride),
                        overridePercent: userOverride.percent, // BUG-017: Store override % for display
                        contributingFactors: [`Profile override ${userOverride.percent}% active`],
                        recommendedOverride: null
                    };
                }
                
                // Check for recent override removal (recovery)
                const recentOverrideEnd = this.checkRecentOverrideEnd(changeHistory);
                if (recentOverrideEnd) {
                    return {
                        state: BodyStateType.RECOVERY,
                        confidence: 0.9,
                        daysInState: recentOverrideEnd.daysSince,
                        contributingFactors: [`Override removed ${recentOverrideEnd.daysSince} days ago`],
                        recommendedOverride: null
                    };
                }
                
                // Check for many recent changes (recovery)
                const recentChanges = ChangeTracker.getRecentChanges(CONFIG.recoveryDays);
                if (recentChanges.length >= 3) {
                    return {
                        state: BodyStateType.RECOVERY,
                        confidence: 0.85,
                        daysInState: 1,
                        contributingFactors: [`${recentChanges.length} parameter changes in last ${CONFIG.recoveryDays} days`],
                        recommendedOverride: null
                    };
                }
                
                // Analyze signal directions
                if (signalAnalysis && signalAnalysis.periods) {
                    const signals = signalAnalysis.periods.filter(p => p.hasSufficientData);
                    if (signals.length >= 3) {
                        const directions = signals.map(p => {
                            if (p.medianDeviation > 10) return 'HIGH';
                            if (p.medianDeviation < -10) return 'LOW';
                            return 'NEUTRAL';
                        });
                        
                        const highCount = directions.filter(d => d === 'HIGH').length;
                        const lowCount = directions.filter(d => d === 'LOW').length;
                        const directionConsistency = Math.max(highCount, lowCount) / signals.length;
                        
                        // Check TDD velocity if available
                        const tddVelocity = this.calculateTDDVelocity(tddHistory);
                        
                        // Transient resistance
                        if (directionConsistency >= CONFIG.transientDirectionThreshold && 
                            highCount > lowCount &&
                            tddVelocity > CONFIG.transientTDDVelocity) {
                            return {
                                state: BodyStateType.TRANSIENT_RESISTANCE,
                                confidence: Math.min(directionConsistency, 0.95),
                                daysInState: this.estimateTransientDays(tddHistory, 'resistance'),
                                contributingFactors: [
                                    `${highCount}/${signals.length} periods trending HIGH`,
                                    `TDD velocity +${(tddVelocity * 100).toFixed(0)}% over 3 days`
                                ],
                                recommendedOverride: this.calculateRecommendedOverride(tddVelocity)
                            };
                        }
                        
                        // Transient sensitivity
                        if (directionConsistency >= CONFIG.transientDirectionThreshold && 
                            lowCount > highCount &&
                            tddVelocity < -CONFIG.transientTDDVelocity) {
                            return {
                                state: BodyStateType.TRANSIENT_SENSITIVITY,
                                confidence: Math.min(directionConsistency, 0.95),
                                daysInState: this.estimateTransientDays(tddHistory, 'sensitivity'),
                                contributingFactors: [
                                    `${lowCount}/${signals.length} periods trending LOW`,
                                    `TDD velocity ${(tddVelocity * 100).toFixed(0)}% over 3 days`
                                ],
                                recommendedOverride: Math.round(100 + (tddVelocity * 100))
                            };
                        }
                        
                        // High variability (conflicting signals)
                        if (highCount >= 2 && lowCount >= 2) {
                            return {
                                state: BodyStateType.HIGH_VARIABILITY,
                                confidence: 0.8,
                                daysInState: 1,
                                contributingFactors: [
                                    `${highCount} HIGH signals and ${lowCount} LOW signals`,
                                    'Conflicting patterns across time windows'
                                ],
                                recommendedOverride: null
                            };
                        }
                    }
                }
                
                // Default to stable
                return {
                    state: BodyStateType.STABLE,
                    confidence: 0.9,
                    daysInState: this.estimateStableDays(changeHistory),
                    contributingFactors: ['Normal operation'],
                    recommendedOverride: null
                };
            },
            
            calculateOverrideDays(override) {
                if (!override || !override.startDate) return 0;
                const start = new Date(override.startDate);
                const today = new Date();
                return Math.floor((today - start) / (1000 * 60 * 60 * 24));
            },
            
            checkRecentOverrideEnd(changeHistory) {
                const history = ChangeTracker.getHistory();
                const recentOverrides = history.overrides.filter(o => o.endDate);
                if (recentOverrides.length === 0) return null;
                
                const lastEnded = recentOverrides[recentOverrides.length - 1];
                const endDate = new Date(lastEnded.endDate);
                const today = new Date();
                const daysSince = Math.floor((today - endDate) / (1000 * 60 * 60 * 24));
                
                if (daysSince <= CONFIG.recoveryDays) {
                    return { daysSince, override: lastEnded };
                }
                return null;
            },
            
            calculateTDDVelocity(tddHistory) {
                if (!tddHistory || tddHistory.length < 4) return 0;
                
                // Compare last 3 days average to previous 3 days
                const recent = tddHistory.slice(-3);
                const previous = tddHistory.slice(-6, -3);
                
                if (previous.length === 0) return 0;
                
                const recentAvg = recent.reduce((a, b) => a + b.tdd, 0) / recent.length;
                const previousAvg = previous.reduce((a, b) => a + b.tdd, 0) / previous.length;
                
                return (recentAvg - previousAvg) / previousAvg;
            },
            
            calculateRecommendedOverride(tddVelocity) {
                // Suggest override based on TDD velocity
                if (tddVelocity > 0.20) return 120;
                if (tddVelocity > 0.15) return 115;
                if (tddVelocity > 0.10) return 110;
                return 105;
            },
            
            estimateTransientDays(tddHistory, type) {
                if (!tddHistory || tddHistory.length < 2) return 1;
                
                // Simple estimate: count consecutive days with elevated/reduced TDD
                let days = 0;
                const threshold = type === 'resistance' ? 1.05 : 0.95;
                const baseline = tddHistory.length >= 7 
                    ? tddHistory.slice(0, -3).reduce((a, b) => a + b.tdd, 0) / (tddHistory.length - 3)
                    : tddHistory[0].tdd;
                
                for (let i = tddHistory.length - 1; i >= 0; i--) {
                    const ratio = tddHistory[i].tdd / baseline;
                    if (type === 'resistance' && ratio >= threshold) {
                        days++;
                    } else if (type === 'sensitivity' && ratio <= threshold) {
                        days++;
                    } else {
                        break;
                    }
                }
                
                return Math.max(1, days);
            },
            
            estimateStableDays(changeHistory) {
                const recentChanges = ChangeTracker.getRecentChanges(30);
                if (recentChanges.length === 0) return 30;
                
                const lastChange = recentChanges[recentChanges.length - 1];
                const lastDate = new Date(lastChange.date);
                const today = new Date();
                return Math.floor((today - lastDate) / (1000 * 60 * 60 * 24));
            }
        };

        // =========================================================================
        // PROTECTION LEVEL SYSTEM
        // =========================================================================
        
        const ProtectionSystem = {
            assignProtection(scheduleTime, param, period, findings, signalAnalysis) {
                // Recent change lock
                const daysSince = ChangeTracker.daysSinceChange(param, scheduleTime);
                if (daysSince !== null && daysSince < CONFIG.changeLockoutDays) {
                    return {
                        level: ProtectionLevel.LOCKED,
                        reason: `Changed ${daysSince} day(s) ago (${CONFIG.changeLockoutDays}-day lockout)`
                    };
                }
                
                // Resistant low protection
                const resistantLows = findings.filter(f => 
                    f.type === FindingType.RESISTANT_LOW &&
                    this.isPeriodMatch(f.period, period)
                );
                if (resistantLows.length > 0) {
                    return {
                        level: ProtectionLevel.PROTECTED,
                        reason: 'Resistant lows detected in this period'
                    };
                }
                
                // Adjacent period resistant low
                const adjacentPeriods = this.getAdjacentPeriods(period);
                const adjacentResistantLows = findings.filter(f =>
                    f.type === FindingType.RESISTANT_LOW &&
                    adjacentPeriods.some(ap => this.isPeriodMatch(f.period, ap))
                );
                if (adjacentResistantLows.length > 0) {
                    return {
                        level: ProtectionLevel.CAUTION,
                        reason: 'Resistant lows in adjacent period'
                    };
                }
                
                // Oscillation protection
                const oscillating = ChangeTracker.detectOscillation(param, scheduleTime);
                if (oscillating) {
                    return {
                        level: ProtectionLevel.CAUTION,
                        reason: 'Parameter has been oscillating'
                    };
                }
                
                return {
                    level: ProtectionLevel.CLEAR,
                    reason: null
                };
            },
            
            isPeriodMatch(findingPeriod, targetPeriod) {
                if (!findingPeriod || !targetPeriod) return false;
                return findingPeriod.toLowerCase() === targetPeriod.toLowerCase();
            },
            
            getAdjacentPeriods(period) {
                const periodOrder = ['Deep Sleep', 'Dawn', 'Morning', 'Afternoon', 'Evening', 'Sleep Onset'];
                const idx = periodOrder.findIndex(p => p.toLowerCase() === period.toLowerCase());
                if (idx === -1) return [];
                
                const adjacent = [];
                if (idx > 0) adjacent.push(periodOrder[idx - 1]);
                if (idx < periodOrder.length - 1) adjacent.push(periodOrder[idx + 1]);
                return adjacent;
            },
            
            getProtectionIcon(level) {
                switch (level) {
                    case ProtectionLevel.LOCKED: return "[LOCKED]";
                    case ProtectionLevel.PROTECTED: return "[PROTECTED]";
                    case ProtectionLevel.CAUTION: return "[CAUTION]";
                    case ProtectionLevel.CLEAR: return "[CLEAR]";
                    default: return "[NONE]";
                }
            }
        };

        // =========================================================================
        // RECOMMENDATION ENGINE
        // =========================================================================
        
        const RecommendationEngine = {
            process(findings, bodyState, signalAnalysis, schedules, basalRatioInfo = null) {
                // Step 0: Detect same-slot conflicts before filtering (BUG-008)
                const { validFindings, slotConflicts } = this.detectSlotConflicts(findings);
                
                // Step 1: Filter findings based on state
                let filteredFindings = this.filterByState(validFindings, bodyState);
                
                // Step 2: Score findings
                const scoredFindings = filteredFindings.map(f => ({
                    ...f,
                    calculatedConfidence: this.calculateConfidence(f, bodyState)
                }));
                
                // Step 3: Group into bundles (pass basalRatioInfo for ratio protection)
                const bundles = this.createBundles(scoredFindings, schedules, bodyState, signalAnalysis, basalRatioInfo);
                
                // Step 3b: Add conflict bundles if any
                slotConflicts.forEach(conflict => {
                    bundles.push({
                        id: `conflict_${conflict.slot}`,
                        name: `âš ï¸ Conflict: ${conflict.slot}`,
                        tier: Tier.ROUTINE, // Low priority since conflicted
                        priority: 'REFERENCE',
                        recommendations: [],
                        compoundEffect: null,
                        rootCause: 'Conflicting findings at same schedule slot',
                        evidenceSummary: `Both strengthening (${conflict.strengthenCount}) and weakening (${conflict.weakenCount}) patterns detected`,
                        evidenceDetails: [
                            { icon: 'UP', detail: `Strengthen: ${conflict.strengthenTypes}`, type: 'conflict' },
                            { icon: 'DOWN', detail: `Weaken: ${conflict.weakenTypes}`, type: 'conflict' }
                        ],
                        conflictsWith: [],
                        blockedBy: `High variability - ${conflict.details}. Hold changes until patterns stabilize.`,

            detectSlotConflicts(findings) {
                // Group by schedule slot (parameter + time)
                const bySlot = {};
                findings.forEach(f => {
                    if (!f.primaryParameter || !f.scheduleTime) return;
                    const key = `${f.primaryParameter} @ ${f.scheduleTime}`;
                    if (!bySlot[key]) bySlot[key] = [];
                    bySlot[key].push(f);
                });
                
                const validFindings = [];
                const slotConflicts = [];
                
                Object.entries(bySlot).forEach(([slot, slotFindings]) => {
                    const strengthenFindings = slotFindings.filter(f => this.isStrengthening(f));
                    const weakenFindings = slotFindings.filter(f => !this.isStrengthening(f));
                    
                    if (strengthenFindings.length > 0 && weakenFindings.length > 0) {
                        // Conflict detected
                        slotConflicts.push({
                            slot: slot,
                            strengthenCount: strengthenFindings.length,
                            weakenCount: weakenFindings.length,
                            strengthenTypes: strengthenFindings.map(f => f.type).join(', '),
                            weakenTypes: weakenFindings.map(f => f.type).join(', '),
                            details: `Strengthen: ${strengthenFindings.map(f => f.type).join(', ')} vs Weaken: ${weakenFindings.map(f => f.type).join(', ')}`
                        });
                        // Don't add these to valid findings
                    } else {
                        validFindings.push(...slotFindings);
                    }
                });
                
                // Add findings without slots
                findings.forEach(f => {
                    if (!f.primaryParameter || !f.scheduleTime) {
                        validFindings.push(f);
                    }
                });
                
                return { validFindings, slotConflicts };

            filterByState(findings, bodyState) {
                switch (bodyState.state) {
                    case BodyStateType.TRANSIENT_RESISTANCE:
                        // Filter out all strengthening
                        return findings.filter(f => !this.isStrengthening(f));
                        
                    case BodyStateType.TRANSIENT_SENSITIVITY:
                        // Filter out all weakening
                        return findings.filter(f => this.isStrengthening(f) || f.type === FindingType.REBOUND_HIGH);
                        
                    case BodyStateType.OVERRIDE_ACTIVE:
                        // Keep all for informational purposes but mark them
                        return findings.map(f => ({ ...f, informationalOnly: true }));
                        
                    case BodyStateType.RECOVERY:
                        // Only high confidence findings
                        return findings.filter(f => f.severity >= CONFIG.minConfidenceRecoveryState);
                        
                    case BodyStateType.HIGH_VARIABILITY:
                        // Filter conflicting slots
                        return this.filterConflictingSlots(findings);
                        
                    case BodyStateType.STABLE:
                    default:
                        return findings;
                }

            isStrengthening(finding) {
                // Strengthening = more insulin
                const strengthenTypes = [
                    FindingType.POST_MEAL_HIGH,
                    FindingType.CORRECTION_INEFFECTIVE,
                    // FASTING_DRIFT_HIGH removed -- dead code
                    FindingType.BASAL_SIGNAL_HIGH
                ];
                return strengthenTypes.includes(finding.type);

            filterConflictingSlots(findings) {
                // Group by schedule time
                const bySlot = {};
                findings.forEach(f => {
                    const key = `${f.primaryParameter}_${f.scheduleTime}`;
                    if (!bySlot[key]) bySlot[key] = [];
                    bySlot[key].push(f);
                });
                
                // Remove slots with conflicting directions
                const validFindings = [];
                Object.values(bySlot).forEach(slotFindings => {
                    const hasStrengthen = slotFindings.some(f => this.isStrengthening(f));
                    const hasWeaken = slotFindings.some(f => !this.isStrengthening(f));
                    
                    if (hasStrengthen && hasWeaken) {

                        return;
                    }
                    validFindings.push(...slotFindings);

                return validFindings;

            calculateConfidence(finding, bodyState) {
                let base = finding.severity || 0.5;
                
                // Structural findings (basal signals, ratio warnings) skip recency penalties
                if (finding.isStructural) {
                    // Apply only state factor for structural findings
                    const stateMultipliers = {
                        [BodyStateType.STABLE]: 1.0,
                        [BodyStateType.RECOVERY]: 0.85,
                        [BodyStateType.HIGH_VARIABILITY]: 0.7,
                        [BodyStateType.TRANSIENT_RESISTANCE]: 0.9,
                        [BodyStateType.TRANSIENT_SENSITIVITY]: 0.9,
                        [BodyStateType.OVERRIDE_ACTIVE]: 0.85
                    };
                    base *= stateMultipliers[bodyState.state] || 1.0;
                    return Math.min(base, 1.0);
                }
                
                // RECENCY FACTOR - New tier-based system (BUG-022)
                // CURRENT (last 24h): full weight
                // RECENT (1-3 days): 50% weight
                // STALE (3-7 days): 20% weight
                // EXPIRED (>7 days): effectively 0
                const recencyTier = finding.recencyTier || 'UNKNOWN';
                const recencyMultipliers = {
                    'CURRENT': 1.0,    // Full priority
                    'RECENT': 0.5,     // Include but defer to CURRENT
                    'STALE': 0.2,      // Background context only
                    'EXPIRED': 0.05,   // Essentially ignore
                    'UNKNOWN': 0.5     // Fallback
                };
                base *= recencyMultipliers[recencyTier] || 0.5;
                
                // Bonus for having recent events even if older events exist
                if (finding.eventsLast24h > 0) {
                    // Recent activity confirms pattern - boost confidence
                    base *= 1.2;
                } else if (finding.eventsLast3Days > 0) {
                    // Somewhat recent - minor boost
                    base *= 1.0;
                } else {
                    // No recent events - this pattern may have resolved
                    base *= 0.5;
                }
                
                // Sample size factor - weighted toward recent events
                const recentEvents = finding.eventsLast24h || 0;
                const totalEvents = finding.similarEventsCount || 1;
                
                if (recentEvents >= CONFIG.minEventsHighConfidence) {
                    base *= 1.0;  // Multiple recent events = high confidence
                } else if (recentEvents >= 1) {
                    base *= 0.9;  // At least one recent event
                } else if (totalEvents >= CONFIG.minEventsHighConfidence) {
                    base *= 0.6;  // Many old events but none recent
                } else {
                    base *= 0.5;  // Few events, none recent
                }
                
                // Stability factor - only apply if oscillation is truly detected
                if (finding.scheduleTime && finding.primaryParameter) {
                    const velocity = ChangeTracker.getParameterVelocity(
                        finding.primaryParameter, 
                        finding.scheduleTime
                    );
                    if (velocity.oscillationDetected) {
                        base *= 0.6;  // Significant penalty for oscillation
                    }
                }
                
                // State factor
                const stateMultipliers = {
                    [BodyStateType.STABLE]: 1.0,
                    [BodyStateType.RECOVERY]: 0.85,
                    [BodyStateType.HIGH_VARIABILITY]: 0.7,
                    [BodyStateType.TRANSIENT_RESISTANCE]: 0.9,
                    [BodyStateType.TRANSIENT_SENSITIVITY]: 0.9,
                    [BodyStateType.OVERRIDE_ACTIVE]: 0.85
                };
                base *= stateMultipliers[bodyState.state] || 1.0;
                
                return Math.min(base, 1.0);
            },
            
            createBundles(findings, schedules, bodyState, signalAnalysis, basalRatioInfo = null) {
                // Group findings by root cause / time window
                const bundles = [];
                
                // CHANGED: Create INDIVIDUAL bundles for safety findings
                // This prevents compound effect issues and allows picking the best single fix
                const safetyFindings = findings.filter(f => this.isSafetyFinding(f));
                
                safetyFindings.forEach(finding => {
                    // Check for signal conflict
                    const signalConflict = this.checkSignalConflict(finding, signalAnalysis);
                    if (signalConflict) {
                        finding.conflictsWith.push(signalConflict);
                    }
                    
                    const bundle = this.createBundle(
                        `safety_${finding.id}`,
                        this.generateSafetyBundleName(finding),
                        Tier.SAFETY,
                        [finding],
                        schedules,
                        basalRatioInfo
                    );
                    
                    // Add signal conflict warning to bundle if present
                    if (signalConflict) {
                        bundle.signalConflict = signalConflict;
                        bundle.blockedBy = signalConflict;
                    }
                    
                    bundles.push(bundle);
                });
                
                // Group remaining by time window
                const nonSafetyFindings = findings.filter(f => !this.isSafetyFinding(f));
                const byWindow = this.groupByTimeWindow(nonSafetyFindings);
                
                Object.entries(byWindow).forEach(([window, windowFindings]) => {
                    const tier = this.determineTier(windowFindings);
                    const name = this.generateBundleName(windowFindings, window);
                    
                    // Check for signal conflicts in non-safety findings too
                    windowFindings.forEach(f => {
                        const conflict = this.checkSignalConflict(f, signalAnalysis);
                        if (conflict) f.conflictsWith.push(conflict);
                    });
                    
                    bundles.push(this.createBundle(
                        `bundle_${window}`,
                        name,
                        tier,
                        windowFindings,
                        schedules,
                        basalRatioInfo
                    ));
                });
                
                return bundles;
            },
            
            checkSignalConflict(finding, signalAnalysis) {
                if (!signalAnalysis || !signalAnalysis.periods || !finding.scheduleTime) return null;
                
                // Find the period for this finding's schedule time
                const [hours] = finding.scheduleTime.split(':').map(Number);
                const period = CIRCADIAN_PERIODS.find(p => hours >= p.startHour && hours < p.endHour);
                if (!period) return null;
                
                // Find the signal for this period
                const signalPeriod = signalAnalysis.periods.find(p => p.name === period.name);
                if (!signalPeriod || !signalPeriod.hasSufficientData) return null;
                
                const signal = signalPeriod.signal;
                const isWeakening = !this.isStrengthening(finding); // Weakening = reducing insulin
                
                // Conflict: Weakening insulin when signal says HIGH (need MORE insulin)
                if (isWeakening && signal === 'HIGH') {
                    return `Signal conflict: ${period.name} shows HIGH (+${signalPeriod.medianDeviation?.toFixed(1)} mg/dL) but this reduces insulin`;
                }
                
                // Conflict: Strengthening insulin when signal says LOW (need LESS insulin)
                if (!isWeakening && signal === 'LOW') {
                    return `Signal conflict: ${period.name} shows LOW (${signalPeriod.medianDeviation?.toFixed(1)} mg/dL) but this increases insulin`;
                }
                
                return null;
            },
            
            generateSafetyBundleName(finding) {
                const time = finding.scheduleTime || 'Unknown';
                const period = finding.period || '';
                
                // Always include schedule time for uniqueness, add period for context
                switch (finding.type) {
                    case FindingType.DIRECT_MEAL_LOW:
                        return `Safety: ${time} Meal-Induced Low`;
                    case FindingType.TRANSIENT_HIGH_LOW:
                        return `Safety: ${time} Spike & Crash`;
                    case FindingType.ISF_INDUCED_LOW:
                        return `Safety: ${time} Correction-Induced Low`;
                    case FindingType.UNEXPLAINED_LOW:
                        // Include both time and period for clarity
                        return `Safety: ${time} Unexplained Low (${period})`;
                    case FindingType.RESISTANT_LOW:
                        // Explicitly labelled so instructions-level handling rule is actionable
                        return `Safety: ${time} RESISTANT LOW (${period}) -- External Cause`;
                    case FindingType.BASAL_SIGNAL_LOW:
                        // Basal signal findings may not have specific time, use period
                        return time !== 'Unknown' 
                            ? `Safety: ${time} Basal Too High (${period})`
                            : `Safety: ${period} Basal Too High`;
                    default:
                        return `Safety: ${time} Low Prevention`;
                }
            },
            
            isSafetyFinding(finding) {
                const safetyTypes = [
                    FindingType.DIRECT_MEAL_LOW,
                    FindingType.TRANSIENT_HIGH_LOW,
                    // TRANSIENT_HIGH_CRASH removed -- dead code
                    FindingType.ISF_INDUCED_LOW,
                    FindingType.UNEXPLAINED_LOW,
                    FindingType.RESISTANT_LOW,
                    FindingType.BASAL_SIGNAL_LOW
                ];
                return safetyTypes.includes(finding.type);
            },
            
            groupByTimeWindow(findings) {
                const windows = {};
                
                findings.forEach(finding => {
                    const window = finding.scheduleTime || finding.period || 'general';
                    if (!windows[window]) windows[window] = [];
                    windows[window].push(finding);
                });
                
                return windows;
            },
            
            determineTier(findings) {
                // Check for basal ratio issues
                if (findings.some(f => f.type === FindingType.BASAL_RATIO_EXCEEDED)) {
                    return Tier.FOUNDATIONAL;
                }
                
                // Check for significant basal
                const basalFindings = findings.filter(f => 
                    f.primaryParameter === 'basal' &&
                    Math.abs(f.suggestedChangePercent || 0) > 3
                );
                if (basalFindings.length > 0) {
                    return Tier.SIGNIFICANT_BASAL;
                }
                
                return Tier.ROUTINE;
            },
            
            generateBundleName(findings, window) {
                const param = findings[0]?.primaryParameter || 'Parameter';
                const type = this.isStrengthening(findings[0]) ? 'Strengthening' : 'Weakening';
                
                // Try to create a descriptive name
                if (findings.some(f => f.type === FindingType.POST_MEAL_HIGH)) {
                    return `${window} Post-Meal Highs`;
                }
                if (findings.some(f => f.type === FindingType.CORRECTION_INEFFECTIVE)) {
                    return `${window} Correction Ineffectiveness`;
                }
                if (findings.some(f => f.type === FindingType.BASAL_SIGNAL_HIGH)) {
                    return `${window} Basal - Rising Pattern`;
                }
                
                return `${window} ${param.toUpperCase()} ${type}`;
            },
            
            createBundle(id, name, tier, findings, schedules, basalRatioInfo = null) {
                const recommendations = findings.map(f => 
                    this.findingToRecommendation(f, schedules, basalRatioInfo)
                ).filter(r => r !== null);
                
                const confidence = findings.length > 0
                    ? findings.reduce((sum, f) => sum + (f.calculatedConfidence || f.severity || 0.5), 0) / findings.length
                    : 0;
                
                return {
                    id,
                    name,
                    tier,
                    priority: 'REFERENCE',
                    recommendations,
                    compoundEffect: {},
                    rootCause: this.generateRootCause(findings),
                    evidenceSummary: this.generateEvidenceSummary(findings),
                    evidenceDetails: this.generateEvidenceDetails(findings),
                    conflictsWith: [],
                    blockedBy: null,
                    confidence,
                    findings
                };
            },
            
            findingToRecommendation(finding, schedules, basalRatioInfo = null) {
                if (!finding.primaryParameter || !finding.scheduleTime) return null;
                
                const schedule = schedules[finding.primaryParameter.toLowerCase()];
                if (!schedule) return null;
                
                const currentEntry = schedule.find(e => e.time === finding.scheduleTime);
                if (!currentEntry) return null;
                
                const changePercent = finding.suggestedChangePercent || 
                    (this.isStrengthening(finding) ? -2 : 5);
                
                let newValue;
                let ratioProtected = false;
                let ratioProtectionReason = null;
                
                if (finding.primaryParameter === 'basal') {
                    // For basal, round to pump increment (0.05)
                    const rawNew = currentEntry.value * (1 + changePercent / 100);
                    newValue = Math.round(rawNew * 20) / 20;
                    
                    // Ensure at least one pump increment of change if any change was requested
                    if (newValue === currentEntry.value && changePercent !== 0) {
                        // Force at least one increment in the direction of change
                        newValue = changePercent > 0 
                            ? currentEntry.value + CONFIG.pumpIncrement
                            : currentEntry.value - CONFIG.pumpIncrement;
                        // Clamp to minimum 0.05
                        newValue = Math.max(CONFIG.pumpIncrement, newValue);
                    }
                    newValue = Math.round(newValue * 20) / 20; // Final rounding
                    
                    // Apply ratio protection for basal changes
                    if (basalRatioInfo && basalRatioInfo.exceedsCap) {
                        const targetRatioCap = 2.0;
                        const isDecrease = newValue < currentEntry.value;
                        const isIncrease = newValue > currentEntry.value;
                        
                        if (isDecrease) {
                            // When decreasing and ratio already exceeded:
                            // Don't allow ANY rate to go to or below current minimum
                            // This prevents entrenching low rates
                            const minAllowedRate = Math.round((basalRatioInfo.maxRate / targetRatioCap) * 20) / 20;
                            const strictMinRate = basalRatioInfo.minRate + CONFIG.pumpIncrement; // Stay above current min
                            const effectiveMin = Math.max(minAllowedRate, strictMinRate);
                            
                            if (newValue < effectiveMin) {
                                console.log(`Ratio protection: Blocking decrease from ${currentEntry.value} to ${newValue} (min allowed: ${effectiveMin})`);
                                // If current value is already at or near min, block entirely
                                if (currentEntry.value <= effectiveMin) {
                                    newValue = currentEntry.value; // No change
                                    ratioProtected = true;
                                    ratioProtectionReason = `Rate already at/near minimum (${basalRatioInfo.minRate} U/hr) - cannot decrease further`;
                                } else {
                                    newValue = effectiveMin; // Clamp to minimum allowed
                                    ratioProtected = true;
                                    ratioProtectionReason = `Clamped to ${effectiveMin} U/hr floor to protect ratio`;
                                }
                            }
                        } else if (isIncrease) {
                            // When increasing: don't go above (minRate * targetRatioCap)
                            const maxAllowedRate = Math.round((basalRatioInfo.minRate * targetRatioCap) * 20) / 20;
                            if (newValue > maxAllowedRate) {
                                console.log(`Ratio protection: Blocking increase from ${currentEntry.value} to ${newValue} (max allowed: ${maxAllowedRate})`);
                                newValue = Math.min(currentEntry.value, maxAllowedRate); // Don't increase past threshold
                                ratioProtected = true;
                                ratioProtectionReason = `Would worsen ratio above ${maxAllowedRate} U/hr ceiling`;
                            }
                        }
                    }
                } else {
                    newValue = parseFloat((currentEntry.value * (1 + changePercent / 100)).toFixed(1));
                }
                
                // If ratio protection blocked the change entirely, don't create recommendation
                if (newValue === currentEntry.value) {
                    if (ratioProtected) {
                        console.log(`Ratio protection: Skipping recommendation for ${finding.scheduleTime} - change blocked to maintain ratio`);
                    }
                    return null;
                }
                
                // Recalculate actual change percent based on rounded values
                const actualChangePercent = ((newValue - currentEntry.value) / currentEntry.value) * 100;
                
                return {
                    param: finding.primaryParameter,
                    scheduleTime: finding.scheduleTime,
                    currentValue: currentEntry.value,
                    newValue,
                    changePercent: actualChangePercent,
                    protectionLevel: ratioProtected ? ProtectionLevel.CAUTION : ProtectionLevel.CLEAR,
                    protectionReason: ratioProtectionReason,
                    ratioProtected
                };
            },
            
            generateRootCause(findings) {
                if (findings.length === 0) return 'No specific cause identified';
                
                const types = [...new Set(findings.map(f => f.type))];
                
                if (types.includes(FindingType.DIRECT_MEAL_LOW)) {
                    return 'Meals causing direct lows without prior highs - CR too strong';
                }
                if (types.includes(FindingType.TRANSIENT_HIGH_LOW)) {
                    return 'Meals causing spike then crash (no corrections) - CR too strong';
                }
                if (types.includes(FindingType.POST_MEAL_HIGH)) {
                    return 'Post-meal highs requiring corrections - CR too weak';
                }
                if (types.includes(FindingType.ISF_INDUCED_LOW)) {
                    return 'Corrections causing lows - ISF too strong';
                }
                if (types.includes(FindingType.CORRECTION_INEFFECTIVE)) {
                    return 'Corrections not reaching target - ISF too weak';
                }
                if (types.includes(FindingType.BASAL_SIGNAL_HIGH)) {
                    return 'Fasting BG trending high - basal insufficient';
                }
                if (types.includes(FindingType.BASAL_SIGNAL_LOW)) {
                    return 'Fasting BG trending low - basal too high';
                }
                if (types.includes(FindingType.RESISTANT_LOW)) {
                    return 'RESISTANT LOW: IOB was near-zero at time of low. Not caused by insulin -- check activity, alcohol, hormonal, or other external factors. No parameter change indicated.';
                }
                
                return 'Mixed patterns detected';
            },
            
            generateEvidenceSummary(findings) {
                const totalEvents = findings.reduce((sum, f) => sum + (f.similarEventsCount || 1), 0);
                const recentEvents = findings.reduce((sum, f) => sum + (f.eventsLast24h || 0), 0);
                const last3DayEvents = findings.reduce((sum, f) => sum + (f.eventsLast3Days || 0), 0);
                
                // Check if any findings are structural (always current)
                const hasStructural = findings.some(f => f.isStructural);
                if (hasStructural) {
                    return `Current analysis âœ“`;
                }
                
                // Find most recent event across all findings
                let mostRecentHours = null;
                findings.forEach(f => {
                    const hours = f.hoursSinceMostRecent;
                    if (hours !== null && hours !== undefined && !isNaN(hours)) {
                        if (mostRecentHours === null || hours < mostRecentHours) {
                            mostRecentHours = hours;
                        }
                    }
                });
                
                // Build summary with recency info
                if (recentEvents > 0) {
                    if (recentEvents === totalEvents) {
                        return `${totalEvents} event(s) in last 24h âœ“`;
                    } else {
                        return `${recentEvents} recent + ${totalEvents - recentEvents} older event(s)`;
                    }
                } else if (last3DayEvents > 0) {
                    return `${last3DayEvents} event(s) in last 3 days (${totalEvents - last3DayEvents} older)`;
                } else if (mostRecentHours !== null && !isNaN(mostRecentHours)) {
                    const daysAgo = Math.round(mostRecentHours / 24);
                    return `âš ï¸ ${totalEvents} event(s) - most recent ${daysAgo} day(s) ago`;
                } else {
                    // Fallback when we can't determine recency
                    const days = findings.reduce((sum, f) => sum + (f.daysWithPattern || 1), 0) / findings.length;
                    return `${totalEvents} event(s) over ~${Math.round(days)} day(s) (recency unknown)`;
                }
            },
            
            /**
             * Generate detailed evidence list showing actual events
             */
            generateEvidenceDetails(findings) {
                // Sort findings by recency (most recent first)
                const sorted = [...findings].sort((a, b) => {
                    const aHours = a.hoursSinceMostRecent ?? 999;
                    const bHours = b.hoursSinceMostRecent ?? 999;
                    return aHours - bHours;
                });
                
                // Extract the details from each finding
                return sorted.map(f => {
                    // Add recency indicator
                    const icon = f.eventsLast24h > 0 ? 'âœ“' : 
                                f.eventsLast3Days > 0 ? 'â—‹' : 
                                f.isStructural ? 'â—' : 'âš ï¸';
                    return {
                        icon,
                        detail: f.details || 'No details available',
                        type: f.type,
                        severity: f.severity
                    };
                }).slice(0, 5); // Limit to 5 most relevant
            },
            
            calculateCompoundEffect(bundle) {
                if (!bundle.recommendations || bundle.recommendations.length === 0) {
                    return { total: 0, warning: null, description: null };
                }
                
                let effect = 0;
                
                bundle.recommendations.forEach(rec => {
                    const change = rec.changePercent || 0;
                    
                    // Weight by parameter impact
                    if (rec.param === 'basal') {
                        effect += change * 1.0;
                    } else if (rec.param === 'CR') {
                        effect += change * 0.45;
                    } else if (rec.param === 'ISF') {
                        effect += change * 0.25;
                    }
                });
                
                // Determine warning level
                // Note: effect is in percentage points (e.g., 7.5 means 7.5%)
                // Config thresholds are decimals (0.10 means 10%), so multiply by 100
                let warning = null;
                const absEffect = Math.abs(effect);
                const blockThresholdPct = CONFIG.compoundBlockStrengthen * 100; // 10%
                const warnThresholdConcentratedPct = CONFIG.compoundWarnStrengthenConcentrated * 100; // 5%
                const warnThresholdWeakenPct = CONFIG.compoundWarnWeaken * 100; // 10%
                const blockThresholdWeakenPct = 20; // 20% for weakening (higher than strengthening)
                
                if (effect < 0) { // Strengthening (more insulin)
                    if (absEffect >= blockThresholdPct) {
                        warning = 'BLOCKED';
                    } else if (absEffect >= warnThresholdConcentratedPct) {
                        warning = 'HIGH';
                    }
                } else { // Weakening (less insulin)
                    if (absEffect >= blockThresholdWeakenPct) {
                        warning = 'BLOCKED';
                    } else if (absEffect >= warnThresholdWeakenPct) {
                        warning = 'HIGH';
                    }
                }
                
                return {
                    total: effect,
                    warning,
                    description: `${effect >= 0 ? '+' : ''}${effect.toFixed(1)}% insulin delivery change`
                };
            },
            
            applyProtection(bundle, allFindings, signalAnalysis) {
                bundle.recommendations.forEach(rec => {
                    const period = this.getPeriodForTime(rec.scheduleTime);
                    const protection = ProtectionSystem.assignProtection(
                        rec.scheduleTime,
                        rec.param,
                        period,
                        allFindings,
                        signalAnalysis
                    );
                    
                    rec.protectionLevel = protection.level;
                    rec.protectionReason = protection.reason;
                    
                    if (protection.level === ProtectionLevel.LOCKED) {
                        bundle.blockedBy = protection.reason;
                    }
                });
            },
            
            getPeriodForTime(timeStr) {
                if (!timeStr) return null;
                const [hours] = timeStr.split(':').map(Number);
                
                for (const period of CIRCADIAN_PERIODS) {
                    if (hours >= period.startHour && hours < period.endHour) {
                        return period.name;
                    }
                }
                return null;
            },
            
            detectConflicts(bundles) {
                // Check for bundles that conflict (same slot, different directions)
                for (let i = 0; i < bundles.length; i++) {
                    for (let j = i + 1; j < bundles.length; j++) {
                        const bundleA = bundles[i];
                        const bundleB = bundles[j];
                        
                        // Check for overlapping slots
                        const slotsA = bundleA.recommendations.map(r => `${r.param}_${r.scheduleTime}`);
                        const slotsB = bundleB.recommendations.map(r => `${r.param}_${r.scheduleTime}`);
                        
                        const overlap = slotsA.filter(s => slotsB.includes(s));
                        
                        if (overlap.length > 0) {
                            bundleA.conflictsWith.push(bundleB.id);
                            bundleB.conflictsWith.push(bundleA.id);
                        }
                    }
                }
            },
            
            prioritize(bundles, bodyState) {
                // Step 1: Add metadata to each bundle
                bundles.forEach(bundle => {
                    // Check if bundle is already marked as structural (conflict/ratio bundles)
                    const isPreMarkedStructural = bundle.isSlotConflict || 
                                                  bundle.isBasalRatioWarning || 
                                                  bundle.hasStructuralFinding;
                    
                    if (isPreMarkedStructural) {
                        bundle.hasStructuralFinding = true;
                        bundle.hasRecentEvents = true;
                        bundle.hasLast3DayEvents = true;
                        bundle.bestRecencyTier = 'CURRENT';
                        bundle.recencyScore = 100;
                    } else {
                        // Calculate recency score from findings
                        const findings = bundle.findings || [];
                        const totalRecent = findings.reduce((sum, f) => sum + (f.eventsLast24h || 0), 0);
                        const totalLast3Days = findings.reduce((sum, f) => sum + (f.eventsLast3Days || 0), 0);
                        const hasStructural = findings.some(f => f.isStructural);
                        
                        let bestTier = 'EXPIRED';
                        findings.forEach(f => {
                            const tier = f.recencyTier || 'UNKNOWN';
                            if (tier === 'CURRENT') bestTier = 'CURRENT';
                            else if (tier === 'RECENT' && bestTier !== 'CURRENT') bestTier = 'RECENT';
                            else if (tier === 'STALE' && bestTier === 'EXPIRED') bestTier = 'STALE';
                        });
                        
                        bundle.recencyScore = totalRecent * 10 + totalLast3Days;
                        bundle.bestRecencyTier = hasStructural ? 'CURRENT' : bestTier;
                        bundle.hasRecentEvents = hasStructural || totalRecent > 0;
                        bundle.hasLast3DayEvents = hasStructural || totalLast3Days > 0;
                        bundle.hasStructuralFinding = hasStructural;
                    }
                    
                    // Assign time block based on first recommendation's schedule time
                    const scheduleTime = bundle.recommendations?.[0]?.scheduleTime || 
                                        bundle.findings?.[0]?.scheduleTime || 
                                        'General';
                    bundle.timeBlock = getTimeBlock(scheduleTime);
                    
                    // Check for URGENT severity (severe lows)
                    bundle.isUrgent = false;
                    bundle.urgentReason = null;
                    
                    const findings = bundle.findings || [];
                    for (const finding of findings) {
                        // Check for severe low
                        const events = finding.events || [];
                        for (const event of events) {
                            if (event.lowBG && event.lowBG < CONFIG.urgentLowThreshold) {
                                bundle.isUrgent = true;
                                bundle.urgentReason = `Severe low (${event.lowBG} mg/dL)`;
                                break;
                            }
                        }
                        if (bundle.isUrgent) break;
                    }
                });
                
                // Step 2: Sort by urgency, then tier, then recency, then confidence
                bundles.sort((a, b) => {
                    // Urgent first
                    if (a.isUrgent !== b.isUrgent) return a.isUrgent ? -1 : 1;
                    // Then by tier
                    if (a.tier !== b.tier) return a.tier - b.tier;
                    // Then by recency
                    if (a.hasRecentEvents !== b.hasRecentEvents) return a.hasRecentEvents ? -1 : 1;
                    if (a.hasLast3DayEvents !== b.hasLast3DayEvents) return a.hasLast3DayEvents ? -1 : 1;
                    // Then by confidence
                    return b.confidence - a.confidence;
                });
                
                // Step 3: Check for blockers
                const hasBasalRatioWarning = bundles.some(b => b.isBasalRatioWarning);
                
                bundles.forEach(bundle => {
                    // Compound effect blocking (only within same time block now handled separately)
                    const compoundBlocked = bundle.compoundEffect && 
                        bundle.compoundEffect.warning === 'BLOCKED';
                    
                    if (compoundBlocked && !bundle.isUrgent) {
                        bundle.blockedBy = `Compound effect (${Math.abs(bundle.compoundEffect.total).toFixed(1)}%) exceeds safe threshold. Address findings individually.`;
                    }
                    
                    // Stale blocking (skip for urgent)
                    if (!bundle.isUrgent && !bundle.hasRecentEvents && !bundle.hasLast3DayEvents && !bundle.hasStructuralFinding) {
                        if (!bundle.blockedBy) {
                            bundle.blockedBy = `No recent events (pattern may have resolved)`;
                            bundle.isStale = true;
                        }
                    }
                    
                    // Basal ratio blocking (skip for urgent safety)
                    if (!bundle.isUrgent && hasBasalRatioWarning && 
                        bundle.tier >= Tier.SIGNIFICANT_BASAL &&
                        !bundle.isBasalRatioWarning && 
                        !bundle.isSlotConflict &&
                        bundle.recommendations.some(r => r.param === 'CR' || r.param === 'ISF')) {
                        
                        const hasStrengthening = bundle.recommendations.some(r => 
                            (r.param === 'CR' && r.changePercent < 0) ||
                            (r.param === 'ISF' && r.changePercent < 0)
                        );
                        
                        if (hasStrengthening && !bundle.blockedBy) {
                            bundle.blockedBy = `Blocked by Tier 2 (basal ratio). Normalize basal ratio first.`;
                        }
                    }
                });
                
                // Step 4: Multi-action PRIMARY selection
                // - All URGENT bundles become PRIMARY (regardless of time block)
                // - Then one non-urgent PRIMARY per time block
                // - BUT: Bundles with only 3-day events (no 24h events) go to REFERENCE
                const primaryByBlock = {};
                
                bundles.forEach(bundle => {
                    if (bundle.blockedBy || 
                        bundle.recommendations.length === 0 ||
                        bodyState.state === BodyStateType.OVERRIDE_ACTIVE) {
                        bundle.priority = 'REFERENCE';
                        return;
                    }
                    
                    // URGENT always becomes PRIMARY
                    if (bundle.isUrgent) {
                        bundle.priority = 'PRIMARY';
                        return;
                    }
                    
                    // Option 1 fix: Only 3-day events (no 24h events) â†’ REFERENCE
                    // Exception: Structural findings (basal signal) are always current
                    if (!bundle.hasRecentEvents && bundle.hasLast3DayEvents && !bundle.hasStructuralFinding) {
                        bundle.priority = 'REFERENCE';
                        bundle.demotedReason = 'No recurrence in 48h';
                        return;
                    }
                    
                    // One non-urgent PRIMARY per time block
                    const block = bundle.timeBlock;
                    if (!primaryByBlock[block]) {
                        bundle.priority = 'PRIMARY';
                        primaryByBlock[block] = bundle;
                    } else {
                        bundle.priority = 'REFERENCE';
                    }
                });
                
                // Log multi-action summary
                const primaries = bundles.filter(b => b.priority === 'PRIMARY');
                console.log('Multi-action selection:', {
                    urgent: primaries.filter(b => b.isUrgent).map(b => b.name),
                    byBlock: Object.entries(primaryByBlock).map(([block, b]) => `${block}: ${b.name}`)
                });
                
                return bundles;
            }
        };

        // =========================================================================
        // DATA EXTRACTION (PRESERVED FROM v25)
        // =========================================================================
        
        const formatTimeForDisplay = (timeStr) => {
            if (!timeStr) return '';
            const dt = new Date(timeStr);
            const now = new Date();
            const isToday = dt.toDateString() === now.toDateString();
            const yesterday = new Date(now);
            yesterday.setDate(yesterday.getDate() - 1);
            const isYesterday = dt.toDateString() === yesterday.toDateString();
            
            const timeOnly = dt.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
            
            if (isToday) {
                return `${timeOnly} today`;
            } else if (isYesterday) {
                return `${timeOnly} yesterday`;
            } else {
                // Show month/day for older dates
                const dateStr = dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                return `${timeOnly} on ${dateStr}`;
            }
        };
        
        const getEventId = (event) => {
            if (!event) return null;
            const timestamp = event.created_at || event.dateString || event.time || event.localTime;
            return `${timestamp}_${event.sgv || event.carbs || event.insulin || 'event'}`;
        };
        
        const getCRForTime = (timeStr, crSchedule) => {
            const dt = new Date(timeStr);
            const hours = dt.getHours();
            const minutes = dt.getMinutes();
            const timeInMinutes = hours * 60 + minutes;
            
            const scheduleInMinutes = crSchedule.map(entry => {
                const [h, m] = entry.time.split(':').map(Number);
                return { minutes: h * 60 + m, value: entry.value, time: entry.time };
            }).sort((a, b) => a.minutes - b.minutes);
            
            let applicable = scheduleInMinutes[0];
            for (let entry of scheduleInMinutes) {
                if (timeInMinutes >= entry.minutes) {
                    applicable = entry;
                } else {
                    break;
                }
            }
            
            return applicable;
        };
        
        const getISFForTime = (timeStr, isfSchedule) => {
            const dt = new Date(timeStr);
            const hours = dt.getHours();
            const minutes = dt.getMinutes();
            const timeInMinutes = hours * 60 + minutes;
            
            const scheduleInMinutes = isfSchedule.map(entry => {
                const [h, m] = entry.time.split(':').map(Number);
                return { minutes: h * 60 + m, value: entry.value, time: entry.time };
            }).sort((a, b) => a.minutes - b.minutes);
            
            let applicable = scheduleInMinutes[0];
            for (let entry of scheduleInMinutes) {
                if (timeInMinutes >= entry.minutes) {
                    applicable = entry;
                } else {
                    break;
                }
            }
            
            return applicable;
        };
        
        const getBasalForTime = (timeStr, basalSchedule) => {
            const dt = new Date(timeStr);
            const hours = dt.getHours();
            const minutes = dt.getMinutes();
            const timeInMinutes = hours * 60 + minutes;
            
            const scheduleInMinutes = basalSchedule.map(entry => {
                const [h, m] = entry.time.split(':').map(Number);

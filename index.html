                    const hourA = parseInt(a.time.split(':')[0]);
                    const hourB = parseInt(b.time.split(':')[0]);
                    return hourA - hourB;
                });
                
                // Fill each hour with the appropriate rate
                for (let h = 0; h < 24; h++) {
                    // Find the schedule entry that applies to this hour
                    let rate = sorted[0]?.value || 0;
                    for (const entry of sorted) {
                        const entryHour = parseInt(entry.time.split(':')[0]);
                        if (entryHour <= h) {
                            rate = entry.value;
                        } else {
                            break;
                        }
                    }
                    hourly[h] = rate;
                }
                
                return hourly;
            },
            
            /**
             * Distribute increments across hours, prioritizing periods where
             * signal matches the direction of change needed.
             * Includes ratio protection to avoid making basal ratio worse.
             */
            distributeIncrements(currentHourly, periodSignals, incrementsNeeded, ratioProtection = null) {
                const schedule = [...currentHourly];
                const isDecrease = incrementsNeeded < 0;
                const isIncrease = !isDecrease;
                
                // Calculate current ratio for protection
                const currentMax = Math.max(...schedule);
                const currentMin = Math.min(...schedule.filter(r => r > 0));
                const currentRatio = currentMax / currentMin;
                const targetRatioCap = 2.0; // Don't let ratio exceed 2:1
                
                // Calculate protection thresholds MORE STRICTLY
                // When decreasing: don't reduce any rate to or below the minimum needed to maintain ratio
                // This prevents entrenching low rates that worsen the ratio
                const minAllowedRate = isDecrease 
                    ? Math.max(currentMax / targetRatioCap, currentMin) // Don't go below current min OR ratio floor
                    : this.PUMP_INCREMENT;
                const maxAllowedRate = isIncrease 
                    ? Math.min(currentMin * targetRatioCap, currentMax) // Don't go above current max OR ratio ceiling
                    : Infinity;
                
                // If ratio already exceeds cap and we're decreasing, be even stricter
                // Don't decrease ANY rate that's near the minimum
                const ratioAlreadyExceeded = currentRatio > targetRatioCap;
                const strictMinThreshold = ratioAlreadyExceeded && isDecrease 
                    ? currentMin + this.PUMP_INCREMENT // Don't let anything get within one increment of min
                    : minAllowedRate;
                
                console.log('Ratio protection:', {
                    currentRatio: currentRatio.toFixed(2),
                    ratioExceeded: ratioAlreadyExceeded,
                    currentMax,
                    currentMin,
                    minAllowedRate: minAllowedRate.toFixed(2),
                    strictMinThreshold: strictMinThreshold.toFixed(2),
                    maxAllowedRate: maxAllowedRate === Infinity ? 'Infinity' : maxAllowedRate.toFixed(2)
                });
                
                // Build period info with signal direction categorization
                const periodInfo = CIRCADIAN_PERIODS.map(period => {
                    const signal = periodSignals?.find(p => p.name === period.name);
                    const medianDev = signal?.medianDeviation || 0;
                    
                    // Categorize: MATCHING, NEUTRAL, or OPPOSITE
                    let category;
                    if (isIncrease) {
                        // For INCREASE: HIGH is matching, LOW is opposite
                        if (medianDev > 5) category = 'MATCHING';
                        else if (medianDev < -5) category = 'OPPOSITE';
                        else category = 'NEUTRAL';
                    } else {
                        // For DECREASE: LOW is matching, HIGH is opposite
                        if (medianDev < -5) category = 'MATCHING';
                        else if (medianDev > 5) category = 'OPPOSITE';
                        else category = 'NEUTRAL';
                    }
                    
                    return {
                        period,
                        signalValue: medianDev,
                        signalStrength: Math.abs(medianDev),
                        category,
                        hours: []
                    };
                });
                
                // Build spread-ordered hours within each period
                periodInfo.forEach(p => {
                    const hours = [];
                    for (let h = p.period.startHour; h < p.period.endHour; h++) {
                        hours.push(h);
                    }
                    // Interleave: even indices first, then odd (spreads changes)
                    const evens = hours.filter((_, i) => i % 2 === 0);
                    const odds = hours.filter((_, i) => i % 2 === 1);
                    p.hours = [...evens, ...odds];
                });
                
                // Separate into three groups: MATCHING, NEUTRAL, OPPOSITE
                const matching = periodInfo.filter(p => p.category === 'MATCHING');
                const neutral = periodInfo.filter(p => p.category === 'NEUTRAL');
                const opposite = periodInfo.filter(p => p.category === 'OPPOSITE');
                
                // Sort each group by signal strength (strongest first for matching/opposite, weakest first for neutral)
                const sortByStrength = (a, b) => {
                    const strengthDiff = b.signalStrength - a.signalStrength;
                    if (Math.abs(strengthDiff) > 0.1) return strengthDiff;
                    return a.period.startHour - b.period.startHour;
                };
                matching.sort(sortByStrength);
                neutral.sort((a, b) => a.signalStrength - b.signalStrength); // Weakest signal first for neutral
                // Don't sort opposite - we won't use them
                
                // Build spread order: MATCHING first, then NEUTRAL
                // OPPOSITE periods are excluded - don't add insulin where BG is already low (or vice versa)
                const buildGroupOrder = (periods) => {
                    const maxHours = Math.max(...periods.map(p => p.hours.length), 0);
                    const order = [];
                    for (let pass = 0; pass < maxHours; pass++) {
                        for (const p of periods) {
                            if (pass < p.hours.length) {
                                order.push({ hour: p.hours[pass], period: p.period.name });
                            }
                        }
                    }
                    return order;
                };

                const spreadOrder = [...matchingOrder, ...neutralOrder];

                const delta = isDecrease ? -this.PUMP_INCREMENT : this.PUMP_INCREMENT;
                const appliedHours = [];

                for (const { hour, period } of spreadOrder) {
                    if (remaining <= 0) break;
                    const newRate = schedule[hour] + delta;
                    
                    // Check minimum rate (can't go below pump increment)
                    if (newRate < this.PUMP_INCREMENT) {
                        continue;
                    }
                    
                    // Check ratio protection - use stricter threshold when ratio already exceeded
                    const effectiveMinAllowed = ratioAlreadyExceeded ? strictMinThreshold : minAllowedRate;
                    if (isDecrease && newRate < effectiveMinAllowed) {
                        console.log(`Ratio protection: Skipping hour ${hour} - would reduce to ${newRate.toFixed(2)} below min allowed ${effectiveMinAllowed.toFixed(2)}`);
                        ratioBlockedCount++;
                        continue;
                    }
                    if (isIncrease && newRate > maxAllowedRate) {
                        console.log(`Ratio protection: Skipping hour ${hour} - would increase to ${newRate.toFixed(2)} above max allowed ${maxAllowedRate.toFixed(2)}`);
                        ratioBlockedCount++;
                        continue;
                    }
                    
                    schedule[hour] = this.roundToIncrement(newRate);
                    remaining--;
                    appliedHours.push({
                        hour,
                        period,
                        delta,
                        newRate: schedule[hour]
                    });
                }
                
                // Log if we couldn't apply all increments
                if (remaining > 0) {

                });

            // Generate structured JSON export for Claude analysis
            generateStructuredExport(analysisResults, bodyState, bundles, schedules, config, dynamicTarget = null, detectedChanges = [], yesterdayEntry = null) {
                // Calculate AGP (same as formatForClaude)
                const agp7day = analysisResults.nightscoutData?.glucose

                    : null;
                const agp48h = analysisResults.nightscoutData?.glucose
                    ? this.calculateAGP(analysisResults.nightscoutData.glucose, 2)
                    : null;
                
                // SPEC 4: Check for no-changes case and return short-form JSON
                const primaryBundlesCheck = bundles.filter(b => b.priority === 'PRIMARY' && b.recommendations.length > 0);
                const hasUrgent = bundles.some(b => b.isUrgent);
                const basalRatioOk = !analysisResults.basalRatioInfo?.exceedsCap;
                const tirOk = agp7day?.overall?.tir?.inRange >= 80;
                const veryLowOk = agp7day?.overall?.tir?.veryLow < 1;
                const hasSignificantSignals = analysisResults.signalAnalysis?.periods?.some(p => 
                    p.medianDeviation !== null && Math.abs(p.medianDeviation) > 15
                );
                const hasDivergences = analysisResults.signalAnalysis?.periods?.some(p => p.divergence);
                
                if (primaryBundlesCheck.length === 0 && !hasUrgent && basalRatioOk && tirOk && veryLowOk && !hasSignificantSignals && !hasDivergences) {
                    return {
                        meta: {
                            version: '2.3.1',
                            timestamp: new Date().toISOString(),
                            analysisWindow: config.basalSignalWindow || 7,
                            dataQuality: {
                                glucoseReadings: analysisResults.nightscoutData?.glucose?.length || 0,
                                coveragePercent: analysisResults.signalAnalysis?.periods?.reduce((sum, p) => 
                                    sum + (p.cleanWindowCount || 0), 0) || 0,
                                cleanWindows: analysisResults.signalAnalysis?.periods?.reduce((sum, p) => 
                                    sum + (p.cleanWindowCount || 0), 0) || 0
                            }
                        },
                        recommendation: 'NO_CHANGES',
                        summary: {
                            tir: agp7day?.overall?.tir?.inRange || 0,
                            gmi: agp7day?.overall?.gmi || 0,
                            cv: agp7day?.overall?.cv || 0,
                            lowPct: agp7day?.overall?.tir?.low || 0,
                            veryLowPct: agp7day?.overall?.tir?.veryLow || 0,
                            weightedDeviation: analysisResults.signalAnalysis?.weightedDeviation || 0,
                            watchListCount: bundles.filter(b => b.priority === 'REFERENCE').length,
                            trend: (() => {
                                const tir = agp7day?.overall?.tir?.inRange || 0;
                                const tir48h = agp48h?.overall?.tir?.inRange || tir;
                                const tirDelta = tir48h - tir;
                                return Math.abs(tirDelta) < 2 ? 'stable' : (tirDelta > 0 ? 'improving' : 'declining');
                            })()
                        }
                    };
                }
                
                // Helper: AGP check for a period (mirrors formatForClaude logic)
                const getAGPCheckForPeriod = (periodName) => {
                    if (!agp7day || !agp7day.hourlyStats) return { status: 'NO_DATA', avgHigh: null, avgLow: null };
                    const periodHoursMap = {
                        'Deep Sleep': [0, 1, 2, 3],
                        'Dawn': [4, 5, 6, 7],
                        'Morning': [8, 9, 10, 11],
                        'Afternoon': [12, 13, 14, 15, 16],
                        'Evening': [17, 18, 19, 20],
                        'Sleep Onset': [21, 22, 23]
                    };
                    const hours = periodHoursMap[periodName];
                    if (!hours) return { status: 'UNKNOWN', avgHigh: null, avgLow: null };
                    const periodStats = hours.map(h => agp7day.hourlyStats[h]).filter(s => s !== null);
                    if (periodStats.length === 0) return { status: 'NO_DATA', avgHigh: null, avgLow: null };
                    const avgHigh = periodStats.reduce((sum, s) => sum + s.tir.high + s.tir.veryHigh, 0) / periodStats.length;
                    const avgLow = periodStats.reduce((sum, s) => sum + s.tir.low + s.tir.veryLow, 0) / periodStats.length;
                    if (avgHigh > 25) return { status: 'HIGH', avgHigh: Math.round(avgHigh), avgLow: Math.round(avgLow) };
                    if (avgLow > 5) return { status: 'LOW', avgHigh: Math.round(avgHigh), avgLow: Math.round(avgLow) };
                    return { status: 'OK', avgHigh: Math.round(avgHigh), avgLow: Math.round(avgLow) };
                };
                
                // Helper: compute divergence for a period
                const getDivergence = (period) => {
                    const agpCheck = getAGPCheckForPeriod(period.name);
                    const signalDir = period.medianDeviation < -10 ? 'LOW' : period.medianDeviation > 10 ? 'HIGH' : 'NEUTRAL';
                    if (signalDir === 'LOW' && agpCheck.status === 'HIGH') {
                        return { type: 'SIGNAL_LOW_AGP_HIGH', recommendation: 'CR/timing issue, NOT basal' };
                    }
                    if (signalDir === 'HIGH' && agpCheck.status === 'LOW') {
                        return { type: 'SIGNAL_HIGH_AGP_LOW', recommendation: 'Check for overcorrection cycles or aggressive ISF' };
                    }
                    return null;
                };
                
                // Helper: map a bundle to an action/watchList JSON object
                const mapBundle = (bundle) => {
                    // Determine recency tag
                    let recency = 'STALE';
                    if (bundle.hasStructuralFinding) recency = 'STRUCTURAL';
                    else if (bundle.hasRecentEvents) recency = 'NEW';
                    else if (bundle.hasLast3DayEvents) recency = 'OLD';
                    
                    // Build evidence object
                    const evidence = {
                        events: [],
                        signalSupport: null,
                        eventsLast24h: bundle.findings?.reduce((sum, f) => sum + (f.eventsLast24h || 0), 0) || 0,
                        eventsLast3Days: bundle.findings?.reduce((sum, f) => sum + (f.eventsLast3Days || 0), 0) || 0
                    };
                    
                    // Extract events from findings
                    if (bundle.findings) {
                        bundle.findings.forEach(f => {
                            const evt0 = f.events?.[0] || {};
                            
                            if (f.type === 'unexplained_low' || f.type === 'direct_meal_low' || 
                                f.type === 'isf_induced_low' || f.type === 'transient_high_low' ||
                                f.type === 'post_meal_high') {
                                // Extract BG from the finding's events array (type-specific property names)
                                const bg = evt0.lowBG || evt0.peakBG || evt0.highBG || null;
                                
                                // Extract date from eventTime
                                let eventDate = null;
                                try {
                                    if (f.eventTime) {
                                        const d = new Date(f.eventTime);
                                        if (!isNaN(d)) eventDate = d.toISOString().split('T')[0];
                                    }
                                } catch(e) {}
                                
                                evidence.events.push({
                                    date: eventDate,
                                    time: f.eventTime || f.scheduleTime,
                                    type: f.type,
                                    bg,
                                    context: f.details?.substring(0, 200) || null,
                                    severity: f.severity >= 0.8 ? 'severe' : f.severity >= 0.5 ? 'moderate' : 'mild'
                                });
                            }
                            // Signal support from structural findings (fix operator precedence)
                            if (f.type === 'basal_signal_low' || f.type === 'basal_signal_high') {
                                evidence.signalSupport = {
                                    period: f.period || f.scheduleTime,
                                    deviation: evt0.medianDeviation ?? f.medianDeviation ?? null,
                                    signal: evt0.signal ?? f.signal ?? null,
                                    cleanWindows: evt0.cleanWindows ?? null
                                };
                            }
                        });
                    }
                    
                    return {
                        id: bundle.id,
                        priority: bundle.priority,
                        tier: bundle.tier,
                        urgent: bundle.isUrgent || false,
                        recency,
                        name: bundle.name,
                        detector: bundle.findings?.[0]?.type || 'unknown',
                        timeBlock: bundle.timeBlock || 'General',
                        rootCause: bundle.rootCause || null,
                        urgentReason: bundle.urgentReason || null,
                        recommendations: (bundle.recommendations || []).map(rec => ({
                            parameter: rec.param,
                            scheduleTime: rec.scheduleTime,
                            currentValue: rec.currentValue,
                            recommendedValue: rec.newValue,
                            changePercent: rec.changePercent,
                            protectionLevel: rec.protectionLevel || 'clear'
                        })),
                        evidence,
                        compoundEffect: bundle.compoundEffect?.description ? {
                            totalChangePercent: bundle.compoundEffect.total || 0,
                            status: bundle.compoundEffect.warning || 'CLEAR'
                        } : null,
                        confidence: bundle.confidence || 0
                    };
                };
                
                // Build primary actions
                const primaryBundles = bundles.filter(b => b.priority === 'PRIMARY');
                const referenceBundles = bundles.filter(b => b.priority === 'REFERENCE');
                
                // Build period signals with AGP check and divergence
                const periodSignals = (analysisResults.signalAnalysis?.periods || []).map(period => ({
                    name: period.name,
                    hours: {
                        'Deep Sleep': [0,1,2,3], 'Dawn': [4,5,6,7], 'Morning': [8,9,10,11],
                        'Afternoon': [12,13,14,15,16], 'Evening': [17,18,19,20], 'Sleep Onset': [21,22,23]
                    }[period.name] || [],
                    medianDeviation: period.medianDeviation,
                    signal: period.signal || 'INSUFFICIENT',
                    cleanWindows: period.cleanWindowCount || 0,
                    agpCheck: getAGPCheckForPeriod(period.name),
                    divergence: period.medianDeviation !== null ? getDivergence(period) : null
                }));
                
                // Build problem hours from AGP
                const problemHours = [];
                if (agp7day?.hourlyStats) {
                    agp7day.hourlyStats.forEach((stats, hour) => {
                        if (!stats) return;
                        const totalLow = stats.tir.low + stats.tir.veryLow;
                        const totalHigh = stats.tir.high + stats.tir.veryHigh;
                        let flag = null;

            // Calculate AGP statistics from glucose data
            calculateAGP(glucoseData, days = 7) {
                if (!glucoseData || glucoseData.length === 0) {
                    return null;
                }
                
                // Use midnight-to-midnight boundaries like Clarity
                // End at midnight tonight (start of today), go back N days
                const now = new Date();
                const endOfWindow = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
                const startOfWindow = new Date(endOfWindow);
                startOfWindow.setDate(startOfWindow.getDate() - days + 1);
                startOfWindow.setHours(0, 0, 0, 0);
                
                let readings = glucoseData.filter(r => {
                    const readingDate = new Date(r.dateString);
                    return readingDate >= startOfWindow && readingDate <= endOfWindow;
                });
                
                // Deduplicate readings within the same minute (keep first)
                const seenMinutes = new Set();
                readings = readings.filter(r => {
                    const minuteKey = r.dateString.substring(0, 16); // YYYY-MM-DDTHH:MM
                    if (seenMinutes.has(minuteKey)) {
                        return false;
                    }
                    seenMinutes.add(minuteKey);
                    return true;
                });
                
                if (readings.length < 100) {
                    return null; // Not enough data
                }
                
                // Extract BG values
                const values = readings.map(r => r.sgv).filter(v => v && v > 20 && v < 500);
                
                // Overall statistics
                const mean = values.reduce((a, b) => a + b, 0) / values.length;
                const variance = values.reduce((sum, v) => sum + Math.pow(v - mean, 2), 0) / values.length;
                const sd = Math.sqrt(variance);
                const cv = (sd / mean) * 100;
                const gmi = 3.31 + (0.02392 * mean); // GMI formula
                
                // Clarity uses different thresholds for day vs night:
                // Daytime (6am-11pm): In Range = 70-160
                // Nighttime (11pm-6am): In Range = 70-140
                const getHighThresholdForReading = (dateString) => {
                    const hour = new Date(dateString).getHours();
                    // Nighttime: 11pm (23) to 6am (5) = hours 23, 0, 1, 2, 3, 4, 5
                    if (hour >= 23 || hour <= 5) {
                        return 140; // Tighter nighttime threshold
                    }
                    return 160; // Daytime threshold
                };
                
                // Time in Range calculations with day/night thresholds
                let veryLow = 0, low = 0, inRange = 0, high = 0, veryHigh = 0;
                readings.forEach(r => {
                    if (!r.sgv || r.sgv <= 20 || r.sgv >= 500) return;
                    const v = r.sgv;
                    const highThreshold = getHighThresholdForReading(r.dateString);
                    
                    if (v < 54) veryLow++;
                    else if (v < 70) low++;
                    else if (v <= highThreshold) inRange++;
                    else if (v <= 250) high++;
                    else veryHigh++;
                });
                const total = veryLow + low + inRange + high + veryHigh;
                
                const tir = {
                    veryLow: (veryLow / total * 100),
                    low: (low / total * 100),
                    inRange: (inRange / total * 100),
                    high: (high / total * 100),
                    veryHigh: (veryHigh / total * 100)
                };
                
                // Hourly statistics
                const hourlyBuckets = {};
                for (let h = 0; h < 24; h++) {
                    hourlyBuckets[h] = [];
                }
                
                readings.forEach(r => {
                    const hour = new Date(r.dateString).getHours();
                    if (r.sgv && r.sgv > 20 && r.sgv < 500) {
                        hourlyBuckets[hour].push(r.sgv);
                    }
                });
                
                // Clarity uses different thresholds for day vs night:
                // Daytime (6am-11pm): In Range = 70-160
                // Nighttime (11pm-6am): In Range = 70-140
                const getHighThreshold = (hour) => {
                    // Nighttime: 11pm (23) to 6am (5) = hours 23, 0, 1, 2, 3, 4, 5
                    if (hour >= 23 || hour <= 5) {
                        return 140; // Tighter nighttime threshold
                    }
                    return 160; // Daytime threshold
                };
                
                const hourlyStats = [];
                for (let h = 0; h < 24; h++) {
                    const vals = hourlyBuckets[h];
                    if (vals.length === 0) {
                        hourlyStats.push(null);
                        continue;
                    }
                    
                    const hMean = vals.reduce((a, b) => a + b, 0) / vals.length;
                    const hVariance = vals.reduce((sum, v) => sum + Math.pow(v - hMean, 2), 0) / vals.length;
                    const hSd = Math.sqrt(hVariance);
                    
                    // TIR for this hour - use day/night threshold
                    const highThreshold = getHighThreshold(h);
                    const hVeryLow = vals.filter(v => v < 54).length;
                    const hLow = vals.filter(v => v >= 54 && v < 70).length;
                    const hInRange = vals.filter(v => v >= 70 && v <= highThreshold).length;
                    const hHigh = vals.filter(v => v > highThreshold && v <= 250).length;
                    const hVeryHigh = vals.filter(v => v > 250).length;
                    
                    // Percentiles
                    const sorted = [...vals].sort((a, b) => a - b);
                    const p5 = sorted[Math.floor(sorted.length * 0.05)] || sorted[0];
                    const p25 = sorted[Math.floor(sorted.length * 0.25)] || sorted[0];
                    const p50 = sorted[Math.floor(sorted.length * 0.50)] || sorted[0];
                    const p75 = sorted[Math.floor(sorted.length * 0.75)] || sorted[0];
                    const p95 = sorted[Math.floor(sorted.length * 0.95)] || sorted[sorted.length - 1];
                    
                    hourlyStats.push({
                        hour: h,
                        count: vals.length,
                        min: Math.min(...vals),
                        max: Math.max(...vals),
                        mean: hMean,
                        sd: hSd,
                        p5, p25, p50, p75, p95,
                        tir: {
                            veryLow: (hVeryLow / vals.length * 100),
                            low: (hLow / vals.length * 100),
                            inRange: (hInRange / vals.length * 100),
                            high: (hHigh / vals.length * 100),
                            veryHigh: (hVeryHigh / vals.length * 100)
                        }
                    });
                }
                
                return {
                    days,
                    readingCount: total,
                    mean,
                    sd,
                    cv,
                    gmi,
                    tir,
                    hourlyStats
                };

                const devMap = { 'Deep Sleep': 'deepSleep', 'Dawn': 'dawn', 'Morning': 'morning', 'Afternoon': 'afternoon', 'Evening': 'evening', 'Sleep Onset': 'sleepOnset' };
                
                for (const p of periods) {
                    const yKey = devMap[p.name];
                    if (!yKey) continue;
                    const yVal = (yPd[yKey] !== null && yPd[yKey] !== '' && yPd[yKey] !== undefined) ? parseFloat(yPd[yKey]) : null;
                    const tVal = p.medianDeviation;
                    if (yVal !== null && tVal !== null) {
                        const diff = tVal - yVal;
                        const arrow = diff < -3 ? '↓ worsening' : diff > 3 ? '↑ improving' : '→ stable';
                        metrics.push({ label: `${p.name} dev`, prev: yVal.toFixed(0), curr: tVal.toFixed(0), delta: arrow });
                    }
                }
                
                if (metrics.length > 0) {
                    output += '**📊 Metrics:**\n';
                    output += '| Metric | Previous | Today | Δ |\n';
                    output += '|--------|----------|-------|---|\n';
                    for (const m of metrics) {

                    output += '\n';

                output += '---\n\n';

                    escalated: [],
                    deescalated: [],

                };

                        delete window[callbackName];
                        if (script.parentNode) script.parentNode.removeChild(script);

                    window[callbackName] = (data) => {
                        clearTimeout(timeout);
                        delete window[callbackName];
                        if (script.parentNode) script.parentNode.removeChild(script);
                        resolve(data);

                    const separator = url.includes('?') ? '&' : '?';

                        clearTimeout(timeout);

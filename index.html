                        for (const group of hypoGroups) {
                            const nadir = Math.min(...group.readings.map(r => r.sgv));
                            const eventEndMs = group.endMs;

                            // Check for BG recovery above 70 within 45 min of last sub-70 reading
                            const recoveryReadings = recentGlucose.filter(r => {
                                const t = new Date(r.dateString).getTime();
                                return t > eventEndMs &&
                                       t <= eventEndMs + RECOVERY_WINDOW_MS &&
                                       r.sgv >= RECOVERY_BG;
                            });

                            if (recoveryReadings.length === 0) {
                                // No confirmed recovery — skip, don't estimate treatment
                                console.log(`Hypo event nadir ${nadir}: no recovery detected, skipping`);
                                continue;
                            }

                            // Check if a logged carb entry covers this hypo period.
                            // Look back 60 minutes before hypo onset — a meal within that window
                            // is likely the cause of the low (post-meal nadir), meaning no glucose
                            // treatment would be given. Also look forward 15 min after the last
                            // sub-70 reading to catch carbs logged during an active low.
                            const alreadyLogged = loggedCarbTimes.some(lt =>
                                lt.time >= group.startMs - 20 * 60 * 1000 &&
                                lt.time <= eventEndMs + 15 * 60 * 1000
                            );

                            if (alreadyLogged) {
                                console.log(`Hypo event nadir ${nadir}: carbs already logged nearby, skipping estimation`);
                                continue;
                            }

                            // Map nadir to estimated treatment carbs
                            let treatCarbs;
                            if (nadir < 50)       treatCarbs = 30;
                            else if (nadir < 60)  treatCarbs = 15;
                            else if (nadir < 65)  treatCarbs = 8;
                            else                  treatCarbs = 6; // 65–70

                            estimatedTreatmentCarbs += treatCarbs;
                            hypoTreatmentEvents.push({
                                nadir,
                                time: new Date(group.startMs).toISOString(),
                                recoveredAt: new Date(recoveryReadings[0].dateString).toISOString(),
                                estimatedCarbs: treatCarbs
                            });

                            console.log(`Hypo event: nadir ${nadir} mg/dL → +${treatCarbs}g estimated treatment carbs`);
                        }

                        if (estimatedTreatmentCarbs > 0) {
                            console.log(`Estimated treatment carbs: +${estimatedTreatmentCarbs}g across ${hypoTreatmentEvents.length} hypo event(s)`);
                            totalCarbs24h += estimatedTreatmentCarbs;
                            console.log(`Adjusted total carbs (24h): ${totalCarbs24h}g (logged + estimated treatment)`);
                        }
                    }
                    // ── End Hypo Treatment Estimation ────────────────────────────────────────
                    
                    // Calculate Carb-Adjusted Sensitivity from Sheets history
                    let carbAdjSensitivity = null;
                    const basalTotal = activeSchedules?.basal 
                        ? activeSchedules.basal.reduce((sum, entry) => sum + entry.value, 0)
                        : 0;
                    console.log('Carb-Adjusted: Gate check -', {
                        hasSheetsUrl: !!sheetsWebAppUrl,
                        tdd24h: tdd24h,
                        totalCarbs24h: totalCarbs24h,
                        cacheSize: cachedSheetsEntries ? cachedSheetsEntries.length : 'NULL',
                        willEnter: !!(sheetsWebAppUrl && tdd24h && totalCarbs24h > 0)
                    });
                    if (sheetsWebAppUrl && tdd24h && totalCarbs24h > 0) {
                        try {
                            // Use cached entries from loadDynamicTarget (avoids redundant JSONP call)
                            let historyEntries = cachedSheetsEntries;
                            
                            if (!historyEntries) {
                                // Fallback: fetch if cache is empty (loadDynamicTarget may have failed)
                                console.log('Carb-Adjusted: No cached entries, fetching via JSONP...');
                                const historyUrl = `${sheetsWebAppUrl}?action=read&days=14`;
                                const historyData = await jsonpFetch(historyUrl);
                                historyEntries = (historyData.success && historyData.entries) ? historyData.entries : [];
                            } else {
                                console.log(`Carb-Adjusted: Using ${historyEntries.length} cached entries from loadDynamicTarget`);
                            }
                            
                            if (historyEntries.length > 0) {
                                // Log first entry fields for debugging
                                const sample = historyEntries[0];
                                console.log('Carb-Adjusted: Sample entry fields:', Object.keys(sample));
                                console.log('Carb-Adjusted: Sample entry values:', {
                                    tdd24h: sample.tdd24h, 
                                    carbs24h: sample.carbs24h, 
                                    isOverride: sample.isOverride,
                                    date: sample.date
                                });
                                
                                // Filter valid entries (non-override, has TDD and carbs)
                                const validEntries = historyEntries.filter(e => {
                                    const isOverride = e.isOverride === true || e.isOverride === 'TRUE' || e.isOverride === 'true';
                                    return !isOverride && 
                                        e.tdd24h && parseFloat(e.tdd24h) > 0 &&
                                        e.carbs24h && parseFloat(e.carbs24h) > 0;
                                });
                                
                                console.log(`Carb-Adjusted: ${validEntries.length} valid of ${historyEntries.length} total entries`);
                                
                                if (validEntries.length >= 3) {
                                    // Calculate baseline averages
                                    const avgTDD = validEntries.reduce((sum, e) => sum + parseFloat(e.tdd24h), 0) / validEntries.length;
                                    const avgCarbs = validEntries.reduce((sum, e) => sum + parseFloat(e.carbs24h), 0) / validEntries.length;
                                    
                                    // Calculate baseline basal
                                    let baselineBasal = basalTotal; // From earlier calculation
                                    
                                    // Calculate baseline bolus per carb
                                    const avgBolus = avgTDD - baselineBasal;
                                    const baselineBolusPerCarb = avgBolus / avgCarbs;
                                    
                                    // Calculate expected TDD for today's carbs
                                    const expectedBolus = baselineBolusPerCarb * totalCarbs24h;
                                    const expectedTDD = expectedBolus + baselineBasal;
                                    
                                    // Carb-Adjusted Sensitivity = Expected / Actual
                                    carbAdjSensitivity = expectedTDD / tdd24h;
                                    
                                    console.log('Carb-Adjusted calculation:', {
                                        validEntries: validEntries.length,
                                        avgTDD: avgTDD.toFixed(1),
                                        avgCarbs: avgCarbs.toFixed(0),
                                        baselineBasal: baselineBasal.toFixed(1),
                                        baselineBolusPerCarb: baselineBolusPerCarb.toFixed(3),
                                        todayCarbs: totalCarbs24h,
                                        expectedTDD: expectedTDD.toFixed(1),
                                        actualTDD: tdd24h,
                                        carbAdjSensitivity: carbAdjSensitivity.toFixed(2)
                                    });
                                } else {
                                    console.log(`Insufficient history for Carb-Adjusted calculation (${validEntries.length} entries, need 3+)`);
                                }
                            } else {
                                console.log('No history available from Sheets');
                            }
                        } catch (err) {
                            console.warn('Carb-Adjusted: ERROR:', err.message, err.stack);
                        }
                    } else {
                        console.log('Carb-Adjusted: Skipped - gate check failed');
                    }
                    
                    
                    // Run signal analysis with principled ISF/TDD-based calculation
                    const signalAnalysis = SignalAnalysis.analyzeCleanWindows(
                        nightscoutData, 
                        basalSignalWindow, 
                        targetBG,
                        activeSchedules.basal,
                        activeSchedules.isf,
                        tddForSignal
                    );
                    
                    // BUG-023: Apply signal fallback if dynamic target unavailable
                    if (effectiveTargetSource === 'signal-fallback' && signalAnalysis?.signalOnlyAnchor) {
                        effectiveBasalTarget = signalAnalysis.signalOnlyAnchor;
                        console.log(`Applied signal fallback: Using today's signal ${effectiveBasalTarget.toFixed(1)}% as target`);
                    }
                    
                    // Event claiming system
                    const claimedEvents = {
                        meals: new Set(),
                        corrections: new Set(),
                        highs: new Set(),
                        lows: new Set()
                    };
                    
                    // Run all detectors to produce findings
                    const allFindings = [];
                    
                    // Detector 1b: Transient High with Subsequent Low (more specific pattern - runs first)
                    allFindings.push(...PatternDetectors.detectTransientHighWithLow(
                        lowProblems, nightscoutData, activeSchedules.cr, claimedEvents, analysisWindow
                    ));
                    
                    // Detector 1: Direct Meal-Induced Lows
                    allFindings.push(...PatternDetectors.detectDirectMealLows(
                        lowProblems, nightscoutData, activeSchedules.cr, claimedEvents, analysisWindow
                    ));
                    
                    // Detector 2: ISF-Induced Lows (Correction Overcorrection)
                    allFindings.push(...PatternDetectors.detectISFInducedLows(
                        lowProblems, nightscoutData, activeSchedules.isf, claimedEvents, analysisWindow
                    ));
                    
                    // Detector 3: Post-Meal Highs
                    allFindings.push(...PatternDetectors.detectPostMealHighs(
                        nightscoutData, activeSchedules.cr, claimedEvents, analysisWindow
                    ));
                    
                    // Detector 4: Basal Signals
                    allFindings.push(...PatternDetectors.detectBasalSignals(
                        signalAnalysis, activeSchedules.basal, effectiveBasalTarget, basalSignalWindow
                    ));
                    
                    // Detector 5: Unexplained Lows
                    allFindings.push(...PatternDetectors.detectUnexplainedLows(
                        lowProblems, nightscoutData, activeSchedules.basal, claimedEvents, analysisWindow
                    ));
                    
                    // Detector 6: Correction Ineffectiveness (overnight ISF strengthening)
                    allFindings.push(...PatternDetectors.detectCorrectionIneffectiveness(
                        nightscoutData, activeSchedules.isf, claimedEvents, analysisWindow, nightscoutData.profile
                    ));
                    
                    // BUG-003: Add basal ratio exceeded finding if applicable
                    if (basalRatioInfo && basalRatioInfo.exceedsCap) {
                        allFindings.push({
                            id: `finding_ratio_${Date.now()}`,
                            type: FindingType.BASAL_RATIO_EXCEEDED,
                            detectedAt: new Date().toISOString(),
                            scheduleTime: null,
                            period: 'All',
                            severity: 0.95,
                            events: [{
                                ratio: basalRatioInfo.ratio,
                                cap: basalRatioInfo.cap,
                                maxRate: basalRatioInfo.maxRate,
                                maxHour: basalRatioInfo.maxHour,
                                minRate: basalRatioInfo.minRate,
                                minHour: basalRatioInfo.minHour
                            }],
                            similarEventsCount: 1,
                            daysWithPattern: 1,
                            primaryParameter: 'basal',
                            suggestedChangePercent: 0,
                            contributingFactors: ['extreme_basal_ratio'],
                            claimedEventIds: [],
                            conflictsWith: [],
                            recencyWeight: 1.0,
                            details: `Basal ratio ${basalRatioInfo.ratio.toFixed(1)}:1 exceeds ${basalRatioInfo.cap}:1 guideline. Max ${basalRatioInfo.maxRate} U/hr at ${basalRatioInfo.maxHour}, Min ${basalRatioInfo.minRate} U/hr at ${basalRatioInfo.minHour}. Extreme ratios can mask CR/ISF issues - normalize basal first.`
                        });
                        
                        // Apply confidence penalty to CR/ISF findings
                        allFindings.forEach(f => {
                            if (f.primaryParameter === 'CR' || f.primaryParameter === 'ISF') {
                                f.severity = f.severity * 0.8; // 20% penalty
                                f.contributingFactors = f.contributingFactors || [];
                                f.contributingFactors.push('penalized_basal_ratio');
                            }
                        });
                    }
                    
                    // Aggregate similar findings
                    const aggregatedFindings = aggregateFindings(allFindings);
                    
                    // Calculate current basal percent for comparison
                    let currentBasalTotal = 0;
                    let currentBasalPercent = null;
                    
                    if (activeSchedules?.basal && Array.isArray(activeSchedules.basal)) {
                        currentBasalTotal = activeSchedules.basal.reduce((sum, entry, idx, arr) => {
                            const nextIdx = (idx + 1) % arr.length;
                            const currentHour = parseInt(entry.time.split(':')[0]);
                            const nextHour = nextIdx === 0 ? 24 : parseInt(arr[nextIdx].time.split(':')[0]);
                            const hours = nextHour - currentHour;
                            return sum + (entry.value * hours);
                        }, 0);
                        currentBasalPercent = tddForSignal ? (currentBasalTotal / tddForSignal) * 100 : null;
                    } else {
                        console.warn('activeSchedules.basal not available, using basalSchedule fallback');
                        currentBasalTotal = basalSchedule.reduce((sum, entry) => sum + entry.value, 0);
                        currentBasalPercent = tddForSignal ? (currentBasalTotal / tddForSignal) * 100 : null;
                    }
                    
                    // BUG-023 FIX 2: Safety override when LOW signals dominate
                    // Count period signals
                    let lowPeriodCount = 0;
                    let highPeriodCount = 0;
                    let safetyOverrideActive = false;
                    let safetyOverrideReason = null;
                    
                    if (signalAnalysis?.periods) {
                        signalAnalysis.periods.forEach(p => {
                            if (p.medianDeviation < -10) lowPeriodCount++;
                            else if (p.medianDeviation > 10) highPeriodCount++;
                        });
                    }
                    
                    const todaySignal = signalAnalysis?.signalOnlyAnchor;
                    
                    console.log('=== Safety Override Check ===');
                    console.log(`LOW periods: ${lowPeriodCount}, HIGH periods: ${highPeriodCount}`);
                    console.log(`Today's signal: ${todaySignal?.toFixed(1)}%, Current: ${currentBasalPercent?.toFixed(1)}%, Target: ${effectiveBasalTarget?.toFixed(1)}%`);
                    
                    // Calculate Final % for basal optimization (same logic as auto-log)
                    let finalPercent = effectiveBasalTarget;
                    
                    // Safety override: don't increase basal when multiple periods are LOW
                    if (lowPeriodCount >= 2 && effectiveBasalTarget > currentBasalPercent) {
                        // Multiple LOW signals + target wants increase = DANGER
                        if (todaySignal !== null && todaySignal < currentBasalPercent) {
                            // Today's signal ALSO says decrease - definitely don't increase
                            finalPercent = Math.min(currentBasalPercent, todaySignal);
                            safetyOverrideActive = true;
                            safetyOverrideReason = `${lowPeriodCount} periods show LOW signals and today's signal (${todaySignal.toFixed(1)}%) < current (${currentBasalPercent.toFixed(1)}%). Using today's signal instead of target.`;
                        } else {
                            // Today's signal is neutral/high but periods are LOW - hold at current
                            finalPercent = currentBasalPercent;
                            safetyOverrideActive = true;
                            safetyOverrideReason = `${lowPeriodCount} periods show LOW signals. Holding at current (${currentBasalPercent.toFixed(1)}%) instead of increasing to target (${effectiveBasalTarget.toFixed(1)}%).`;
                        }
                        console.log(`SAFETY OVERRIDE: ${safetyOverrideReason}`);
                    }
                    
                    // Safety override: don't decrease basal when multiple periods are HIGH  
                    if (highPeriodCount >= 2 && effectiveBasalTarget < currentBasalPercent) {
                        if (todaySignal !== null && todaySignal > currentBasalPercent) {
                            finalPercent = Math.max(currentBasalPercent, todaySignal);
                            safetyOverrideActive = true;
                            safetyOverrideReason = `${highPeriodCount} periods show HIGH signals and today's signal (${todaySignal.toFixed(1)}%) > current (${currentBasalPercent.toFixed(1)}%). Using today's signal instead of target.`;
                        } else {
                            finalPercent = currentBasalPercent;
                            safetyOverrideActive = true;
                            safetyOverrideReason = `${highPeriodCount} periods show HIGH signals. Holding at current (${currentBasalPercent.toFixed(1)}%) instead of decreasing to target (${effectiveBasalTarget.toFixed(1)}%).`;
                        }
                        console.log(`SAFETY OVERRIDE: ${safetyOverrideReason}`);
                    }
                    
                    finalPercent = Math.max(30, Math.min(50, finalPercent)); // Guardrails
                    if (yesterdayFinal !== null && yesterdayFinal !== undefined) {
                        const maxDailyChange = 2.0;
                        if (finalPercent > yesterdayFinal + maxDailyChange) {
                            finalPercent = yesterdayFinal + maxDailyChange;
                        }
                        if (finalPercent < yesterdayFinal - maxDailyChange) {
                            finalPercent = yesterdayFinal - maxDailyChange;
                        }
                    }
                    console.log('Final % for basal optimization:', finalPercent.toFixed(2), safetyOverrideActive ? '(SAFETY OVERRIDE)' : '');
                    
                    // Generate proposed basal schedule
                    const basalOptimization = BasalOptimizer.generateProposedSchedule({
                        currentBasalSchedule: activeSchedules.basal,
                        periodSignals: signalAnalysis?.periods,
                        finalPercent: finalPercent,
                        tdd: tddForSignal
                    });
                    
                    // Add safety override info to optimization result
                    if (basalOptimization) {
                        basalOptimization.safetyOverride = safetyOverrideActive;
                        basalOptimization.safetyOverrideReason = safetyOverrideReason;
                    }
                    
                    // Detect body state
                    const changeHistory = ChangeTracker.getHistory();
                    const detectedState = StateDetector.detect(
                        signalAnalysis,
                        null, // TDD history not yet implemented
                        changeHistory,
                        userOverride.active ? userOverride : null
                    );
                    
                    // Run recommendation engine
                    const schedules = activeSchedules;
                    const processedBundles = RecommendationEngine.process(
                        aggregatedFindings,
                        detectedState,
                        signalAnalysis,
                        schedules,
                        basalRatioInfo
                    );
                    
                    // Set results
                    setAnalysisResults({
                        findings: aggregatedFindings,
                        signalAnalysis,
                        lowCount: lowProblems.length,
                        nightscoutData,
                        basalRatioInfo,
                        activeSchedules,
                        effectiveBasalTarget,
                        effectiveTargetSource,
                        finalPercent,
                        basalOptimization,
                        tdd: tddForSignal,  // For calculations (2-week preferred)
                        tdd24h: tdd24h,     // 24-hour TDD for trend comparison
                        tdd2Week: tdd2Week, // 2-week TDD for stable baseline
                        totalCarbs24h: totalCarbs24h,  // Total carbs in last 24h (logged + estimated treatment)
                        estimatedTreatmentCarbs: estimatedTreatmentCarbs > 0 ? estimatedTreatmentCarbs : null,
                        hypoTreatmentEvents: hypoTreatmentEvents.length > 0 ? hypoTreatmentEvents : null,
                        insulinPerCarb: (tdd24h && totalCarbs24h > 0) ? (tdd24h / totalCarbs24h).toFixed(3) : null,
                        carbAdjSensitivity: carbAdjSensitivity ? carbAdjSensitivity.toFixed(2) : null
                    });
                    setBodyState(detectedState);
                    setBundles(processedBundles);
                    setStep('results');
                    
                    // Auto-log to Google Sheets (if configured and not in override)
                    attemptAutoLog(signalAnalysis, detectedState, aggregatedFindings, basalRatioInfo, nightscoutData, effectiveBasalTarget, yesterdayFinal, activeSchedules, processedBundles, carbAdjSensitivity);
                    
                } catch (err) {
                    console.error('Analysis error:', err);
                    setError(err.message);
                    setStep('config');
                }
            };
            
            // Aggregate similar findings with recency tracking
            const aggregateFindings = (findings) => {
                const grouped = {};
                const now = new Date();
                
                // Finding types that are always "current" (structural or from current analysis)
                const alwaysCurrentTypes = [
                    'basal_ratio_exceeded',
                    'basal_signal_high',
                    'basal_signal_low', 
                    'basal_signal_neutral',
                    'slot_conflict'
                ];
                
                findings.forEach(finding => {
                    const key = `${finding.type}_${finding.scheduleTime}_${finding.primaryParameter}`;
                    
                    // Check if this is a structural finding that's always current
                    const isAlwaysCurrent = alwaysCurrentTypes.some(t => finding.type?.includes(t)) ||
                                           finding.type?.startsWith('basal_signal') ||
                                           finding.type === 'basal_ratio_exceeded';
                    
                    // Get event time from finding - try multiple sources (BUG-022: prioritize eventTime)
                    let eventTime = null;
                    if (finding.eventTime) {
                        // New field added to all detectors
                        eventTime = new Date(finding.eventTime);
                    } else if (finding.time) {
                        eventTime = new Date(finding.time);
                    } else if (finding.localTime) {
                        eventTime = new Date(finding.localTime);
                    } else if (finding.events?.[0]) {
                        // Try to get original timestamp from events
                        const event = finding.events[0];
                        const eventTimeStr = event.created_at || event.dateString || event.localTime;
                        if (eventTimeStr) {
                            eventTime = new Date(eventTimeStr);
                        }
                    }
                    
                    // Validate the parsed date
                    if (eventTime && isNaN(eventTime.getTime())) {
                        console.log(`Invalid date for finding ${finding.type}: eventTime=${finding.eventTime}, time=${finding.time}`);
                        eventTime = null;
                    }
                    
                    const hoursAgo = eventTime ? (now - eventTime) / (1000 * 60 * 60) : null;
                    
                    if (!grouped[key]) {
                        grouped[key] = { 
                            ...finding, 
                            similarEventsCount: 1,
                            // Recency tracking
                            eventsLast24h: isAlwaysCurrent ? 1 : (hoursAgo !== null && hoursAgo <= 24 ? 1 : 0),
                            eventsLast3Days: isAlwaysCurrent ? 1 : (hoursAgo !== null && hoursAgo <= 72 ? 1 : 0),
                            mostRecentTime: isAlwaysCurrent ? now : eventTime,
                            hoursSinceMostRecent: isAlwaysCurrent ? 0 : hoursAgo,
                            isStructural: isAlwaysCurrent
                        };
                    } else {
                        grouped[key].similarEventsCount++;
                        grouped[key].events = [...(grouped[key].events || []), ...(finding.events || [])];
                        grouped[key].severity = Math.max(grouped[key].severity, finding.severity);
                        grouped[key].daysWithPattern = (grouped[key].daysWithPattern || 1) + 1;
                        
                        // Update recency tracking (skip for structural findings)
                        if (!isAlwaysCurrent && hoursAgo !== null) {
                            if (hoursAgo <= 24) grouped[key].eventsLast24h++;
                            if (hoursAgo <= 72) grouped[key].eventsLast3Days++;
                            
                            // Track most recent
                            if (!grouped[key].mostRecentTime || eventTime > grouped[key].mostRecentTime) {
                                grouped[key].mostRecentTime = eventTime;
                                grouped[key].hoursSinceMostRecent = hoursAgo;
                            }
                        }
                    }
                });
                
                // Calculate recency tier for each grouped finding
                Object.values(grouped).forEach(finding => {
                    // Structural findings are always current
                    if (finding.isStructural) {
                        finding.recencyTier = 'CURRENT';
                        finding.eventsLast24h = Math.max(1, finding.eventsLast24h);
                        finding.eventsLast3Days = Math.max(1, finding.eventsLast3Days);
                        finding.hoursSinceMostRecent = 0;
                        console.log(`Finding ${finding.type} @ ${finding.scheduleTime}: STRUCTURAL - always current`);
                        return;
                    }
                    
                    const hours = finding.hoursSinceMostRecent;
                    if (hours === null || hours === undefined || isNaN(hours)) {
                        finding.recencyTier = 'UNKNOWN';
                    } else if (hours <= 24) {
                        finding.recencyTier = 'CURRENT';
                    } else if (hours <= 72) {
                        finding.recencyTier = 'RECENT';
                    } else if (hours <= 168) { // 7 days
                        finding.recencyTier = 'STALE';
                    } else {
                        finding.recencyTier = 'EXPIRED';
                    }
                    
                    console.log(`Finding ${finding.type} @ ${finding.scheduleTime}: ${finding.eventsLast24h} last 24h, ${finding.eventsLast3Days} last 3d, hours=${hours?.toFixed(1)}, tier=${finding.recencyTier}`);
                });
                
                return Object.values(grouped);
            };
            
            // Copy for Claude review
            const copyForClaudeReview = async () => {
                console.log('=== copyForClaudeReview called ===');
                
                if (!analysisResults) {
                    console.error('copyForClaudeReview: Missing analysisResults');
                    alert('Analysis not complete. Please run analysis first.');
                    return;
                }
                if (!bodyState) {
                    console.error('copyForClaudeReview: Missing bodyState');
                    alert('Body state not detected. Please run analysis first.');
                    return;
                }
                if (!bundles) {
                    console.error('copyForClaudeReview: Missing bundles');
                    alert('Recommendations not generated. Please run analysis first.');
                    return;
                }
                
                try {
                    const schedules = { cr: crSchedule, isf: isfSchedule, basal: basalSchedule, targetBG: targetBGSchedule };
                    console.log('Calling OutputFormatter.formatForClaude with:', {
                        hasAnalysisResults: !!analysisResults,
                        hasBodyState: !!bodyState,
                        bundlesCount: bundles?.length,
                        hasSchedules: !!schedules,
                        hasDynamicTarget: !!dynamicTarget,
                        detectedChangesCount: detectedChanges?.length || 0
                    });
                    
                    const output = OutputFormatter.formatForClaude(
                        analysisResults,
                        bodyState,
                        bundles,
                        schedules,
                        CONFIG,
                        dynamicTarget,
                        detectedChanges,
                        cachedSheetsEntries || [] // Pass cached history for period TIR trends
                    );
                    
                    // SPEC 3: Extract yesterday's entry from cache for delta comparison
                    let yesterdayEntry = null;
                    if (cachedSheetsEntries && cachedSheetsEntries.length > 0) {
                        const sorted = [...cachedSheetsEntries].sort((a, b) => new Date(a.date) - new Date(b.date));
                        const todayStr = new Date().toISOString().split('T')[0];
                        // Find most recent entry that is NOT from today
                        for (let i = sorted.length - 1; i >= 0; i--) {
                            const entryDate = sorted[i].date ? new Date(sorted[i].date).toISOString().split('T')[0] : null;
                            if (entryDate && entryDate !== todayStr) {
                                yesterdayEntry = sorted[i];
                                break;
                            }
                        }
                        console.log('Delta View: Yesterday entry:', yesterdayEntry ? new Date(yesterdayEntry.date).toLocaleDateString() : 'none found');
                    }
                    
                    // Generate structured JSON export
                    let structuredJSON = '';
                    try {
                        const structured = OutputFormatter.generateStructuredExport(
                            analysisResults,
                            bodyState,
                            bundles,
                            schedules,
                            CONFIG,
                            dynamicTarget,
                            detectedChanges,
                            yesterdayEntry
                        );
                        structuredJSON = '# STRUCTURED DATA (for Claude analysis)\n\n```json\n' + 
                            JSON.stringify(structured, null, 2) + '\n```\n\n---\n\n';
                        console.log('Structured JSON generated, keys:', Object.keys(structured));
                    } catch (jsonErr) {
                        console.error('Structured JSON generation failed (continuing with markdown only):', jsonErr);
                    }
                    
                    // SPEC 3: Generate delta section for markdown
                    let deltaSection = '';
                    try {
                        // Get today's signals from the analysis results for metrics comparison
                        const todaySignals = (() => {
                            try {
                                const parsed = JSON.parse(structuredJSON.match(/```json\n([\s\S]*?)\n```/)?.[1] || '{}');
                                return parsed.signals || null;
                            } catch(e) { return null; }
                        })();
                        deltaSection = OutputFormatter.generateDeltaSection(bundles, yesterdayEntry, todaySignals);
                        console.log('Delta section generated, length:', deltaSection.length);
                    } catch (deltaErr) {
                        console.error('Delta section generation failed:', deltaErr);
                        deltaSection = '';
                    }
                    
                    // SPEC 2: Build trend section from cached Sheets data (no async fetch needed)
                    let trendSection = '';
                    if (cachedSheetsEntries && cachedSheetsEntries.length > 0) {
                        try {
                            // Filter to last 14 days from cached entries
                            const fourteenDaysAgo = new Date(Date.now() - 14 * 24 * 60 * 60 * 1000);
                            const recentEntries = cachedSheetsEntries.filter(e => {
                                const d = new Date(e.date || e.timestamp);
                                return d >= fourteenDaysAgo;
                            });
                            console.log(`Trend section: Using ${recentEntries.length} cached entries (of ${cachedSheetsEntries.length} total)`);
                            
                            // Build current session data for comparison
                            const currentData = {
                                primaryActions: (bundles || []).filter(b => b.priority === 'PRIMARY').map(b => ({
                                    name: b.name,
                                    timeBlock: b.timeBlock || 'General'
                                })),
                                watchItems: (bundles || []).filter(b => b.priority === 'REFERENCE').map(b => ({
                                    name: b.name,
                                    status: b.demotedReason || b.blockedBy || 'deferred'
                                }))
                            };
                            
                            trendSection = OutputFormatter.generateTrendSection(recentEntries, currentData);
                        } catch (trendErr) {
                            console.error('Trend section generation failed:', trendErr);
                            trendSection = '# TREND CONTEXT\n\n_Error generating trend section_\n\n---\n\n';
                        }
                    } else if (sheetsWebAppUrl) {
                        // Fallback: fetch if no cache (shouldn't happen normally)
                        try {
                            console.log('Trend section: No cache, fetching via JSONP...');
                            const historyData = await jsonpFetch(`${sheetsWebAppUrl}?action=read&days=14`);
                            
                            if (historyData.success && historyData.entries && historyData.entries.length > 0) {
                                const currentData = {
                                    primaryActions: (bundles || []).filter(b => b.priority === 'PRIMARY').map(b => ({
                                        name: b.name,
                                        timeBlock: b.timeBlock || 'General'
                                    })),
                                    watchItems: (bundles || []).filter(b => b.priority === 'REFERENCE').map(b => ({
                                        name: b.name,
                                        status: b.demotedReason || b.blockedBy || 'deferred'
                                    }))
                                };
                                trendSection = OutputFormatter.generateTrendSection(historyData.entries, currentData);
                            }
                        } catch (trendErr) {
                            console.error('Trend history fetch failed (continuing without trends):', trendErr);
                            trendSection = '# TREND CONTEXT\n\n_Failed to fetch history: ' + trendErr.message + '_\n\n---\n\n';
                        }
                    } else {
                        trendSection = '# TREND CONTEXT\n\n_No Google Sheets URL configured. Configure Sheets URL to enable trend tracking._\n\n---\n\n';
                    }
                    
                    // SPEC 3: Inject delta section between Current State and Tonight's Action
                    let enrichedOutput = output;
                    if (deltaSection) {
                        enrichedOutput = output.replace(
                            '## Tonight\'s Action',
                            deltaSection + '## Tonight\'s Action'
                        );
                    }
                    
                    const combinedOutput = structuredJSON + trendSection + enrichedOutput;
                    
                    if (!output) {
                        console.error('copyForClaudeReview: formatForClaude returned empty');
                        alert('Failed to generate report. Check console for details.');
                        return;
                    }
                    
                    console.log('Output generated, markdown length:', output.length, 'total length:', combinedOutput.length);
                    
                    try {
                        // Try modern Clipboard API first
                        if (navigator.clipboard && navigator.clipboard.writeText) {
                            await navigator.clipboard.writeText(combinedOutput);
                            setCopyStatus('copied');
                            setTimeout(() => setCopyStatus('idle'), 2000);
                        } else {
                            throw new Error('Clipboard API not available');
                        }
                    } catch (clipboardErr) {
                        console.error('Clipboard API failed:', clipboardErr);
                        // iOS-compatible fallback: element must be visible and use setSelectionRange
                        const textarea = document.createElement('textarea');
                        textarea.value = combinedOutput;
                        textarea.setAttribute('readonly', '');
                        textarea.style.position = 'fixed';
                        textarea.style.left = '0';
                        textarea.style.top = '0';
                        textarea.style.opacity = '0.01';
                        textarea.style.width = '1px';
                        textarea.style.height = '1px';
                        document.body.appendChild(textarea);
                        textarea.focus();
                        textarea.setSelectionRange(0, combinedOutput.length);
                        const success = document.execCommand('copy');
                        document.body.removeChild(textarea);
                        if (success) {
                            setCopyStatus('copied');
                            setTimeout(() => setCopyStatus('idle'), 2000);
                        } else {
                            setCopyStatus('idle');
                            alert('Copy failed on this browser. Try long-pressing the button, or use Chrome/Safari.');
                        }
                    }
                } catch (err) {
                    console.error('copyForClaudeReview error:', err);
                    console.error('Error stack:', err.stack);
                    setCopyStatus('idle');
                    alert('Error generating report: ' + err.message + '\n\nCheck browser console for details.');
                }
            };
            
            // Helper: Convert schedule array to object for JSON storage
            const scheduleToObject = (scheduleArray) => {
                if (!scheduleArray || !Array.isArray(scheduleArray)) return null;
                const obj = {};
                scheduleArray.forEach(entry => {
                    obj[entry.time] = entry.value;
                });
                return obj;
            };
            
            // Helper: Compare schedules and detect changes
            const detectScheduleChanges = (todaySchedules, yesterdaySchedules) => {
                if (!yesterdaySchedules) return [];
                
                const changes = [];
                const paramTypes = ['basal', 'cr', 'isf'];
                
                paramTypes.forEach(paramType => {
                    const today = todaySchedules[paramType];
                    const yesterday = yesterdaySchedules[paramType];
                    
                    if (!today || !yesterday) return;
                    
                    // Compare each time slot
                    Object.keys(today).forEach(time => {
                        const todayVal = today[time];
                        const yesterdayVal = yesterday[time];
                        
                        if (yesterdayVal !== undefined && todayVal !== yesterdayVal) {
                            const changePercent = ((todayVal - yesterdayVal) / yesterdayVal * 100).toFixed(1);
                            changes.push({
                                type: paramType,
                                time: time,
                                from: yesterdayVal,
                                to: todayVal,
                                changePercent: parseFloat(changePercent)
                            });
                        }
                    });
                });
                
                return changes;
            };
            
            // State for detected changes
            const [detectedChanges, setDetectedChanges] = useState([]);
            const [yesterdayScheduleDate, setYesterdayScheduleDate] = useState(null);
            
            // Save Decision Log to Google Sheets (standalone - only writes Decision_Log column)
            const saveDecisionLog = async () => {
                if (!sheetsWebAppUrl) return;
                if (!decisionLog.trim()) {
                    setDecisionLogStatus('error');
                    setTimeout(() => setDecisionLogStatus('idle'), 2000);
                    return;
                }
                setDecisionLogStatus('saving');
                try {
                    await fetch(sheetsWebAppUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            date: getLocalDateString(),
                            decisionLogOnly: true,
                            decisionLog: decisionLog.trim()
                        })
                    });
                    setDecisionLogStatus('success');
                    setTimeout(() => setDecisionLogStatus('idle'), 3000);
                } catch (err) {
                    setDecisionLogStatus('error');
                    setTimeout(() => setDecisionLogStatus('idle'), 3000);
                }
            };

            // Log to Google Sheets
            const logToGoogleSheets = async () => {
                if (!sheetsWebAppUrl) {
                    setLogStatus('error');
                    setLogMessage('Please configure Google Sheets URL first');
                    return;
                }
                
                if (!analysisResults || !analysisResults.signalAnalysis) {
                    setLogStatus('error');
                    setLogMessage('No analysis data to log');
                    return;
                }
                
                setLogStatus('logging');
                setLogMessage('Logging to Google Sheets...');
                
                // Build payload from signal analysis - match v25 format
                const getPeriodDev = (name) => {
                    const period = analysisResults.signalAnalysis.periods.find(p => p.name === name);
                    return period?.medianDeviation !== null && period?.medianDeviation !== undefined 
                        ? period.medianDeviation.toFixed(1) 
                        : '';
                };
                
                // Count clean windows total
                const cleanWindowsTotal = analysisResults.signalAnalysis.periods.reduce(
                    (sum, p) => sum + (p.cleanWindowCount || 0), 0
                );
                
                // Calculate TDD from iAPS deviceStatus
                let tdd = null;
                const nightscoutData = analysisResults.nightscoutData;
                if (nightscoutData?.deviceStatus) {
                    for (let i = 0; i < Math.min(5, nightscoutData.deviceStatus.length); i++) {
                        const status = nightscoutData.deviceStatus[i];
                        if (status.openaps?.enacted?.reason) {
                            const reason = status.openaps.enacted.reason;
                            const twoWeekMatch = reason.match(/2week TDD (\d+\.?\d*)/);
                            if (twoWeekMatch) {
                                tdd = parseFloat(twoWeekMatch[1]);
                                break;
                            }
                            const currentMatch = reason.match(/Insulin 24h: (\d+\.?\d*)/);
                            if (currentMatch && !tdd) {
                                tdd = parseFloat(currentMatch[1]);
                            }
                        }
                    }
                }
                
                // Use effective target from analysis (BUG-018)
                const targetPercent = analysisResults.effectiveBasalTarget || basalTDDPercent;
                
                // Calculate signal % and gap
                const signalPercent = analysisResults.signalAnalysis.signalOnlyAnchor || targetPercent;
                const gap = signalPercent ? (signalPercent - targetPercent) : 0;
                
                // Calculate final %
                // Logic: Final % = Target % rate-limited to Yesterday's Final % Â± 2%
                let finalPercent = targetPercent;
                
                // Apply guardrails (30-50%)
                finalPercent = Math.max(30, Math.min(50, finalPercent));
                
                // Rate limit: max Â±2% per day from yesterday's final
                const maxDailyChange = 2.0;
                const yesterdayFinal = dynamicTarget?.yesterdayFinal;
                if (yesterdayFinal !== null && yesterdayFinal !== undefined) {
                    if (finalPercent > yesterdayFinal + maxDailyChange) {
                        finalPercent = yesterdayFinal + maxDailyChange;
                    }
                    if (finalPercent < yesterdayFinal - maxDailyChange) {
                        finalPercent = yesterdayFinal - maxDailyChange;
                    }
                }
                // If no yesterday final, just use target (guardrailed)
                
                // Determine direction based on gap
                let direction = 'none';
                if (gap > 0.5) direction = 'increase';
                else if (gap < -0.5) direction = 'decrease';
                
                // Estimate increments needed
                const incrementsNeeded = Math.round(gap / 0.25);
                
                const payload = {
                    // Date for deduplication
                    date: getLocalDateString(),
                    timestamp: new Date().toISOString(),
                    analysisWindow: basalSignalWindow,
                    tdd: tdd ? tdd.toFixed(1) : '',
                    // Required for Insulin_per_Carb and Carb_Adj_Sensitivity columns (BUG-FIX: missing fields)
                    tdd24h: analysisResults?.tdd24h ? parseFloat(analysisResults.tdd24h).toFixed(1) : (tdd ? tdd.toFixed(1) : ''),
                    carbs24h: analysisResults?.totalCarbs24h ? parseFloat(analysisResults.totalCarbs24h).toFixed(0) : '',
                    carbAdjSensitivity: analysisResults?.carbAdjSensitivity || '',
                    signalPercent: signalPercent?.toFixed?.(1) || String(signalPercent) || '',
                    targetPercent: targetPercent,
                    gap: gap.toFixed(1),
                    finalPercent: finalPercent?.toFixed?.(1) || '',
                    cleanWindows: cleanWindowsTotal,
                    deepSleepDev: getPeriodDev('Deep Sleep'),
                    dawnDev: getPeriodDev('Dawn'),
                    morningDev: getPeriodDev('Morning'),
                    afternoonDev: getPeriodDev('Afternoon'),
                    eveningDev: getPeriodDev('Evening'),
                    sleepOnsetDev: getPeriodDev('Sleep Onset'),
                    incrementsApplied: incrementsNeeded,
                    direction: direction,
                    isOverride: bodyState?.state === BodyStateType.OVERRIDE_ACTIVE,
                    notes: loggingNotes || 'Manual',
                    // Schedule snapshots for change detection (FEATURE-004)
                    schedules: {
                        basal: scheduleToObject(basalSchedule),
                        cr: scheduleToObject(crSchedule),
                        isf: scheduleToObject(isfSchedule)
                    },
                    // SPEC 2: Trend tracking columns

                        try {
                            const agp = OutputFormatter.calculateAGP(analysisResults?.nightscoutData?.glucose, 7);
                            return agp ? agp.tir.inRange.toFixed(1) : '';
                        } catch(e) { return ''; }
                    })(),
                    basalRatio: analysisResults?.basalRatioInfo?.ratio ? analysisResults.basalRatioInfo.ratio.toFixed(1) : '',
                    // SPEC 2+: Period TIR tracking
                    tirDeepSleep: (() => {
                        try {
                            const agp = OutputFormatter.calculateAGP(analysisResults?.nightscoutData?.glucose, 7);
                            const tir = OutputFormatter.calculatePeriodTIR(agp, 'Deep Sleep');
                            return tir !== null ? tir.toString() : '';
                        } catch(e) { return ''; }
                    })(),
                    tirDawn: (() => {
                        try {
                            const agp = OutputFormatter.calculateAGP(analysisResults?.nightscoutData?.glucose, 7);
                            const tir = OutputFormatter.calculatePeriodTIR(agp, 'Dawn');
                            return tir !== null ? tir.toString() : '';
                        } catch(e) { return ''; }
                    })(),

                            const tir = OutputFormatter.calculatePeriodTIR(agp, 'Morning');

                            const tir = OutputFormatter.calculatePeriodTIR(agp, 'Sleep Onset');
                            return tir !== null ? tir.toString() : '';
                        } catch(e) { return ''; }
                    })(),
                    primaryActions: (() => {
                        try {
                            const primary = (bundles || []).filter(b => b.priority === 'PRIMARY');
                            return JSON.stringify(primary.map(b => ({
                                name: b.name,
                                timeBlock: b.timeBlock || 'General',
                                urgent: b.isUrgent || false,
                                recs: (b.recommendations || []).map(r => `${r.scheduleTime} ${r.param} ${r.changePercent > 0 ? '+' : ''}${r.changePercent.toFixed(1)}%`).join('; ')
                            })));
                        } catch(e) { return '[]'; }
                    })(),
                    watchItems: (() => {
                        try {
                            const watch = (bundles || []).filter(b => b.priority === 'REFERENCE');
                            return JSON.stringify(watch.map(b => ({
                                name: b.name,
                                status: b.demotedReason || b.blockedBy || 'deferred',
                                confidence: b.confidence ? b.confidence.toFixed(2) : '0'
                            })));
                        } catch(e) { return '[]'; }
                    })()
                };
                
                try {
                    // POST with no-cors for Apps Script compatibility
                    await fetch(sheetsWebAppUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    // no-cors means we can't read response, show optimistic success
                    setLogStatus('success');
                    setLogMessage('Logged successfully!');
                    setLoggingNotes(''); // Clear notes after logging
                    
                    // Reset status after 3 seconds
                    setTimeout(() => {
                        setLogStatus('idle');
                        setLogMessage('');
                    }, 3000);
                    
                } catch (error) {
                    console.error('Failed to log:', error);
                    setLogStatus('error');
                    setLogMessage('Failed to log: ' + error.message);
                }
            };
            
            // Log a change
            const logAppliedChange = (recommendation) => {
                ChangeTracker.logChange({
                    param: recommendation.param,

            // State badge component
            const StateBadge = ({ state }) => {

            return (

                        {step === 'config' && (

                                                        </div>
                                                        
                                                        {/* Detailed Evidence Section */}
                                                        <div className="mt-4 border-t border-gray-700 pt-4">
                                                            <div className="text-sm text-gray-400 mb-2">Evidence:</div>
                                                            {primary.evidenceDetails && primary.evidenceDetails.length > 0 ? (
                                                                <div className="space-y-1.5">
                                                                    {primary.evidenceDetails.map((ev, evIdx) => (
                                                                        <div key={evIdx} className="flex items-start gap-2 text-sm">
                                                                            <span className={`flex-shrink-0 ${
                                                                                ev.icon === 'âœ“' ? 'text-green-400' :
                                                                                ev.icon === 'â—‹' ? 'text-yellow-400' :
                                                                                ev.icon === 'â—' ? 'text-blue-400' :
                                                                                'text-gray-500'
                                                                            }`}>{ev.icon}</span>
                                                                            <span className="text-gray-300">{ev.detail}</span>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            ) : (
                                                                <span className="text-gray-400 text-sm">{primary.evidenceSummary}</span>
                                                            )}
                                                        </div>
                                                        
                                                        {primary.compoundEffect?.description && (
                                                            <div className="mt-3 text-sm">
                                                                <span className={`${primary.compoundEffect.warning ? 'text-yellow-400' : 'text-gray-400'}`}>
                                                                    Compound: {primary.compoundEffect.description}
                                                                </span>
                                                            </div>
                                                        )}
                                                        
                                                        <button
                                                            onClick={() => primary.recommendations.forEach(logAppliedChange)}
                                                            className="mt-4 px-4 py-2 bg-green-600/20 hover:bg-green-600/30 text-green-400 border border-green-500/30 rounded-lg text-sm transition-colors"
                                                        >
                                                            Log as Applied
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        );
                                    })()}
                                </div>
                                
                                {/* Watch List */}
                                {(() => {
                                    // Include bundles with recommendations OR special bundles like conflicts and ratio warnings
                                    const watchBundles = bundles.filter(b => 
                                        b.priority === 'REFERENCE' && 
                                        (b.recommendations.length > 0 || b.isSlotConflict || b.isBasalRatioWarning)
                                    );
                                    
                                    if (watchBundles.length === 0) return null;
                                    
                                    return (
                                        <div className="glass-card rounded-2xl p-6">
                                            <h2 className="text-xl font-bold text-white mb-4">Watch List</h2>
                                            <div className="space-y-4">
                                                {watchBundles.map(bundle => (
                                                    <div key={bundle.id} className={`border-l-4 ${
                                                        bundle.isStale ? 'border-l-gray-600 opacity-60' :
                                                        bundle.isSlotConflict ? 'border-l-purple-500' :
                                                        bundle.isBasalRatioWarning ? 'border-l-orange-500' :
                                                        `tier-${bundle.tier}`
                                                    } pl-4 py-2`}>
                                                        <div className="flex items-center justify-between">
                                                            <div className="flex items-center gap-2">
                                                                {/* Recency indicator */}
                                                                <span className={`text-xs ${
                                                                    bundle.hasRecentEvents ? 'text-green-400' :
                                                                    bundle.hasLast3DayEvents ? 'text-yellow-400' :
                                                                    'text-gray-500'
                                                                }`}>
                                                                    {bundle.hasRecentEvents ? 'â—' :
                                                                     bundle.hasLast3DayEvents ? 'â—‹' : 'â—Œ'}
                                                                </span>
                                                                <span className="text-white font-medium">{bundle.name}</span>
                                                                {!bundle.isSlotConflict && !bundle.isBasalRatioWarning && (
                                                                    <TierBadge tier={bundle.tier} />
                                                                )}
                                                                {bundle.isSlotConflict && (
                                                                    <span className="px-2 py-0.5 bg-purple-500/20 text-purple-400 text-xs rounded-full">
                                                                        CONFLICT
                                                                    </span>
                                                                )}
                                                                {bundle.isStale && (
                                                                    <span className="px-2 py-0.5 bg-gray-500/20 text-gray-400 text-xs rounded-full">
                                                                        STALE
                                                                    </span>
                                                                )}
                                                            </div>
                                                            <span className="text-gray-400 text-sm">
                                                                {bundle.isSlotConflict ? 'Hold' : `${(bundle.confidence * 100).toFixed(0)}% confidence`}
                                                            </span>
                                                        </div>
                                                        <p className="text-gray-400 text-sm mt-1">
                                                            {bundle.blockedBy || bundle.evidenceSummary}
                                                        </p>
                                                        {bundle.signalConflict && !bundle.blockedBy?.includes('Signal conflict') && (
                                                            <p className="text-orange-400 text-xs mt-1">
                                                                âš ï¸ {bundle.signalConflict}
                                                            </p>
                                                        )}
                                                        {bundle.recommendations.length > 0 && !bundle.isBasalRatioWarning && (
                                                            <div className="text-xs text-gray-500 font-mono mt-1">
                                                                {bundle.recommendations.map((rec, idx) => (
                                                                    <span key={idx}>
                                                                        {idx > 0 && ' â€¢ '}
                                                                        {rec.scheduleTime} {rec.param}: {rec.currentValue}â†’{rec.newValue}
                                                                    </span>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })()}
                                
                                {/* Signals Summary */}
                                {analysisResults.signalAnalysis && (
                                    <div className="glass-card rounded-2xl p-6">
                                        <h2 className="text-xl font-bold text-white mb-4">Signals Summary</h2>
                                        
                                        {/* Simplified Metrics Display */}
                                        {(analysisResults.insulinPerCarb || analysisResults.carbAdjSensitivity) && (
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4 pb-4 border-b border-gray-700">
                                                {analysisResults.insulinPerCarb && (
                                                    <div className="bg-gray-800/50 rounded-lg p-4">
                                                        <div className="text-gray-400 text-xs mb-1">Insulin per Carb</div>
                                                        <div className="text-white font-bold text-2xl">
                                                            {analysisResults.insulinPerCarb} U/g
                                                        </div>
                                                        <div className="text-gray-500 text-xs mt-2">
                                                            {analysisResults.totalCarbs24h && analysisResults.tdd24h 
                                                                ? `${analysisResults.tdd24h.toFixed(1)}U ÷ ${analysisResults.totalCarbs24h.toFixed(0)}g`
                                                                : 'TDD ÷ Carbs'}
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                <div className="bg-gray-800/50 rounded-lg p-4">
                                                    <div className="text-gray-400 text-xs mb-1">Carb-Adjusted Sensitivity</div>
                                                    <div className={`font-bold text-2xl ${
                                                        analysisResults.carbAdjSensitivity 
                                                            ? parseFloat(analysisResults.carbAdjSensitivity) >= 1.20 ? 'text-blue-300'
                                                            : parseFloat(analysisResults.carbAdjSensitivity) >= 1.10 ? 'text-blue-400'
                                                            : parseFloat(analysisResults.carbAdjSensitivity) >= 1.05 ? 'text-green-300'
                                                            : parseFloat(analysisResults.carbAdjSensitivity) >= 0.90 ? 'text-green-400'
                                                            : parseFloat(analysisResults.carbAdjSensitivity) >= 0.80 ? 'text-yellow-400'
                                                            : 'text-red-400'
                                                            : 'text-gray-500'
                                                    }`}>
                                                        {analysisResults.carbAdjSensitivity || '—'}
                                                    </div>
                                                    <div className="text-gray-500 text-xs mt-2">
                                                        {analysisResults.carbAdjSensitivity 
                                                            ? (() => {
                                                                const val = parseFloat(analysisResults.carbAdjSensitivity);
                                                                const pct = ((val - 1.0) * 100).toFixed(0);
                                                                return val >= 1.0 
                                                                    ? `↑ ${pct}% more sensitive`
                                                                    : `↓ ${Math.abs(pct)}% less sensitive`;
                                                            })()
                                                            : 'Needs 3+ days history'}
                                                    </div>
                                                    {/* Hypo treatment carb breakdown */}
                                                    {analysisResults.estimatedTreatmentCarbs && (
                                                        <div className="mt-2 pt-2 border-t border-gray-700">
                                                            <div className="text-amber-400 text-xs font-medium mb-1">
                                                                ⚡ Carbs adjusted for {analysisResults.hypoTreatmentEvents?.length} hypo treatment{analysisResults.hypoTreatmentEvents?.length !== 1 ? 's' : ''}
                                                            </div>
                                                            <div className="text-gray-500 text-xs">
                                                                {(() => {
                                                                    const logged = (analysisResults.totalCarbs24h || 0) - (analysisResults.estimatedTreatmentCarbs || 0);
                                                                    return `${logged.toFixed(0)}g logged + ${analysisResults.estimatedTreatmentCarbs}g est. treatment`;
                                                                })()}
                                                            </div>
                                                            {analysisResults.hypoTreatmentEvents?.map((evt, i) => (
                                                                <div key={i} className="text-gray-600 text-xs mt-0.5">
                                                                    {`${new Date(evt.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}: ${evt.nadir} mg/dL nadir → ${evt.estimatedCarbs}g`}
                                                                </div>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        )}
                                        
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                            {analysisResults.signalAnalysis.periods.map(period => (
                                                <div key={period.name} className="bg-gray-800/50 rounded-lg p-3">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span className="text-white font-medium text-sm">{period.name}</span>
                                                    </div>
                                                    <div className={`text-lg font-bold font-mono ${
                                                        period.signal === 'HIGH' ? 'text-red-400' :
                                                        period.signal === 'LOW' ? 'text-blue-400' :
                                                        period.signal === 'NEUTRAL' ? 'text-green-400' :
                                                        'text-gray-500'
                                                    }`}>
                                                        {period.medianDeviation !== null 
                                                            ? `${period.medianDeviation >= 0 ? '+' : ''}${period.medianDeviation.toFixed(1)}`
                                                            : 'N/A'
                                                        }
                                                    </div>
                                                    <div className="text-gray-500 text-xs">
                                                        {period.cleanWindowCount} windows
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                

                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Render
        ReactDOM.render(<DailyInsulinReview />, document.getElementById('root'));
    </script>
</body>
</html>

                // Log if we couldn't apply all increments
                if (remaining > 0) {
                    console.log(`Distribution: ${remaining} increments could not be applied (avoiding opposite-signal periods)`);
                }
                
                console.log('Distribution:', {
                    matching: matching.map(p => p.period.name),
                    neutral: neutral.map(p => p.period.name),
                    opposite: opposite.map(p => `${p.period.name} (${p.signalValue > 0 ? 'HIGH' : 'LOW'} - SKIPPED)`),
                    appliedCount: appliedHours.length,
                    requestedCount: Math.abs(incrementsNeeded)
                });
                
                return {
                    schedule,
                    appliedHours,
                    matchingPeriods: matching.map(p => p.period.name),
                    neutralPeriods: neutral.map(p => p.period.name),
                    skippedPeriods: opposite.map(p => p.period.name),
                    incrementsSkipped: remaining
                };
            }
        };

        // =========================================================================
        // OUTPUT FORMATTER
        // =========================================================================
        
        const OutputFormatter = {
            formatForClaude(analysisResults, bodyState, bundles, schedules, config, dynamicTarget = null) {
                const now = new Date();
                const dateStr = now.toLocaleDateString('en-US', { 
                    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'

                // Show override % for OVERRIDE_ACTIVE, days for other states

                    : `Day ${bodyState.daysInState}`;
                output += `**State:** ${this.formatStateName(bodyState.state)} (${stateInfo})\n\n`;
                output += `---\n\n`;

                output += `## Current State\n\n`;

                }
                
                // Basal Ratio Warning

                    output += `- Min: ${analysisResults.basalRatioInfo.minRate} U/hr at ${analysisResults.basalRatioInfo.minHour}\n`;
                    output += `- CR/ISF recommendations have 20% confidence penalty applied.\n\n`;
                }
                
                output += `---\n\n`;

                                           primaryBundle.hasLast3DayEvents ? '○' : '⚠️';

                        const blockTag = primaryBundles.length > 1 ? ` [${primaryBundle.timeBlock}]` : '';
                        
                        output += `### ${primaryBundle.name} ${recencyIcon}${urgentTag}${blockTag}\n\n`;

                        output += `|-----------|---------|-------------|--------|\n`;
                        
                        primaryBundle.recommendations.forEach(rec => {
                            const changeStr = `${rec.changePercent >= 0 ? '+' : ''}${rec.changePercent.toFixed(1)}%`;
                            const protection = rec.protectionLevel !== ProtectionLevel.CLEAR

                                : '';
                            output += `| ${rec.scheduleTime} ${rec.param} | ${rec.currentValue} | ${rec.newValue} | ${changeStr}${protection} |\n`;

                                output += `- ${ev.icon} ${ev.detail}\n`;
                            });

                    referenceBundles.forEach(bundle => {
                        // Add recency indicator to name
                        const recencyIcon = bundle.hasRecentEvents ? '✓' : 
                                           bundle.hasLast3DayEvents ? '○' : '⚠️';
                        output += `### ${recencyIcon} ${bundle.name} (Tier ${bundle.tier})\n`;
                        
                        // Generate appropriate status message
                        let status;
                        if (bundle.blockedBy) {
                            status = bundle.blockedBy;

                                           finding.type === 'basal_ratio_exceeded';
                    
                    // Get event time from finding - try multiple sources (BUG-022: prioritize eventTime)
                    let eventTime = null;
                    if (finding.eventTime) {
                        // New field added to all detectors
                        eventTime = new Date(finding.eventTime);
                    } else if (finding.time) {
                        eventTime = new Date(finding.time);
                    } else if (finding.localTime) {
                        eventTime = new Date(finding.localTime);
                    } else if (finding.events?.[0]) {
                        // Try to get original timestamp from events
                        const event = finding.events[0];
                        const eventTimeStr = event.created_at || event.dateString || event.localTime;
                        if (eventTimeStr) {
                            eventTime = new Date(eventTimeStr);
                        }
                    }
                    
                    // Validate the parsed date
                    if (eventTime && isNaN(eventTime.getTime())) {
                        console.log(`Invalid date for finding ${finding.type}: eventTime=${finding.eventTime}, time=${finding.time}`);
                        eventTime = null;
                    }
                    
                    const hoursAgo = eventTime ? (now - eventTime) / (1000 * 60 * 60) : null;
                    
                    if (!grouped[key]) {
                        grouped[key] = { 
                            ...finding, 
                            similarEventsCount: 1,
                            // Recency tracking
                            eventsLast24h: isAlwaysCurrent ? 1 : (hoursAgo !== null && hoursAgo <= 24 ? 1 : 0),
                            eventsLast3Days: isAlwaysCurrent ? 1 : (hoursAgo !== null && hoursAgo <= 72 ? 1 : 0),
                            mostRecentTime: isAlwaysCurrent ? now : eventTime,
                            hoursSinceMostRecent: isAlwaysCurrent ? 0 : hoursAgo,
                            isStructural: isAlwaysCurrent
                        };
                    } else {
                        grouped[key].similarEventsCount++;
                        grouped[key].events = [...(grouped[key].events || []), ...(finding.events || [])];
                        grouped[key].severity = Math.max(grouped[key].severity, finding.severity);
                        grouped[key].daysWithPattern = (grouped[key].daysWithPattern || 1) + 1;
                        
                        // Update recency tracking (skip for structural findings)
                        if (!isAlwaysCurrent && hoursAgo !== null) {
                            if (hoursAgo <= 24) grouped[key].eventsLast24h++;
                            if (hoursAgo <= 72) grouped[key].eventsLast3Days++;
                            
                            // Track most recent
                            if (!grouped[key].mostRecentTime || eventTime > grouped[key].mostRecentTime) {
                                grouped[key].mostRecentTime = eventTime;
                                grouped[key].hoursSinceMostRecent = hoursAgo;
                            }
                        }
                    }
                });
                
                // Calculate recency tier for each grouped finding
                Object.values(grouped).forEach(finding => {
                    // Structural findings are always current
                    if (finding.isStructural) {
                        finding.recencyTier = 'CURRENT';
                        finding.eventsLast24h = Math.max(1, finding.eventsLast24h);
                        finding.eventsLast3Days = Math.max(1, finding.eventsLast3Days);
                        finding.hoursSinceMostRecent = 0;
                        console.log(`Finding ${finding.type} @ ${finding.scheduleTime}: STRUCTURAL - always current`);
                        return;
                    }
                    
                    const hours = finding.hoursSinceMostRecent;
                    if (hours === null || hours === undefined || isNaN(hours)) {
                        finding.recencyTier = 'UNKNOWN';
                    } else if (hours <= 24) {
                        finding.recencyTier = 'CURRENT';
                    } else if (hours <= 72) {
                        finding.recencyTier = 'RECENT';
                    } else if (hours <= 168) { // 7 days
                        finding.recencyTier = 'STALE';
                    } else {
                        finding.recencyTier = 'EXPIRED';
                    }
                    
                    console.log(`Finding ${finding.type} @ ${finding.scheduleTime}: ${finding.eventsLast24h} last 24h, ${finding.eventsLast3Days} last 3d, hours=${hours?.toFixed(1)}, tier=${finding.recencyTier}`);
                });
                
                return Object.values(grouped);
            };
            
            // Copy for Claude review
            const copyForClaudeReview = async () => {
                if (!analysisResults || !bodyState) return;
                
                const schedules = { cr: crSchedule, isf: isfSchedule, basal: basalSchedule };
                const output = OutputFormatter.formatForClaude(
                    analysisResults,
                    bodyState,
                    bundles,
                    schedules,
                    CONFIG,
                    dynamicTarget // BUG-023: Pass dynamic target info for gap/stale detection display
                );
                
                try {
                    await navigator.clipboard.writeText(output);
                    setCopyStatus('copied');
                    setTimeout(() => setCopyStatus('idle'), 2000);
                } catch (err) {
                    console.error('Copy failed:', err);
                    // Fallback
                    const textarea = document.createElement('textarea');
                    textarea.value = output;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    setCopyStatus('copied');
                    setTimeout(() => setCopyStatus('idle'), 2000);
                }
            };
            
            // Log to Google Sheets
            const logToGoogleSheets = async () => {
                if (!sheetsWebAppUrl) {
                    setLogStatus('error');
                    setLogMessage('Please configure Google Sheets URL first');
                    return;
                }
                
                if (!analysisResults || !analysisResults.signalAnalysis) {
                    setLogStatus('error');
                    setLogMessage('No analysis data to log');
                    return;
                }
                
                setLogStatus('logging');
                setLogMessage('Logging to Google Sheets...');
                
                // Build payload from signal analysis - match v25 format
                const getPeriodDev = (name) => {
                    const period = analysisResults.signalAnalysis.periods.find(p => p.name === name);
                    return period?.medianDeviation !== null && period?.medianDeviation !== undefined 
                        ? period.medianDeviation.toFixed(1) 
                        : '';
                };
                
                // Count clean windows total
                const cleanWindowsTotal = analysisResults.signalAnalysis.periods.reduce(
                    (sum, p) => sum + (p.cleanWindowCount || 0), 0
                );
                
                // Calculate TDD from iAPS deviceStatus
                let tdd = null;
                const nightscoutData = analysisResults.nightscoutData;
                if (nightscoutData?.deviceStatus) {
                    for (let i = 0; i < Math.min(5, nightscoutData.deviceStatus.length); i++) {
                        const status = nightscoutData.deviceStatus[i];
                        if (status.openaps?.enacted?.reason) {
                            const reason = status.openaps.enacted.reason;
                            const twoWeekMatch = reason.match(/2week TDD (\d+\.?\d*)/);
                            if (twoWeekMatch) {
                                tdd = parseFloat(twoWeekMatch[1]);
                                break;
                            }
                            const currentMatch = reason.match(/TDD (\d+\.?\d*)/);
                            if (currentMatch && !tdd) {
                                tdd = parseFloat(currentMatch[1]);
                            }
                        }
                    }
                }
                
                // Use effective target from analysis (BUG-018)
                const targetPercent = analysisResults.effectiveBasalTarget || basalTDDPercent;
                
                // Calculate signal % and gap
                const signalPercent = analysisResults.signalAnalysis.signalOnlyAnchor || targetPercent;
                const gap = signalPercent ? (signalPercent - targetPercent) : 0;
                
                // Calculate final %
                // Logic: Final % = Target % rate-limited to Yesterday's Final % ± 2%
                let finalPercent = targetPercent;
                
                // Apply guardrails (30-50%)
                finalPercent = Math.max(30, Math.min(50, finalPercent));
                
                // Rate limit: max ±2% per day from yesterday's final
                const maxDailyChange = 2.0;
                const yesterdayFinal = dynamicTarget?.yesterdayFinal;
                if (yesterdayFinal !== null && yesterdayFinal !== undefined) {
                    if (finalPercent > yesterdayFinal + maxDailyChange) {
                        finalPercent = yesterdayFinal + maxDailyChange;
                    }
                    if (finalPercent < yesterdayFinal - maxDailyChange) {
                        finalPercent = yesterdayFinal - maxDailyChange;
                    }
                }
                // If no yesterday final, just use target (guardrailed)
                
                // Determine direction based on gap
                let direction = 'none';
                if (gap > 0.5) direction = 'increase';
                else if (gap < -0.5) direction = 'decrease';
                
                // Estimate increments needed
                const incrementsNeeded = Math.round(gap / 0.25);
                
                const payload = {
                    // Date for deduplication
                    date: new Date().toISOString().split('T')[0],
                    timestamp: new Date().toISOString(),
                    analysisWindow: basalSignalWindow,
                    tdd: tdd ? tdd.toFixed(1) : '',
                    signalPercent: signalPercent?.toFixed?.(1) || String(signalPercent) || '',
                    targetPercent: targetPercent,
                    gap: gap.toFixed(1),
                    finalPercent: finalPercent?.toFixed?.(1) || '',
                    cleanWindows: cleanWindowsTotal,
                    deepSleepDev: getPeriodDev('Deep Sleep'),
                    dawnDev: getPeriodDev('Dawn'),
                    morningDev: getPeriodDev('Morning'),
                    afternoonDev: getPeriodDev('Afternoon'),
                    eveningDev: getPeriodDev('Evening'),
                    sleepOnsetDev: getPeriodDev('Sleep Onset'),
                    incrementsApplied: incrementsNeeded,
                    direction: direction,
                    isOverride: bodyState?.state === BodyStateType.OVERRIDE_ACTIVE,
                    notes: loggingNotes || 'Manual'
                };
                
                try {
                    // POST with no-cors for Apps Script compatibility
                    await fetch(sheetsWebAppUrl, {
                        method: 'POST',
                        mode: 'no-cors',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    // no-cors means we can't read response, show optimistic success
                    setLogStatus('success');
                    setLogMessage('Logged successfully!');
                    setLoggingNotes(''); // Clear notes after logging
                    
                    // Reset status after 3 seconds
                    setTimeout(() => {
                        setLogStatus('idle');
                        setLogMessage('');
                    }, 3000);
                    
                } catch (error) {
                    console.error('Failed to log:', error);
                    setLogStatus('error');
                    setLogMessage('Failed to log: ' + error.message);
                }
            };
            
            // Log a change
            const logAppliedChange = (recommendation) => {
                ChangeTracker.logChange({
                    param: recommendation.param,
                    scheduleTime: recommendation.scheduleTime,
                    oldValue: recommendation.currentValue,
                    newValue: recommendation.newValue,

                    source: 'tool_recommendation'

                                                placeholder="token-xxxxx"

                                <div>

                                    <input
                                        type="text"

                                        value={sheetsWebAppUrl}
                                        onChange={(e) => updateSheetsUrl(e.target.value)}
                                        className="w-full bg-gray-800/50 border border-gray-700 rounded-lg px-4 py-2 text-white font-mono text-sm placeholder-gray-500"
                                    />
                                    <p className="text-gray-500 text-xs mt-1">
                                        Create a Google Sheet with our Apps Script to log signal analysis over time.
                                    </p>
                                </div>
                                
                                <div>
                                    <h3 className="text-white font-semibold mb-3">Profile Override</h3>

                                            <input

                                        {userOverride.active && (
                                            <input

                                                onChange={(e) => setUserOverride({ ...userOverride, percent: Number(e.target.value) })}
                                                className="w-20 bg-gray-800/50 border border-gray-700 rounded-lg px-3 py-1 text-white text-center"

                                {/* Run Button */}
                                <button
                                    onClick={runAnalysis}
                                    className="w-full bg-gradient-to-r from-blue-600 to-purple-600 hover:from-blue-500 hover:to-purple-500 text-white font-semibold py-3 rounded-xl transition-all"
                                >
                                    Run Analysis
                                </button>
                            </div>
                        )}
                        
                        {/* Analyzing */}
                        {step === 'analyzing' && (
                            <div className="glass-card rounded-2xl p-12 text-center">
                                <div className="animate-spin w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                                <p className="text-gray-300">Analyzing patterns...</p>

                        {/* Results */}
                        {step === 'results' && analysisResults && bodyState && (
                            <div className="space-y-6">
                                {/* State Banner */}
                                <div className={`glass-card rounded-2xl p-6 border-l-4 ${
                                    bodyState.state === BodyStateType.STABLE ? 'border-l-green-500' :
                                    bodyState.state === BodyStateType.TRANSIENT_RESISTANCE ? 'border-l-red-500' :
                                    bodyState.state === BodyStateType.RECOVERY ? 'border-l-yellow-500' :
                                    'border-l-orange-500'
                                }`}>
                                    <div className="flex items-start justify-between mb-3">
                                        <div>
                                            <h2 className="text-xl font-bold text-white mb-1">Current State</h2>
                                            <StateBadge state={bodyState.state} />
                                        </div>
                                        <span className="text-gray-400 text-sm">
                                            {bodyState.state === BodyStateType.OVERRIDE_ACTIVE 
                                                ? `Override ${bodyState.overridePercent || 100}%`
                                                : `Day ${bodyState.daysInState}`
                                            }
                                        </span>
                                    </div>
                                    <p className="text-gray-300 text-sm mb-3">
                                        {STATE_DESCRIPTIONS[bodyState.state]}
                                    </p>
                                    {bodyState.contributingFactors?.length > 0 && (
                                        <ul className="text-gray-400 text-sm list-disc list-inside">
                                            {bodyState.contributingFactors.map((factor, i) => (
                                                <li key={i}>{factor}</li>
                                            ))}
                                        </ul>
                                    )}
                                    {bodyState.recommendedOverride && (
                                        <div className="mt-4 p-3 bg-blue-500/10 border border-blue-500/30 rounded-lg">
                                            <p className="text-blue-400 font-medium">
                                                Recommended: Apply {bodyState.recommendedOverride}% profile override
                                            </p>
                                        </div>
                                    )}
                                </div>
                                
                                {/* Auto-Log Status Indicator */}
                                {logStatus !== 'idle' && logMessage && (
                                    <div className={`rounded-lg px-4 py-2 text-sm flex items-center gap-2 ${
                                        logStatus === 'success' ? 'bg-green-500/10 border border-green-500/30 text-green-400' :
                                        logStatus === 'error' ? 'bg-red-500/10 border border-red-500/30 text-red-400' :
                                        logStatus === 'info' ? 'bg-blue-500/10 border border-blue-500/30 text-blue-400' :
                                        logStatus === 'logging' ? 'bg-purple-500/10 border border-purple-500/30 text-purple-400' :
                                        'bg-gray-500/10 border border-gray-500/30 text-gray-400'
                                    }`}>
                                        {logStatus === 'logging' && (
                                            <div className="animate-spin w-4 h-4 border-2 border-purple-400 border-t-transparent rounded-full"></div>
                                        )}
                                        {logStatus === 'success' && <span>✓</span>}
                                        {logStatus === 'error' && <span>✗</span>}
                                        {logStatus === 'info' && <span>ℹ️</span>}
                                        <span>{logMessage}</span>

                                )}
                                
                                {/* Dynamic Target Indicator (BUG-018, BUG-023) */}
                                {analysisResults.effectiveTargetSource && (

                                                    'text-gray-400'
                                                }`}>

                                                     analysisResults.effectiveTargetSource === 'signal-fallback' ? '📡 Signal Fallback' :

                                                </span>

                                                {analysisResults.effectiveTargetSource === 'signal-fallback' && (

                                                </div>
                                            )}
                                        </div>
                                        
                                        {/* Show weighted deviation for context */}
                                        {analysisResults.signalAnalysis?.weightedDeviation !== undefined && (
                                            <div className="mt-2 text-xs text-gray-500">
                                                Clean window deviation: {analysisResults.signalAnalysis.weightedDeviation >= 0 ? '+' : ''}
                                                {analysisResults.signalAnalysis.weightedDeviation.toFixed(1)} mg/dL from target
                                            </div>
                                        )}
                                    </div>
                                )}
                                
                                {/* Basal Optimization (BUG-019) */}
                                {analysisResults.basalOptimization && analysisResults.basalOptimization.distribution?.direction !== 'none' && (
                                    <div className="glass-card rounded-2xl p-6">
                                        <div className="flex items-center justify-between mb-2">
                                            <h2 className="text-xl font-bold text-white flex items-center gap-2">
                                                📊 Proposed Basal Schedule
                                            </h2>
                                            <div className="flex items-center gap-3 text-sm">
                                                <span className="text-gray-400">
                                                    {analysisResults.basalOptimization.distribution.currentTotal.toFixed(2)} U →{' '}
                                                    <span className="text-white font-bold">
                                                        {analysisResults.basalOptimization.distribution.proposedTotal.toFixed(2)} U
                                                    </span>
                                                </span>
                                                <span className={`px-2 py-1 rounded text-xs font-medium ${
                                                    analysisResults.basalOptimization.distribution.direction === 'increase' 
                                                        ? 'bg-red-500/20 text-red-400' 
                                                        : 'bg-blue-500/20 text-blue-400'
                                                }`}>
                                                    {analysisResults.basalOptimization.distribution.incrementsNeeded > 0 ? '+' : ''}
                                                    {(analysisResults.basalOptimization.distribution.proposedTotal - analysisResults.basalOptimization.distribution.currentTotal).toFixed(2)} U/day
                                                </span>
                                            </div>
                                        </div>
                                        
                                        {/* Target calculation context */}
                                        {analysisResults.tdd && analysisResults.finalPercent && (
                                            <div className="text-xs text-gray-500 mb-4">
                                                Target: {analysisResults.finalPercent.toFixed(1)}% × {analysisResults.tdd.toFixed(1)} U TDD = {((analysisResults.finalPercent / 100) * analysisResults.tdd).toFixed(2)} U/day
                                            </div>
                                        )}
                                        
                                        {/* Hour-by-hour grid (v25 style) */}
                                        {analysisResults.basalOptimization.hourlyChanges && (
                                            <div className="grid grid-cols-4 md:grid-cols-6 lg:grid-cols-8 gap-1.5 text-xs font-mono">
                                                {analysisResults.basalOptimization.hourlyChanges.map((h, idx) => (
                                                    <div 
                                                        key={idx} 
                                                        className={`p-2 rounded ${h.hasChange 
                                                            ? 'bg-yellow-500/20 border border-yellow-500/50' 
                                                            : 'bg-gray-800/50'}`}
                                                    >
                                                        <div className="text-gray-400 text-center">{h.hour}</div>
                                                        <div className={`text-center ${h.hasChange ? 'text-red-400 line-through text-xs' : 'text-gray-300'}`}>
                                                            {h.current.toFixed(2)}
                                                        </div>
                                                        {h.hasChange && (
                                                            <div className="text-green-400 text-center font-semibold">{h.proposed.toFixed(2)}</div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                        
                                        {/* Distribution info */}
                                        {analysisResults.basalOptimization.distribution?.appliedHours?.length > 0 && (
                                            <div className="mt-4 text-xs text-gray-500">
                                                <span className="text-gray-400">Distribution:</span>{' '}
                                                {analysisResults.basalOptimization.distribution.matchingPeriods?.length > 0 && (
                                                    <span className="text-green-400">
                                                        Signal-aligned: {analysisResults.basalOptimization.distribution.matchingPeriods.join(', ')}
                                                    </span>
                                                )}
                                                {analysisResults.basalOptimization.distribution.neutralPeriods?.length > 0 && (
                                                    <span className="text-gray-400 ml-2">
                                                        | Neutral: {analysisResults.basalOptimization.distribution.neutralPeriods.join(', ')}
                                                    </span>
                                                )}
                                                {analysisResults.basalOptimization.distribution.skippedPeriods?.length > 0 && (
                                                    <span className="text-orange-400 ml-2">
                                                        | Skipped: {analysisResults.basalOptimization.distribution.skippedPeriods.join(', ')}
                                                    </span>
                                                )}
                                            </div>
                                        )}
                                        {analysisResults.basalOptimization.distribution?.incrementsSkipped > 0 && (
                                            <div className="mt-2 text-xs text-orange-400">
                                                ⚠️ {analysisResults.basalOptimization.distribution.incrementsSkipped} increment(s) not applied - avoiding opposite-signal periods
                                            </div>
                                        )}
                                    </div>
                                )}
                                
                                {/* Basal Ratio Warning */}
                                {analysisResults.basalRatioInfo?.exceedsCap && (
                                    <div className="glass-card rounded-2xl p-6 border-l-4 border-l-orange-500 bg-orange-500/5">
                                        <div className="flex items-start gap-3">
                                            <span className="text-2xl">⚠️</span>
                                            <div>
                                                <h3 className="text-orange-400 font-bold mb-2">
                                                    Basal Ratio {analysisResults.basalRatioInfo.ratio.toFixed(1)}:1 Exceeds {analysisResults.basalRatioInfo.cap}:1 Cap
                                                </h3>
                                                <p className="text-gray-300 text-sm mb-2">
                                                    Max {analysisResults.basalRatioInfo.maxRate} U/hr at {analysisResults.basalRatioInfo.maxHour} • 
                                                    Min {analysisResults.basalRatioInfo.minRate} U/hr at {analysisResults.basalRatioInfo.minHour}
                                                </p>
                                                <p className="text-gray-400 text-sm">
                                                    Extreme basal ratios can mask CR/ISF issues. CR/ISF recommendations have 20% confidence penalty applied. 
                                                    Consider normalizing basal ratio first via TDD-neutral redistribution.
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                                
                                {/* Tonight's Action - now supports multiple PRIMARY bundles */}
                                <div className="glass-card rounded-2xl p-6">
                                    <h2 className="text-xl font-bold text-white mb-4">Tonight's Action</h2>
                                    
                                    {(() => {
                                        const primaryBundles = bundles.filter(b => b.priority === 'PRIMARY' && b.recommendations.length > 0);
                                        const blockedSafetyBundles = bundles.filter(b => 
                                            b.tier === Tier.SAFETY && 
                                            b.blockedBy && 
                                            b.recommendations.length > 0
                                        );
                                        
                                        // Case 1: No primary and safety bundles were blocked
                                        if (primaryBundles.length === 0 && blockedSafetyBundles.length > 0) {
                                            return (
                                                <div className="space-y-4">
                                                    <div className="bg-yellow-500/10 border border-yellow-500/30 rounded-lg p-4">
                                                        <p className="text-yellow-400 font-medium mb-2">
                                                            ⚠️ Safety findings detected but all exceed safe compound effect threshold
                                                        </p>
                                                        <p className="text-gray-400 text-sm">
                                                            Address ONE of the following individually instead of applying multiple changes:
                                                        </p>
                                                    </div>
                                                    
                                                    <div className="space-y-3">
                                                        {blockedSafetyBundles.map((bundle, idx) => (
                                                            <div key={bundle.id} className="border-l-4 tier-1 pl-4 py-2 bg-gray-800/30 rounded-r-lg">
                                                                <div className="flex items-center gap-2 mb-1">
                                                                    <span className="text-white font-medium">{bundle.name}</span>
                                                                    <span className="text-gray-500 text-xs">{(bundle.confidence * 100).toFixed(0)}% confidence</span>
                                                                </div>
                                                                {bundle.recommendations.map((rec, recIdx) => (
                                                                    <div key={recIdx} className="text-sm text-gray-400 font-mono">
                                                                        {rec.scheduleTime} {rec.param}: {rec.currentValue} → {rec.newValue}
                                                                        <span className={rec.changePercent < 0 ? 'text-red-400' : 'text-green-400'}>
                                                                            {' '}({rec.changePercent >= 0 ? '+' : ''}{rec.changePercent.toFixed(1)}%)
                                                                        </span>
                                                                    </div>
                                                                ))}
                                                                {bundle.signalConflict && (
                                                                    <p className="text-orange-400 text-xs mt-1">{bundle.signalConflict}</p>
                                                                )}
                                                                <button
                                                                    onClick={() => bundle.recommendations.forEach(logAppliedChange)}
                                                                    className="mt-2 px-3 py-1 bg-green-600/20 hover:bg-green-600/30 text-green-400 border border-green-500/30 rounded text-xs transition-colors"
                                                                >
                                                                    Apply This One
                                                                </button>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            );
                                        }
                                        
                                        // Case 2: No primary and no blocked bundles - truly nothing
                                        if (primaryBundles.length === 0) {
                                            return (
                                                <div className="text-center py-8 text-gray-400">
                                                    <span className="text-4xl mb-2 block">✓</span>
                                                    No action recommended tonight. Continue monitoring.
                                                </div>
                                            );
                                        }
                                        
                                        // Case 3: One or more primary recommendations
                                        return (
                                            <div className="space-y-6">
                                                {/* Summary when multiple actions */}
                                                {primaryBundles.length > 1 && (
                                                    <div className="bg-blue-500/10 border border-blue-500/30 rounded-lg p-4">
                                                        <p className="text-blue-400 font-medium">
                                                            📋 {primaryBundles.length} actions recommended
                                                            {primaryBundles.some(b => b.isUrgent) && (
                                                                <span className="ml-2 text-red-400">
                                                                    ({primaryBundles.filter(b => b.isUrgent).length} urgent)
                                                                </span>
                                                            )}
                                                        </p>
                                                        <p className="text-gray-400 text-sm mt-1">
                                                            Affecting: {[...new Set(primaryBundles.map(b => b.timeBlock))].join(', ')}
                                                        </p>
                                                    </div>
                                                )}
                                                
                                                {primaryBundles.map((primary, bundleIdx) => (
                                                    <div key={primary.id} className={`border-l-4 tier-${primary.tier} pl-4 ${bundleIdx > 0 ? 'pt-4 border-t border-gray-700' : ''}`}>
                                                        <div className="flex items-center gap-3 mb-3 flex-wrap">
                                                            {/* Recency indicator */}
                                                            <span className={`text-sm ${
                                                                primary.hasRecentEvents ? 'text-green-400' :
                                                                primary.hasLast3DayEvents ? 'text-yellow-400' :
                                                                'text-gray-500'
                                                            }`}>
                                                                {primary.hasRecentEvents ? '●' :
                                                                 primary.hasLast3DayEvents ? '○' : '◌'}
                                                            </span>
                                                            <h3 className="text-lg font-semibold text-white">{primary.name}</h3>
                                                            <TierBadge tier={primary.tier} />
                                                            {primary.isUrgent && (
                                                                <span className="px-2 py-0.5 bg-red-500/20 text-red-400 text-xs rounded-full animate-pulse">
                                                                    🚨 URGENT
                                                                </span>
                                                            )}
                                                            {primaryBundles.length > 1 && (
                                                                <span className="px-2 py-0.5 bg-gray-500/20 text-gray-400 text-xs rounded-full">
                                                                    {primary.timeBlock}
                                                                </span>
                                                            )}
                                                            {!primary.hasRecentEvents && !primary.hasLast3DayEvents && (
                                                                <span className="px-2 py-0.5 bg-yellow-500/20 text-yellow-400 text-xs rounded-full">
                                                                    CAUTION: No recent events
                                                                </span>
                                                            )}
                                                        </div>
                                                        
                                                        {primary.urgentReason && (
                                                            <div className="bg-red-500/10 border border-red-500/30 rounded-lg p-3 mb-4">
                                                                <p className="text-red-400 text-sm font-medium">⚠️ {primary.urgentReason}</p>
                                                            </div>
                                                        )}
                                                        
                                                        <p className="text-gray-400 text-sm mb-4">{primary.rootCause}</p>
                                                        
                                                        {primary.signalConflict && (
                                                            <div className="bg-orange-500/10 border border-orange-500/30 rounded-lg p-3 mb-4">
                                                                <p className="text-orange-400 text-sm">{primary.signalConflict}</p>
                                                            </div>
                                                        )}
                                                        
                                                        <div className="overflow-x-auto">
                                                            <table className="w-full text-sm">
                                                                <thead>
                                                                    <tr className="text-gray-400 border-b border-gray-700">
                                                                        <th className="text-left py-2">Parameter</th>
                                                                        <th className="text-right py-2">Current</th>
                                                                        <th className="text-right py-2">Recommended</th>
                                                                        <th className="text-right py-2">Change</th>
                                                                        <th className="text-center py-2">Status</th>
                                                                    </tr>
                                                                </thead>
                                                                <tbody>
                                                                    {primary.recommendations.map((rec, idx) => (
                                                                        <tr key={idx} className="border-b border-gray-700/50">
                                                                            <td className="py-3 text-white font-mono">
                                                                                {rec.scheduleTime} {rec.param}
                                                                            </td>
                                                                            <td className="text-right text-gray-400 font-mono">{rec.currentValue}</td>
                                                                            <td className="text-right text-white font-mono font-bold">{rec.newValue}</td>
                                                                            <td className={`text-right font-mono ${rec.changePercent < 0 ? 'text-red-400' : 'text-green-400'}`}>
                                                                                {rec.changePercent >= 0 ? '+' : ''}{rec.changePercent.toFixed(1)}%
                                                                            </td>
                                                                            <td className="text-center">
                                                                                {ProtectionSystem.getProtectionIcon(rec.protectionLevel)}
                                                                            </td>
                                                                        </tr>
                                                                    ))}
                                                                </tbody>
                                                            </table>
                                                        </div>
                                                        
                                                        {/* Detailed Evidence Section */}
                                                        <div className="mt-4 border-t border-gray-700 pt-4">
                                                            <div className="text-sm text-gray-400 mb-2">Evidence:</div>
                                                            {primary.evidenceDetails && primary.evidenceDetails.length > 0 ? (
                                                                <div className="space-y-1.5">
                                                                    {primary.evidenceDetails.map((ev, evIdx) => (
                                                                        <div key={evIdx} className="flex items-start gap-2 text-sm">
                                                                            <span className={`flex-shrink-0 ${
                                                                                ev.icon === '✓' ? 'text-green-400' :
                                                                                ev.icon === '○' ? 'text-yellow-400' :
                                                                                ev.icon === '●' ? 'text-blue-400' :
                                                                                'text-gray-500'
                                                                            }`}>{ev.icon}</span>
                                                                            <span className="text-gray-300">{ev.detail}</span>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            ) : (
                                                                <span className="text-gray-400 text-sm">{primary.evidenceSummary}</span>
                                                            )}
                                                        </div>
                                                        
                                                        {primary.compoundEffect?.description && (
                                                            <div className="mt-3 text-sm">
                                                                <span className={`${primary.compoundEffect.warning ? 'text-yellow-400' : 'text-gray-400'}`}>
                                                                    Compound: {primary.compoundEffect.description}
                                                                </span>
                                                            </div>
                                                        )}
                                                        
                                                        <button
                                                            onClick={() => primary.recommendations.forEach(logAppliedChange)}
                                                            className="mt-4 px-4 py-2 bg-green-600/20 hover:bg-green-600/30 text-green-400 border border-green-500/30 rounded-lg text-sm transition-colors"
                                                        >
                                                            Log as Applied
                                                        </button>
                                                    </div>
                                                ))}
                                            </div>
                                        );
                                    })()}
                                </div>
                                
                                {/* Watch List */}
                                {(() => {
                                    // Include bundles with recommendations OR special bundles like conflicts and ratio warnings
                                    const watchBundles = bundles.filter(b => 
                                        b.priority === 'REFERENCE' && 
                                        (b.recommendations.length > 0 || b.isSlotConflict || b.isBasalRatioWarning)
                                    );
                                    
                                    if (watchBundles.length === 0) return null;
                                    
                                    return (
                                        <div className="glass-card rounded-2xl p-6">
                                            <h2 className="text-xl font-bold text-white mb-4">Watch List</h2>
                                            <div className="space-y-4">
                                                {watchBundles.map(bundle => (
                                                    <div key={bundle.id} className={`border-l-4 ${
                                                        bundle.isStale ? 'border-l-gray-600 opacity-60' :
                                                        bundle.isSlotConflict ? 'border-l-purple-500' :
                                                        bundle.isBasalRatioWarning ? 'border-l-orange-500' :
                                                        `tier-${bundle.tier}`
                                                    } pl-4 py-2`}>
                                                        <div className="flex items-center justify-between">
                                                            <div className="flex items-center gap-2">
                                                                {/* Recency indicator */}
                                                                <span className={`text-xs ${
                                                                    bundle.hasRecentEvents ? 'text-green-400' :
                                                                    bundle.hasLast3DayEvents ? 'text-yellow-400' :
                                                                    'text-gray-500'
                                                                }`}>
                                                                    {bundle.hasRecentEvents ? '●' :
                                                                     bundle.hasLast3DayEvents ? '○' : '◌'}
                                                                </span>
                                                                <span className="text-white font-medium">{bundle.name}</span>
                                                                {!bundle.isSlotConflict && !bundle.isBasalRatioWarning && (
                                                                    <TierBadge tier={bundle.tier} />
                                                                )}
                                                                {bundle.isSlotConflict && (
                                                                    <span className="px-2 py-0.5 bg-purple-500/20 text-purple-400 text-xs rounded-full">
                                                                        CONFLICT
                                                                    </span>
                                                                )}
                                                                {bundle.isStale && (
                                                                    <span className="px-2 py-0.5 bg-gray-500/20 text-gray-400 text-xs rounded-full">
                                                                        STALE
                                                                    </span>
                                                                )}
                                                            </div>
                                                            <span className="text-gray-400 text-sm">
                                                                {bundle.isSlotConflict ? 'Hold' : `${(bundle.confidence * 100).toFixed(0)}% confidence`}
                                                            </span>
                                                        </div>
                                                        <p className="text-gray-400 text-sm mt-1">
                                                            {bundle.blockedBy || bundle.evidenceSummary}
                                                        </p>
                                                        {bundle.signalConflict && !bundle.blockedBy?.includes('Signal conflict') && (
                                                            <p className="text-orange-400 text-xs mt-1">
                                                                ⚠️ {bundle.signalConflict}
                                                            </p>
                                                        )}
                                                        {bundle.recommendations.length > 0 && !bundle.isBasalRatioWarning && (
                                                            <div className="text-xs text-gray-500 font-mono mt-1">
                                                                {bundle.recommendations.map((rec, idx) => (
                                                                    <span key={idx}>
                                                                        {idx > 0 && ' • '}
                                                                        {rec.scheduleTime} {rec.param}: {rec.currentValue}→{rec.newValue}
                                                                    </span>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    );
                                })()}
                                
                                {/* Signals Summary */}
                                {analysisResults.signalAnalysis && (
                                    <div className="glass-card rounded-2xl p-6">
                                        <h2 className="text-xl font-bold text-white mb-4">Signals Summary</h2>
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                            {analysisResults.signalAnalysis.periods.map(period => (
                                                <div key={period.name} className="bg-gray-800/50 rounded-lg p-3">
                                                    <div className="flex items-center gap-2 mb-1">
                                                        <span>{period.emoji}</span>
                                                        <span className="text-white font-medium text-sm">{period.name}</span>
                                                    </div>
                                                    <div className={`text-lg font-bold font-mono ${
                                                        period.signal === 'HIGH' ? 'text-red-400' :
                                                        period.signal === 'LOW' ? 'text-blue-400' :
                                                        period.signal === 'NEUTRAL' ? 'text-green-400' :
                                                        'text-gray-500'
                                                    }`}>
                                                        {period.medianDeviation !== null 
                                                            ? `${period.medianDeviation >= 0 ? '+' : ''}${period.medianDeviation.toFixed(1)}`
                                                            : 'N/A'
                                                        }
                                                    </div>
                                                    <div className="text-gray-500 text-xs">
                                                        {period.cleanWindowCount} windows
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                
                                {/* Actions */}
                                <div className="glass-card rounded-2xl p-6">
                                    <div className="flex flex-wrap gap-3 mb-4">
                                        <button
                                            onClick={copyForClaudeReview}
                                            className={`flex-1 px-4 py-3 rounded-xl font-medium transition-all ${
                                                copyStatus === 'copied'
                                                    ? 'bg-green-600/20 text-green-400 border border-green-500/30'
                                                    : 'bg-blue-600/20 hover:bg-blue-600/30 text-blue-400 border border-blue-500/30'
                                            }`}
                                        >
                                            {copyStatus === 'copied' ? '✓ Copied!' : '📋 Copy for Claude Review'}
                                        </button>
                                        <button
                                            onClick={() => setStep('config')}
                                            className="px-4 py-3 bg-gray-700/50 hover:bg-gray-700 text-gray-300 rounded-xl transition-colors"
                                        >
                                            ← Back
                                        </button>
                                    </div>
                                    
                                    {/* Google Sheets Logging */}
                                    {sheetsWebAppUrl && (
                                        <div className="border-t border-gray-700 pt-4 mt-4">
                                            <div className="flex items-center gap-3">
                                                <input
                                                    type="text"
                                                    placeholder="Add notes (optional)..."
                                                    value={loggingNotes}
                                                    onChange={(e) => setLoggingNotes(e.target.value)}
                                                    className="flex-1 bg-gray-800/50 border border-gray-700 rounded-lg px-3 py-2 text-white text-sm placeholder-gray-500"
                                                />
                                                <button
                                                    onClick={logToGoogleSheets}
                                                    disabled={logStatus === 'logging'}
                                                    className={`px-4 py-2 rounded-xl font-medium transition-all ${
                                                        logStatus === 'success'
                                                            ? 'bg-green-600/20 text-green-400 border border-green-500/30'
                                                            : logStatus === 'error'
                                                            ? 'bg-red-600/20 text-red-400 border border-red-500/30'
                                                            : logStatus === 'logging'
                                                            ? 'bg-gray-600/20 text-gray-400 border border-gray-500/30 cursor-wait'
                                                            : 'bg-purple-600/20 hover:bg-purple-600/30 text-purple-400 border border-purple-500/30'
                                                    }`}
                                                >
                                                    {logStatus === 'logging' ? '⏳ Logging...' :
                                                     logStatus === 'success' ? '✓ Logged!' :
                                                     logStatus === 'error' ? '✗ Failed' :
                                                     '📊 Log to Sheets'}
                                                </button>
                                            </div>
                                            {logMessage && logStatus === 'error' && (
                                                <p className="text-red-400 text-xs mt-2">{logMessage}</p>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // Render
        ReactDOM.render(<DailyInsulinReview />, document.getElementById('root'));
    </script>
</body>
</html>

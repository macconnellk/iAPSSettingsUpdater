                const oneHourAgo = new Date(smbTime - 1 * 60 * 60 * 1000);
                
                const recentMeals = allTreatments.filter(t => {
                    if (!t.carbs || t.carbs <= 0) return false;
                    if (!t.created_at) return false;
                    const mealTime = new Date(t.created_at);
                    return mealTime >= oneHourAgo && mealTime <= smbTime;
                });
                
                if (recentMeals.length > 0) return false;
                return true;
            }
            
            const treatmentTime = new Date(treatment.created_at);
            const twoMinutesBefore = new Date(treatmentTime - 2 * 60 * 1000);
            const twoMinutesAfter = new Date(treatmentTime + 2 * 60 * 1000);
            
            const nearbyCarbs = allTreatments.filter(t => {
                if (!t.carbs || t.carbs <= 0) return false;
                if (!t.created_at) return false;
                const tTime = new Date(t.created_at);
                return tTime >= twoMinutesBefore && tTime <= twoMinutesAfter;
            });
            
            return nearbyCarbs.length === 0;
        };

        // =========================================================================
        // PATTERN DETECTORS - REFACTORED TO OUTPUT FINDINGS
        // =========================================================================
        
        const PatternDetectors = {
            /**
             * DETECTOR 1b: Transient High with Subsequent Low
             * Priority: 1 (Safety First - More Specific Pattern)
             * Pattern: Meal -> Brief High >180 (<60 min) -> Low (within 3 hours) with NO corrections
             * Conclusion: CR too strong (too much upfront insulin caused brief spike then crash)
             * Output: Finding of type TRANSIENT_HIGH_LOW
             */
            detectTransientHighWithLow(lowProblems, nightscoutData, crSchedule, claimedEvents, analysisWindow) {
                const findings = [];
                
                lowProblems.forEach(low => {
                    const lowId = getEventId(low);
                    if (claimedEvents.lows.has(lowId)) return;
                    
                    const lowTime = new Date(low.localTime || low.time);
                    const fourHoursAgo = new Date(lowTime - 4 * 60 * 60 * 1000);
                    const twentyMinutesAgo = new Date(lowTime - 20 * 60 * 1000);
                    
                    // Find meals in 20min-4hr lookback window
                    const recentMeals = nightscoutData.treatments.filter(t => {
                        if (!t.created_at || !t.carbs || t.carbs < CONFIG.minMealCarbsForAttribution) return false;
                        const tTime = new Date(t.created_at);
                        return tTime >= fourHoursAgo && tTime <= twentyMinutesAgo;
                    });
                    
                    if (recentMeals.length === 0) return;
                    
                    // Check EACH meal for transient high pattern
                    let bestMatch = null;
                    let bestMatchScore = 0;
                    
                    for (const meal of recentMeals) {
                        const mealId = getEventId(meal);
                        if (claimedEvents.meals.has(mealId)) continue;
                        
                        const mealTime = new Date(meal.created_at);
                        
                        // Find BG readings between this meal and the low
                        const bgBetweenMealAndLow = nightscoutData.glucose.filter(reading => {
                            const rTime = new Date(reading.dateString);
                            return rTime > mealTime && rTime < lowTime;
                        });
                        
                        // Check for high readings >180
                        const highReadings = bgBetweenMealAndLow.filter(r => r.sgv > 180);
                        if (highReadings.length === 0) continue; // No high after this meal
                        
                        // Calculate high duration
                        const firstHigh = highReadings.reduce((earliest, r) => {
                            return new Date(r.dateString) < new Date(earliest.dateString) ? r : earliest;
                        });
                        const lastHigh = highReadings.reduce((latest, r) => {
                            return new Date(r.dateString) > new Date(latest.dateString) ? r : latest;
                        });
                        
                        const firstHighTime = new Date(firstHigh.dateString);
                        const lastHighTime = new Date(lastHigh.dateString);
                        const highDurationMinutes = (lastHighTime - firstHighTime) / (1000 * 60);
                        const peakBG = Math.max(...highReadings.map(r => r.sgv));
                        
                        // Check if high was TRANSIENT (<60 minutes)
                        const HIGH_DURATION_THRESHOLD = 60;
                        if (highDurationMinutes >= HIGH_DURATION_THRESHOLD) continue; // Sustained high - not transient
                        
                        // Check if low occurred within 3 hours of high ending
                        const timeFromHighToLowHours = (lowTime - lastHighTime) / (1000 * 60 * 60);
                        const TIME_TO_LOW_THRESHOLD = 3;
                        if (timeFromHighToLowHours > TIME_TO_LOW_THRESHOLD) continue; // Low too far after high
                        
                        // Check for corrections between high and low - if corrections were given, skip
                        // (Let Detector 2 handle correction overcorrection)
                        const correctionsDuringPeriod = nightscoutData.treatments.filter(t => {
                            if (!isTrueCorrection(t, nightscoutData.treatments)) return false;
                            const tTime = new Date(t.created_at);
                            return tTime >= firstHighTime && tTime <= lowTime;
                        });
                        
                        if (correctionsDuringPeriod.length > 0) continue; // Corrections given - not pure meal effect
                        
                        // This meal has the transient high pattern!
                        // Score based on peak BG and timing
                        const score = peakBG + (100 / (timeFromHighToLowHours + 0.1));
                        
                        if (score > bestMatchScore) {
                            bestMatch = {
                                meal: meal,
                                mealId: mealId,
                                highReadings: highReadings,
                                firstHigh: firstHigh,
                                lastHigh: lastHigh,
                                highDurationMinutes: highDurationMinutes,
                                peakBG: peakBG,
                                timeFromHighToLowHours: timeFromHighToLowHours
                            };
                            bestMatchScore = score;
                        }
                    }
                    
                    if (!bestMatch) return;
                    
                    // TRANSIENT HIGH DETECTED!
                    const crEntry = getCRForTime(bestMatch.meal.created_at, crSchedule);
                    
                    // Claim events - claim ALL lows within 15 min window to prevent duplicates
                    claimedEvents.meals.add(bestMatch.mealId);
                    claimedEvents.lows.add(lowId);
                    // Also claim nearby lows (same low event may have multiple CGM readings)
                    const lowTimeMs = new Date(low.localTime || low.time).getTime();
                    lowProblems.forEach(otherLow => {
                        const otherTimeMs = new Date(otherLow.localTime || otherLow.time).getTime();
                        if (Math.abs(otherTimeMs - lowTimeMs) <= 15 * 60 * 1000) {
                            claimedEvents.lows.add(getEventId(otherLow));
                        }
                    });
                    bestMatch.highReadings.forEach(h => {
                        claimedEvents.highs.add(getEventId(h));
                    });
                    
                    // Calculate adjustment based on severity
                    let adjustmentPercent;
                    if (low.bg < 55 || bestMatch.peakBG > 220) {
                        adjustmentPercent = 10; // Severe
                    } else if (low.bg < 65 || bestMatch.peakBG > 200) {
                        adjustmentPercent = 7.5; // Moderate
                    } else {
                        adjustmentPercent = 5; // Minor
                    }
                    
                    const mealTime = new Date(bestMatch.meal.created_at);
                    const period = CIRCADIAN_PERIODS.find(p => {
                        const hour = mealTime.getHours();
                        return hour >= p.startHour && hour < p.endHour;
                    });
                    
                    findings.push({
                        id: `finding_transient_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                        type: FindingType.TRANSIENT_HIGH_LOW,
                        detectedAt: new Date().toISOString(),
                        eventTime: low.localTime || low.time,
                        scheduleTime: crEntry.time,
                        period: period?.name || 'Unknown',
                        severity: low.bg < 55 ? 0.95 : low.bg < 65 ? 0.85 : 0.75,
                        events: [{
                            mealTime: formatTimeForDisplay(bestMatch.meal.created_at),
                            mealCarbs: bestMatch.meal.carbs,
                            peakBG: bestMatch.peakBG,
                            highDuration: bestMatch.highDurationMinutes,
                            lowBG: low.bg,
                            lowTime: formatTimeForDisplay(low.localTime || low.time),
                            timeToLow: bestMatch.timeFromHighToLowHours
                        }],
                        similarEventsCount: 1,
                        daysWithPattern: 1,
                        primaryParameter: 'CR',
                        suggestedChangePercent: adjustmentPercent,
                        contributingFactors: ['strong_cr', 'spike_and_crash'],
                        claimedEventIds: [bestMatch.mealId, lowId, ...bestMatch.highReadings.map(getEventId)],
                        conflictsWith: [],
                        recencyWeight: calculateRecencyWeight(low.localTime || low.time, analysisWindow),
                        details: `Meal at ${formatTimeForDisplay(bestMatch.meal.created_at)} (${bestMatch.meal.carbs}g) → Brief spike to ${bestMatch.peakBG} mg/dL (${bestMatch.highDurationMinutes.toFixed(0)} min) → Crash to ${low.bg} mg/dL (${bestMatch.timeFromHighToLowHours.toFixed(1)}h later). Peak-to-crash pattern indicates excessive upfront insulin.`
                    });
                });
                
                return findings;
            },

            /**
             * DETECTOR 1: Direct Meal-Induced Low
             * Pattern: Meal -> Low (no high >180 between)
             * Output: Finding of type DIRECT_MEAL_LOW
             */
            detectDirectMealLows(lowProblems, nightscoutData, crSchedule, claimedEvents, analysisWindow) {
                const findings = [];
                
                lowProblems.forEach(low => {
                    const lowId = getEventId(low);
                    if (claimedEvents.lows.has(lowId)) return;
                    
                    const lowTime = new Date(low.localTime || low.time);
                    const fourHoursAgo = new Date(lowTime - 4 * 60 * 60 * 1000);
                    const twentyMinutesAgo = new Date(lowTime - 20 * 60 * 1000);
                    
                    const recentMeals = nightscoutData.treatments.filter(t => {
                        if (!t.created_at || !t.carbs || t.carbs < CONFIG.minMealCarbsForAttribution) return false;
                        const tTime = new Date(t.created_at);
                        return tTime >= fourHoursAgo && tTime <= twentyMinutesAgo;
                    });
                    
                    if (recentMeals.length === 0) return;
                    
                    const relevantMeal = recentMeals.reduce((latest, meal) => {
                        const latestTime = new Date(latest.created_at);
                        const mealTime = new Date(meal.created_at);
                        return mealTime > latestTime ? meal : latest;
                    });
                    
                    const mealId = getEventId(relevantMeal);
                    if (claimedEvents.meals.has(mealId)) return;
                    
                    const mealTime = new Date(relevantMeal.created_at);
                    const bgBetweenMealAndLow = nightscoutData.glucose.filter(reading => {
                        const rTime = new Date(reading.dateString);
                        return rTime > mealTime && rTime < lowTime;
                    });
                    
                    const hadHigh = bgBetweenMealAndLow.some(r => r.sgv > 180);
                    if (hadHigh) return;
                    
                    const bgAtMealTime = nightscoutData.glucose.find(reading => {
                        const rTime = new Date(reading.dateString);
                        const timeDiff = Math.abs(rTime - mealTime);
                        return timeDiff < 10 * 60 * 1000;
                    });
                    
                    if (bgAtMealTime && bgAtMealTime.sgv < 80) return;
                    
                    const crEntry = getCRForTime(relevantMeal.created_at, crSchedule);
                    claimedEvents.meals.add(mealId);
                    claimedEvents.lows.add(lowId);
                    // Also claim nearby lows (same low event may have multiple CGM readings)
                    const lowTimeMs = lowTime.getTime();
                    lowProblems.forEach(otherLow => {
                        const otherTimeMs = new Date(otherLow.localTime || otherLow.time).getTime();
                        if (Math.abs(otherTimeMs - lowTimeMs) <= 15 * 60 * 1000) {
                            claimedEvents.lows.add(getEventId(otherLow));
                        }
                    });
                    
                    const lowSeverity = low.bg < 55 ? 0.95 : low.bg < 65 ? 0.85 : 0.75;
                    const adjustmentPercent = low.bg < 55 ? 10 : low.bg < 65 ? 7.5 : 5;
                    
                    const period = CIRCADIAN_PERIODS.find(p => {
                        const hour = mealTime.getHours();
                        return hour >= p.startHour && hour < p.endHour;
                    });
                    
                    findings.push({
                        id: `finding_dml_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                        type: FindingType.DIRECT_MEAL_LOW,
                        detectedAt: new Date().toISOString(),
                        eventTime: low.localTime || low.time, // BUG-022: Store original timestamp
                        scheduleTime: crEntry.time,
                        period: period?.name || 'Unknown',
                        severity: lowSeverity,
                        events: [{
                            time: formatTimeForDisplay(relevantMeal.created_at),
                            mealCarbs: relevantMeal.carbs,
                            lowBG: low.bg,
                            lowTime: formatTimeForDisplay(low.localTime || low.time)
                        }],
                        similarEventsCount: 1,
                        daysWithPattern: 1,
                        primaryParameter: 'CR',
                        suggestedChangePercent: adjustmentPercent,
                        contributingFactors: ['strong_cr'],
                        claimedEventIds: [mealId, lowId],
                        conflictsWith: [],
                        recencyWeight: calculateRecencyWeight(low.localTime || low.time, analysisWindow),
                        details: `Meal at ${formatTimeForDisplay(relevantMeal.created_at)} (${relevantMeal.carbs}g) → Low ${low.bg} mg/dL at ${formatTimeForDisplay(low.localTime || low.time)}. BG stayed <180 between meal and low.`
                    });
                });
                
                return findings;
            },

            /**
             * DETECTOR 2: ISF-Induced Low (Correction Overcorrection)
             * Pattern: HIGH >180 -> Corrections (within 1-3hr) -> Low
             * CRITICAL: Must have a HIGH that corrections were addressing
             * Also checks for meals between correction and low (stacking)
             * Output: Finding of type ISF_INDUCED_LOW
             */
            detectISFInducedLows(lowProblems, nightscoutData, isfSchedule, claimedEvents, analysisWindow) {
                const findings = [];
                
                lowProblems.forEach(low => {
                    const lowId = getEventId(low);
                    // Note: Don't skip claimed lows - allow multiple attributions for stacking
                    
                    const lowTime = new Date(low.localTime || low.time);
                    const threeHoursAgo = new Date(lowTime - 3 * 60 * 60 * 1000);
                    const oneHourAgo = new Date(lowTime - 1 * 60 * 60 * 1000);
                    
                    // Find corrections in 1-3 hour lookback window (v25 used this tighter window)
                    const recentCorrections = nightscoutData.treatments.filter(t => {
                        if (!isTrueCorrection(t, nightscoutData.treatments)) return false;
                        const tTime = new Date(t.created_at);
                        return tTime >= oneHourAgo && tTime < lowTime;
                    });
                    
                    if (recentCorrections.length === 0) return;
                    
                    // Get earliest correction time for high lookup
                    const earliestCorrectionTime = new Date(
                        Math.min(...recentCorrections.map(c => new Date(c.created_at)))
                    );
                    
                    // CRITICAL: Find the HIGH that these corrections were addressing
                    // Look back up to 3 hours before the earliest correction
                    const threeHoursBeforeCorrection = new Date(earliestCorrectionTime - 3 * 60 * 60 * 1000);
                    
                    const bgBeforeCorrections = nightscoutData.glucose.filter(reading => {
                        const rTime = new Date(reading.dateString);
                        return rTime >= threeHoursBeforeCorrection && rTime <= earliestCorrectionTime;
                    });
                    
                    // Check if ANY high >180 occurred within 3 hours BEFORE corrections
                    const highReadings = bgBeforeCorrections.filter(r => r.sgv > 180);
                    
                    if (highReadings.length === 0) {
                        // NO HIGH before correction - this is NOT a correction overcorrection
                        // Skip - likely the tiny correction wasn't addressing a high
                        return;
                    }
                    
                    // Find the last high reading for reporting
                    const lastHighReading = highReadings.reduce((latest, r) => {
                        const latestTime = new Date(latest.dateString);
                        const rTime = new Date(r.dateString);
                        return rTime > latestTime ? r : latest;
                    });
                    
                    // CHECK FOR STACKING: meals between correction and low
                    const mealsBetweenCorrectionAndLow = nightscoutData.treatments.filter(t => {
                        if (!t.created_at || !t.carbs || t.carbs < 15) return false;
                        const tTime = new Date(t.created_at);
                        return tTime > earliestCorrectionTime && tTime < lowTime;
                    });
                    
                    const hasStacking = mealsBetweenCorrectionAndLow.length > 0;
                    
                    // Check BG wasn't already dropping fast before correction
                    const bgBeforeCorrection = nightscoutData.glucose.filter(reading => {
                        const rTime = new Date(reading.dateString);
                        return rTime >= new Date(earliestCorrectionTime - 30 * 60 * 1000) && rTime < earliestCorrectionTime;
                    });
                    
                    if (bgBeforeCorrection.length >= 2) {
                        const sorted = bgBeforeCorrection.sort((a, b) => 
                            new Date(a.dateString) - new Date(b.dateString)
                        );
                        const dropRate = (sorted[0].sgv - sorted[sorted.length - 1].sgv) / 
                            ((new Date(sorted[sorted.length - 1].dateString) - new Date(sorted[0].dateString)) / 60000);
                        
                        if (dropRate > 2) return; // Already dropping fast - not correction's fault
                    }
                    
                    // Claim corrections (but NOT lows - allow multiple attributions)
                    recentCorrections.forEach(c => {
                        claimedEvents.corrections.add(getEventId(c));
                    });
                    highReadings.forEach(h => {
                        claimedEvents.highs.add(getEventId(h));
                    });
                    
                    const totalCorrectionInsulin = recentCorrections.reduce((sum, c) => sum + (c.insulin || 0), 0);
                    const isfEntry = getISFForTime(earliestCorrectionTime.toISOString(), isfSchedule);
                    
                    // Severity and adjustment
                    const lowSeverity = hasStacking ? 
                        (low.bg < 55 ? 0.75 : low.bg < 65 ? 0.65 : 0.55) : // Reduced for stacking
                        (low.bg < 55 ? 0.95 : low.bg < 65 ? 0.85 : 0.75);
                    const adjustmentPercent = low.bg < 55 ? 10 : low.bg < 65 ? 7.5 : 5;
                    
                    const period = CIRCADIAN_PERIODS.find(p => {
                        const hour = earliestCorrectionTime.getHours();
                        return hour >= p.startHour && hour < p.endHour;
                    });
                    
                    // Build details with stacking note if applicable
                    let details = `High ${lastHighReading.sgv} mg/dL at ${formatTimeForDisplay(lastHighReading.dateString)} → ${recentCorrections.length} correction${recentCorrections.length > 1 ? 's' : ''} (${totalCorrectionInsulin.toFixed(2)}U) → Low ${low.bg} mg/dL at ${formatTimeForDisplay(low.localTime || low.time)}.`;
                    
                    if (hasStacking) {
                        details += ` Note: ${mealsBetweenCorrectionAndLow.length} meal(s) between corrections and low may have contributed (insulin stacking).`;
                    }
                    
                    findings.push({
                        id: `finding_isf_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                        type: FindingType.ISF_INDUCED_LOW,
                        detectedAt: new Date().toISOString(),
                        eventTime: low.localTime || low.time,
                        scheduleTime: isfEntry.time,
                        period: period?.name || 'Unknown',
                        severity: lowSeverity,
                        events: [{
                            highBG: lastHighReading.sgv,
                            highTime: formatTimeForDisplay(lastHighReading.dateString),
                            corrections: recentCorrections.length,
                            totalInsulin: totalCorrectionInsulin,
                            lowBG: low.bg,
                            lowTime: formatTimeForDisplay(low.localTime || low.time),
                            hasStacking: hasStacking
                        }],
                        similarEventsCount: 1,
                        daysWithPattern: 1,
                        primaryParameter: 'ISF',
                        suggestedChangePercent: adjustmentPercent,
                        contributingFactors: hasStacking ? ['strong_isf', 'insulin_stacking'] : ['strong_isf'],
                        claimedEventIds: [...recentCorrections.map(getEventId), ...highReadings.map(getEventId)],
                        conflictsWith: [],
                        recencyWeight: calculateRecencyWeight(low.localTime || low.time, analysisWindow),
                        details: details
                    });
                });
                
                return findings;
            },

            /**
             * DETECTOR 3: Post-Meal High with Corrections
             * Pattern: Meal -> High >180 -> Corrections
             * Output: Finding of type POST_MEAL_HIGH
             */
            detectPostMealHighs(nightscoutData, crSchedule, claimedEvents, analysisWindow) {
                const findings = [];
                const analysisStart = new Date(Date.now() - analysisWindow * 24 * 60 * 60 * 1000);
                
                // Helper to get IOB at a specific time
                const getIOBAtTime = (deviceStatus, targetTime) => {
                    if (!deviceStatus || deviceStatus.length === 0) return null;
                    const targetTimestamp = new Date(targetTime).getTime();
                    let closestIOB = null;
                    let minTimeDiff = Infinity;
                    
                    deviceStatus.forEach(status => {
                        if (status.created_at && status.iob !== undefined) {
                            const iobValue = typeof status.iob === 'object' ? status.iob.iob : status.iob;
                            if (typeof iobValue === 'number') {
                                const statusTime = new Date(status.created_at).getTime();
                                const timeDiff = Math.abs(statusTime - targetTimestamp);
                                if (timeDiff < 15 * 60 * 1000 && timeDiff < minTimeDiff) {
                                    minTimeDiff = timeDiff;
                                    closestIOB = iobValue;
                                }
                            }
                        }
                    });
                    return closestIOB;
                };
                
                const meals = nightscoutData.treatments.filter(t => 
                    t.carbs && t.carbs >= CONFIG.minMealCarbsForAttribution && !claimedEvents.meals.has(getEventId(t))
                );
                
                meals.forEach(meal => {
                    const mealId = getEventId(meal);
                    const mealTime = new Date(meal.created_at);
                    
                    if (mealTime < analysisStart) return;
                    
                    const threeHoursAfter = new Date(mealTime.getTime() + 3 * 60 * 60 * 1000);
                    const oneHourAfter = new Date(mealTime.getTime() + 1 * 60 * 60 * 1000);
                    
                    const postMealReadings = nightscoutData.glucose.filter(reading => {
                        const rTime = new Date(reading.dateString);
                        return rTime >= oneHourAfter && rTime <= threeHoursAfter;
                    });
                    
                    if (postMealReadings.length === 0) return;
                    
                    const highReadings = postMealReadings.filter(r => r.sgv > 180);
                    if (highReadings.length === 0) return;
                    
                    const peakReading = highReadings.reduce((max, r) => r.sgv > max.sgv ? r : max);
                    const peakBG = peakReading.sgv;
                    
                    // Check for corrections
                    const correctionsAfterMeal = nightscoutData.treatments.filter(t => {
                        if (!isTrueCorrection(t, nightscoutData.treatments)) return false;
                        const tTime = new Date(t.created_at);
                        return tTime > mealTime && tTime <= threeHoursAfter;
                    });
                    
                    // Get CR entry for calculations
                    const crEntry = getCRForTime(meal.created_at, crSchedule);
                    
                    // ===== REBOUND DETECTION (Enhanced from v25) =====
                    
                    // SIGNAL 1: Meal during low (<80 mg/dL)
                    const bgAtMealTime = nightscoutData.glucose.find(reading => {
                        const rTime = new Date(reading.dateString);
                        const timeDiff = Math.abs(rTime - mealTime);
                        return timeDiff < 10 * 60 * 1000;
                    });
                    const mealDuringLow = bgAtMealTime && bgAtMealTime.sgv < 80;
                    
                    // SIGNAL 2: Underdosing with IOB check (only if BG wasn't low)
                    let isSafetyReduction = false;
                    if (!mealDuringLow && meal.carbs > 0 && crEntry) {
                        const expectedBolus = meal.carbs / crEntry.value;
                        const actualBolus = meal.insulin || 0;
                        const percentGiven = expectedBolus > 0 ? (actualBolus / expectedBolus) * 100 : 100;
                        
                        if (percentGiven < 70) {
                            // Check IOB at meal time
                            const iobAtMealTime = getIOBAtTime(nightscoutData.deviceStatus, mealTime);
                            
                            if (iobAtMealTime !== null && iobAtMealTime > 1.0) {
                                // High IOB explains the reduction - not safety
                                isSafetyReduction = false;
                            } else {
                                // Low/no IOB but still underdosed - safety reduction
                                isSafetyReduction = true;
                            }
                        }
                    }
                    
                    // If EITHER signal present, check for severe low + rebound
                    if (mealDuringLow || isSafetyReduction) {
                        // Check if severe low occurred within 2 hours after meal
                        const twoHoursAfterMeal = new Date(mealTime.getTime() + 2 * 60 * 60 * 1000);
                        const severeLowReadings = nightscoutData.glucose.filter(reading => {
                            const rTime = new Date(reading.dateString);
                            return rTime > mealTime && rTime <= twoHoursAfterMeal && reading.sgv < 55;
                        });
                        
                        if (severeLowReadings.length > 0) {
                            const lowestReading = severeLowReadings.reduce((min, r) => r.sgv < min.sgv ? r : min);
                            
                            // This is a rebound high from severe hypoglycemia - create informational finding
                            findings.push({
                                id: `finding_rebound_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                                type: FindingType.REBOUND_HIGH,
                                detectedAt: new Date().toISOString(),
                                scheduleTime: crEntry?.time || '00:00',
                                period: CIRCADIAN_PERIODS.find(p => {
                                    const hour = mealTime.getHours();
                                    return hour >= p.startHour && hour < p.endHour;
                                })?.name || 'Unknown',
                                severity: 0.3,
                                events: [{
                                    time: formatTimeForDisplay(meal.created_at),
                                    mealCarbs: meal.carbs,
                                    bgAtMeal: bgAtMealTime?.sgv,
                                    severeLow: lowestReading.sgv,
                                    severeLowTime: formatTimeForDisplay(lowestReading.dateString),
                                    peakBG,
                                    pattern: mealDuringLow ? 'meal_during_low' : 'safety_underdose'
                                }],
                                similarEventsCount: 1,
                                daysWithPattern: 1,
                                primaryParameter: null,
                                suggestedChangePercent: 0,
                                contributingFactors: ['hypoglycemia_rebound', 'severe_low'],
                                claimedEventIds: [mealId],
                                conflictsWith: [],
                                recencyWeight: calculateRecencyWeight(meal.created_at, analysisWindow),
                                details: `Meal at ${formatTimeForDisplay(meal.created_at)} (${meal.carbs}g) ${mealDuringLow ? `during low (${bgAtMealTime.sgv} mg/dL)` : 'with safety underdosing'} → Severe low ${lowestReading.sgv} mg/dL → Rebound spike to ${peakBG} mg/dL. This is physiological rebound from hypoglycemia, not weak CR.`
                            });
                            claimedEvents.meals.add(mealId);
                            return; // Skip CR strengthening
                        }
                    }
                    
                    // Simple rebound check (meal during low without severe crash)
                    if (bgAtMealTime && bgAtMealTime.sgv < 70) {
                        findings.push({
                            id: `finding_rebound_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                            type: FindingType.REBOUND_HIGH,
                            detectedAt: new Date().toISOString(),
                            scheduleTime: crEntry?.time || '00:00',
                            period: CIRCADIAN_PERIODS.find(p => {
                                const hour = mealTime.getHours();
                                return hour >= p.startHour && hour < p.endHour;
                            })?.name || 'Unknown',
                            severity: 0.3,
                            events: [{
                                time: formatTimeForDisplay(meal.created_at),
                                mealCarbs: meal.carbs,
                                bgAtMeal: bgAtMealTime.sgv,
                                peakBG
                            }],
                            similarEventsCount: 1,
                            daysWithPattern: 1,
                            primaryParameter: null,
                            suggestedChangePercent: 0,
                            contributingFactors: ['hypoglycemia_rebound'],
                            claimedEventIds: [mealId],
                            conflictsWith: [],
                            recencyWeight: calculateRecencyWeight(meal.created_at, analysisWindow),
                            details: `Meal during low (${bgAtMealTime.sgv} mg/dL) → Rebound high ${peakBG} mg/dL. This is physiological rebound, not weak CR.`
                        });
                        claimedEvents.meals.add(mealId);
                        return;
                    }
                    
                    if (correctionsAfterMeal.length === 0 && peakBG < 220) return;
                    
                    claimedEvents.meals.add(mealId);
                    highReadings.forEach(h => claimedEvents.highs.add(getEventId(h)));
                    correctionsAfterMeal.forEach(c => claimedEvents.corrections.add(getEventId(c)));
                    
                    const adjustmentPercent = peakBG > 250 ? -3 : peakBG > 220 ? -2 : -1;
                    
                    const period = CIRCADIAN_PERIODS.find(p => {
                        const hour = mealTime.getHours();
                        return hour >= p.startHour && hour < p.endHour;
                    });
                    
                    findings.push({
                        id: `finding_pmh_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                        type: FindingType.POST_MEAL_HIGH,
                        detectedAt: new Date().toISOString(),
                        eventTime: meal.created_at, // BUG-022: Store original timestamp
                        scheduleTime: crEntry.time,
                        period: period?.name || 'Unknown',
                        severity: peakBG > 250 ? 0.85 : peakBG > 220 ? 0.7 : 0.55,
                        events: [{
                            time: formatTimeForDisplay(meal.created_at),
                            mealCarbs: meal.carbs,
                            peakBG,
                            peakTime: formatTimeForDisplay(peakReading.dateString),
                            corrections: correctionsAfterMeal.length
                        }],
                        similarEventsCount: 1,
                        daysWithPattern: 1,
                        primaryParameter: 'CR',
                        suggestedChangePercent: adjustmentPercent,
                        contributingFactors: ['weak_cr'],
                        claimedEventIds: [mealId, ...highReadings.map(getEventId), ...correctionsAfterMeal.map(getEventId)],
                        conflictsWith: [],
                        recencyWeight: calculateRecencyWeight(meal.created_at, analysisWindow),
                        details: `Meal at ${formatTimeForDisplay(meal.created_at)} (${meal.carbs}g) → Peak ${peakBG} mg/dL at ${formatTimeForDisplay(peakReading.dateString)}${correctionsAfterMeal.length > 0 ? ` → ${correctionsAfterMeal.length} correction(s)` : ''}.`
                    });
                });
                
                return findings;
            },

            /**
             * DETECTOR 4: Basal Signal Analysis
             * Pattern: Clean windows showing consistent deviation
             * Output: Finding of type BASAL_SIGNAL_HIGH or BASAL_SIGNAL_LOW
             */
            detectBasalSignals(signalAnalysis, basalSchedule, targetPercent, analysisWindow) {
                const findings = [];
                
                if (!signalAnalysis || !signalAnalysis.periods) return findings;
                
                signalAnalysis.periods.forEach(period => {
                    if (!period.hasSufficientData) return;
                    if (period.cleanWindowCount < 5) return;
                    
                    const deviation = period.medianDeviation;
                    if (Math.abs(deviation) < 8) return; // Within acceptable range
                    
                    const type = deviation > 0 ? FindingType.BASAL_SIGNAL_HIGH : FindingType.BASAL_SIGNAL_LOW;
                    // BUG FIX: Correct the sign
                    // BG HIGH (deviation > 0) → need MORE basal → POSITIVE adjustment
                    // BG LOW (deviation < 0) → need LESS basal → NEGATIVE adjustment
                    const adjustmentPercent = deviation > 0 
                        ? Math.min(Math.abs(deviation) * 0.5, 5)     // BG high → increase basal
                        : -Math.min(Math.abs(deviation) * 0.5, 7.5); // BG low → decrease basal
                    
                    // Find schedule time in this period
                    const periodStart = period.startHour || CIRCADIAN_PERIODS.find(p => p.name === period.name)?.startHour || 0;
                    const scheduleTime = `${String(periodStart).padStart(2, '0')}:00`;
                    
                    findings.push({
                        id: `finding_basal_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                        type,
                        detectedAt: new Date().toISOString(),
                        scheduleTime,
                        period: period.name,
                        severity: Math.min(Math.abs(deviation) / 20, 0.95),
                        events: [{
                            period: period.name,
                            cleanWindows: period.cleanWindowCount,
                            medianDeviation: deviation,
                            signal: period.signal || (deviation > 10 ? 'HIGH' : deviation < -10 ? 'LOW' : 'NEUTRAL')
                        }],
                        similarEventsCount: period.cleanWindowCount,
                        daysWithPattern: Math.round(period.cleanWindowCount / 10),
                        primaryParameter: 'basal',
                        suggestedChangePercent: adjustmentPercent,
                        contributingFactors: deviation > 0 ? ['insufficient_basal'] : ['excess_basal'],
                        claimedEventIds: [],
                        conflictsWith: [],
                        recencyWeight: 0.85,
                        details: `${period.name} (${period.hours}): ${period.cleanWindowCount} clean windows show median deviation ${deviation >= 0 ? '+' : ''}${deviation.toFixed(1)} mg/dL from target.`
                    });
                });
                
                return findings;
            },

            /**
             * DETECTOR 5: Unexplained Lows (Regular Lows)
             * Pattern: Lows not attributed to meals or corrections
             * Output: Finding of type UNEXPLAINED_LOW
             */
            detectUnexplainedLows(lowProblems, nightscoutData, basalSchedule, claimedEvents, analysisWindow) {
                const findings = [];
                
                lowProblems.forEach(low => {
                    const lowId = getEventId(low);
                    if (claimedEvents.lows.has(lowId)) return;
                    
                    const lowTime = new Date(low.localTime || low.time);
                    
                    // Check IOB at time of low
                    const iobAtLow = this.getIOBAtTime(nightscoutData.deviceStatus, lowTime);
                    
                    // If IOB is negative or very low, this is a resistant low
                    if (iobAtLow !== null && iobAtLow < 0.2) {
                        const period = CIRCADIAN_PERIODS.find(p => {
                            const hour = lowTime.getHours();
                            return hour >= p.startHour && hour < p.endHour;
                        });
                        
                        findings.push({
                            id: `finding_resistant_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                            type: FindingType.RESISTANT_LOW,
                            detectedAt: new Date().toISOString(),
                            eventTime: low.localTime || low.time, // BUG-022: Store original timestamp
                            scheduleTime: `${String(lowTime.getHours()).padStart(2, '0')}:00`,
                            period: period?.name || 'Unknown',
                            severity: 0.5, // Lower severity - hard to fix
                            events: [{
                                time: formatTimeForDisplay(low.localTime || low.time),
                                lowBG: low.bg,
                                iob: iobAtLow
                            }],
                            similarEventsCount: 1,
                            daysWithPattern: 1,
                            primaryParameter: null, // Not attributable to specific parameter
                            suggestedChangePercent: 0,
                            contributingFactors: ['resistant_low', 'external_factors'],
                            claimedEventIds: [lowId],
                            conflictsWith: [],
                            recencyWeight: calculateRecencyWeight(low.localTime || low.time, analysisWindow),
                            details: `Low ${low.bg} mg/dL at ${formatTimeForDisplay(low.localTime || low.time)} with IOB ${iobAtLow?.toFixed(2) || 'unknown'}U. This is a resistant low (not caused by insulin). Check for activity, alcohol, or other external factors.`
                        });
                        claimedEvents.lows.add(lowId);
                        return;
                    }
                    
                    // Otherwise it's an unexplained low - likely basal issue
                    const basalEntry = getBasalForTime(low.localTime || low.time, basalSchedule);
                    
                    const period = CIRCADIAN_PERIODS.find(p => {
                        const hour = lowTime.getHours();
                        return hour >= p.startHour && hour < p.endHour;
                    });
                    
                    // For basal reduction due to lows, use NEGATIVE percentages (less insulin)
                    // Larger reduction for more severe lows
                    const adjustmentPercent = low.bg < 55 ? -10 : low.bg < 65 ? -7.5 : -5;
                    
                    findings.push({
                        id: `finding_unexplained_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                        type: FindingType.UNEXPLAINED_LOW,
                        detectedAt: new Date().toISOString(),
                        eventTime: low.localTime || low.time, // BUG-022: Store original timestamp
                        scheduleTime: basalEntry.time,
                        period: period?.name || 'Unknown',
                        severity: low.bg < 55 ? 0.9 : low.bg < 65 ? 0.75 : 0.6,
                        events: [{
                            time: formatTimeForDisplay(low.localTime || low.time),
                            lowBG: low.bg,
                            iob: iobAtLow
                        }],
                        similarEventsCount: 1,
                        daysWithPattern: 1,
                        primaryParameter: 'basal',
                        suggestedChangePercent: adjustmentPercent,
                        contributingFactors: ['excess_basal'],
                        claimedEventIds: [lowId],
                        conflictsWith: [],
                        recencyWeight: calculateRecencyWeight(low.localTime || low.time, analysisWindow),
                        details: `Unexplained low ${low.bg} mg/dL at ${formatTimeForDisplay(low.localTime || low.time)}. No recent meals or corrections to attribute. Consider reducing basal at ${basalEntry.time}.`
                    });
                    claimedEvents.lows.add(lowId);
                });
                
                return findings;
            },
            
            getIOBAtTime(deviceStatus, targetTime) {
                if (!deviceStatus || deviceStatus.length === 0) return null;
                
                const targetTimestamp = new Date(targetTime).getTime();
                let closestIOB = null;
                let minTimeDiff = Infinity;
                
                deviceStatus.forEach(status => {
                    if (status.created_at && status.iob && typeof status.iob === 'number') {
                        const statusTime = new Date(status.created_at).getTime();
                        const timeDiff = Math.abs(statusTime - targetTimestamp);
                        
                        if (timeDiff < 10 * 60 * 1000 && timeDiff < minTimeDiff) {
                            minTimeDiff = timeDiff;
                            closestIOB = status.iob;
                        }
                    }
                });
                
                return closestIOB;
            },
            
            /**
             * DETECTOR 6: Correction Ineffectiveness
             * Pattern: Overnight corrections fail to bring BG to target
             * Output: Finding of type CORRECTION_INEFFECTIVE (ISF strengthening)
             */
            detectCorrectionIneffectiveness(nightscoutData, isfSchedule, claimedEvents, analysisWindow, profile) {
                const findings = [];
                const analysisStart = new Date(Date.now() - analysisWindow * 24 * 60 * 60 * 1000);
                
                // Get iAPS target from profile
                let iapsTarget = 100; // Default fallback
                if (profile && profile.store) {
                    const defaultProfile = profile.store[profile.defaultProfile] || Object.values(profile.store)[0];
                    if (defaultProfile) {
                        const targetLow = defaultProfile.target_low?.[0]?.value;
                        const targetHigh = defaultProfile.target_high?.[0]?.value;
                        if (targetLow && targetHigh) {
                            iapsTarget = (targetLow + targetHigh) / 2;
                        } else if (targetLow) {
                            iapsTarget = targetLow;
                        } else if (targetHigh) {
                            iapsTarget = targetHigh;
                        }
                    }
                }
                
                // Also check deviceStatus for dynamic target
                if (nightscoutData.deviceStatus && nightscoutData.deviceStatus.length > 0) {
                    for (const status of nightscoutData.deviceStatus.slice(0, 5)) {
                        if (status.openaps?.suggested?.targetBG) {
                            iapsTarget = status.openaps.suggested.targetBG;
                            break;
                        }
                    }
                }
                
                // Define 2-hour analysis segments for overnight
                const analysisSegments = [
                    { name: 'Late Evening', startHour: 22, endHour: 24, label: '22:00-00:00' },
                    { name: 'Early Night', startHour: 0, endHour: 2, label: '00:00-02:00' },
                    { name: 'Mid Night', startHour: 2, endHour: 4, label: '02:00-04:00' },
                    { name: 'Late Night', startHour: 4, endHour: 6, label: '04:00-06:00' },
                    { name: 'Pre-Breakfast', startHour: 7, endHour: 8, label: '07:00-08:00' }
                ];
                
                const isInSegment = (hour, startHour, endHour) => {
                    return hour >= startHour && hour < endHour;
                };
                
                const getSegmentKey = (readingTime, segment) => {
                    const hour = readingTime.getHours();
                    const date = new Date(readingTime);
                    
                    // For segments after midnight, use previous day as "night of" reference
                    if (segment.startHour < 22 && hour < 12) {
                        date.setDate(date.getDate() - 1);
                    }
                    
                    const nightOfDate = date.toISOString().split('T')[0];
                    return `${nightOfDate}_${segment.label}`;
                };
                
                // Group glucose readings by segment
                const segmentAnalysis = {};
                
                nightscoutData.glucose.forEach(reading => {
                    const readingTime = new Date(reading.dateString);
                    if (readingTime < analysisStart) return;
                    
                    const hour = readingTime.getHours();
                    
                    analysisSegments.forEach(segment => {
                        if (isInSegment(hour, segment.startHour, segment.endHour)) {
                            const key = getSegmentKey(readingTime, segment);
                            if (!segmentAnalysis[key]) {
                                segmentAnalysis[key] = {
                                    segment: segment,
                                    key: key,
                                    readings: [],
                                    corrections: [],
                                    hasLow: false
                                };
                            }
                            segmentAnalysis[key].readings.push(reading);
                            
                            if (reading.sgv <= 70) {
                                segmentAnalysis[key].hasLow = true;
                            }
                        }
                    });
                });
                
                // Add corrections to each segment
                nightscoutData.treatments.forEach(t => {
                    if (!isTrueCorrection(t, nightscoutData.treatments)) return;
                    
                    const tTime = new Date(t.created_at);
                    if (tTime < analysisStart) return;
                    
                    const hour = tTime.getHours();
                    
                    analysisSegments.forEach(segment => {
                        if (isInSegment(hour, segment.startHour, segment.endHour)) {
                            const key = getSegmentKey(tTime, segment);
                            if (segmentAnalysis[key]) {
                                segmentAnalysis[key].corrections.push(t);
                            }
                        }
                    });
                });
                
                // Analyze each segment
                Object.values(segmentAnalysis).forEach(analysis => {
                    const { segment, key, readings, corrections, hasLow } = analysis;
                    
                    // Skip if had a low (not safe to strengthen)
                    if (hasLow) return;
                    
                    // Check for treatment rebound pattern (unannounced carb treatment)
                    // Pattern: Low followed by rapid rise (>2 mg/dL/min) to >130
                    // This indicates the high BG is from treating a low, not weak ISF
                    let hadTreatmentRebound = false;
                    const sortedReadings = [...readings].sort((a, b) => 
                        new Date(a.dateString) - new Date(b.dateString)
                    );
                    
                    for (let i = 0; i < sortedReadings.length - 1; i++) {
                        const reading = sortedReadings[i];
                        if (reading.sgv >= 70) continue; // Not a low
                        
                        // Look for rapid rise in next 30 minutes (next ~6 readings at 5-min intervals)
                        const nextReadings = sortedReadings.slice(i + 1, Math.min(i + 7, sortedReadings.length));
                        if (nextReadings.length === 0) continue;
                        
                        const peakAfterLow = Math.max(...nextReadings.map(r => r.sgv));
                        const minutesElapsed = nextReadings.length * 5; // Approximate
                        const riseRate = (peakAfterLow - reading.sgv) / minutesElapsed; // mg/dL per minute
                        
                        // Fast rise (>2 mg/dL/min) to >130 suggests carb treatment
                        if (riseRate > 2 && peakAfterLow > 130) {
                            hadTreatmentRebound = true;
                            break;
                        }
                    }
                    
                    if (hadTreatmentRebound) {
                        // High BG likely from treating low, not weak ISF
                        return;
                    }
                    
                    // Skip if no corrections
                    if (corrections.length === 0) return;
                    
                    // Skip if insufficient readings
                    if (readings.length < 4) return;
                    
                    // Calculate time spent above target
                    const aboveTarget = readings.filter(r => r.sgv > iapsTarget);
                    const aboveTargetPercent = (aboveTarget.length / readings.length) * 100;
                    const avgBG = readings.reduce((sum, r) => sum + r.sgv, 0) / readings.length;
                    const avgAboveTarget = avgBG - iapsTarget;
                    
                    // Threshold: >60% of time above target
                    if (aboveTargetPercent < 60) return;
                    
                    // Skip if not meaningfully above target
                    if (avgAboveTarget < 5) return;
                    if (avgAboveTarget < 10 && corrections.length < 3) return;
                    
                    // Calculate total correction insulin
                    const totalCorrectionInsulin = corrections.reduce((sum, c) => sum + (c.insulin || 0), 0);
                    
                    // Get ISF for this segment
                    const segmentMidpointHour = (segment.startHour + segment.endHour) / 2;
                    const isfTime = `${Math.floor(segmentMidpointHour).toString().padStart(2, '0')}:00`;
                    const isfEntry = getISFForTime(`2000-01-01T${isfTime}:00`, isfSchedule);
                    
                    // Conservative strengthening (1-3%)
                    let adjustmentPercent;
                    if (avgAboveTarget > 40) {
                        adjustmentPercent = -3;
                    } else if (avgAboveTarget > 25) {
                        adjustmentPercent = -2;
                    } else {
                        adjustmentPercent = -1;
                    }
                    
                    // Build safety note if target is high
                    let targetNote = null;
                    if (iapsTarget > 95) {
                        targetNote = `Your iAPS target is ${iapsTarget} mg/dL. Consider lowering to 90-95 for tighter overnight control before strengthening ISF.`;
                    }
                    
                    const period = CIRCADIAN_PERIODS.find(p => 
                        segmentMidpointHour >= p.startHour && segmentMidpointHour < p.endHour
                    );
                    
                    findings.push({
                        id: `finding_corr_ineff_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
                        type: FindingType.CORRECTION_INEFFECTIVE,
                        detectedAt: new Date().toISOString(),
                        eventTime: corrections[0]?.created_at || new Date().toISOString(), // BUG-022: Store original timestamp
                        scheduleTime: isfEntry.time,
                        period: period?.name || segment.name,
                        severity: 0.7,
                        events: corrections.map(c => ({
                            time: formatTimeForDisplay(c.created_at),
                            insulin: c.insulin
                        })),
                        similarEventsCount: corrections.length,
                        daysWithPattern: 1,
                        primaryParameter: 'ISF',
                        suggestedChangePercent: adjustmentPercent,
                        contributingFactors: ['weak_isf', 'persistent_highs'],
                        claimedEventIds: corrections.map(c => getEventId(c)),
                        conflictsWith: [],
                        recencyWeight: 1.0,
                        details: `${segment.name} (${segment.label}): BG averaged ${avgBG.toFixed(0)} mg/dL, staying above ${iapsTarget} target ${aboveTargetPercent.toFixed(0)}% of the time despite ${corrections.length} corrections (${totalCorrectionInsulin.toFixed(2)}U total).`,
                        safetyNote: targetNote,
                        segmentAnalysis: {
                            segment: segment.name,
                            timeRange: segment.label,
                            avgBG: avgBG,
                            aboveTargetPercent: aboveTargetPercent,
                            iapsTarget: iapsTarget,
                            correctionsCount: corrections.length,
                            totalInsulin: totalCorrectionInsulin
                        }
                    });
                    
                    // Claim corrections
                    corrections.forEach(c => claimedEvents.corrections.add(getEventId(c)));
                });
                
                return findings;
            }
        };

        // =========================================================================
        // SIGNAL ANALYSIS MODULE (PRESERVED FROM v25)
        // =========================================================================
        
        const SignalAnalysis = {
            analyzeCleanWindows(nightscoutData, basalWindow, targetBG = 110, basalSchedule = null, isfSchedule = null, tdd = null) {
                const analysisStart = new Date(Date.now() - basalWindow * 24 * 60 * 60 * 1000);
                
                // Find clean windows (IOB < 0.2, COB = 0)
                const cleanWindows = [];
                
                nightscoutData.glucose.forEach(reading => {
                    const readingTime = new Date(reading.dateString);
                    if (readingTime < analysisStart) return;
                    
                    // Check for IOB at this time
                    const closestStatus = nightscoutData.deviceStatus?.find(status => {
                        if (!status.created_at) return false;
                        const statusTime = new Date(status.created_at);
                        const timeDiff = Math.abs(statusTime - readingTime);
                        return timeDiff < 10 * 60 * 1000;
                    });
                    
                    if (!closestStatus) return;
                    
                    const iob = closestStatus.iob || closestStatus.openaps?.iob?.iob || 0;
                    const cob = closestStatus.cob || closestStatus.openaps?.cob?.cob || 0;
                    
                    if (iob < 0.2 && cob === 0) {
                        cleanWindows.push({
                            time: readingTime,
                            bg: reading.sgv,
                            deviation: reading.sgv - targetBG
                        });
                    }
                });
                
                // Group by period
                const periods = CIRCADIAN_PERIODS.map(period => {
                    const windowsInPeriod = cleanWindows.filter(w => {
                        const hour = w.time.getHours();
                        return hour >= period.startHour && hour < period.endHour;
                    });
                    
                    const hasSufficientData = windowsInPeriod.length >= 5;
                    const deviations = windowsInPeriod.map(w => w.deviation).sort((a, b) => a - b);
                    const medianDeviation = hasSufficientData 
                        ? deviations[Math.floor(deviations.length / 2)]
                        : null;
                    
                    const signal = !hasSufficientData ? 'INSUFFICIENT' :
                        medianDeviation > 10 ? 'HIGH' :
                        medianDeviation < -10 ? 'LOW' : 'NEUTRAL';
                    
                    return {
                        ...period,
                        hours: `${String(period.startHour).padStart(2, '0')}:00-${String(period.endHour).padStart(2, '0')}:00`,
                        cleanWindowCount: windowsInPeriod.length,
                        hasSufficientData,
                        medianDeviation,
                        signal
                    };
                });
                
                // Calculate overall weighted deviation
                const validPeriods = periods.filter(p => p.hasSufficientData);
                const weightedDeviation = validPeriods.length > 0
                    ? validPeriods.reduce((sum, p) => sum + (p.medianDeviation * p.cleanWindowCount), 0) /
                      validPeriods.reduce((sum, p) => sum + p.cleanWindowCount, 0)
                    : 0;
                
                // Calculate signalOnlyAnchor using principled ISF/TDD-based conversion
                let signalOnlyAnchor = null;
                let currentBasalPercent = null;
                let avgISF = null;
                
                if (basalSchedule && isfSchedule && tdd && tdd > 0) {
                    // Calculate current basal % of TDD
                    const totalDailyBasal = basalSchedule.reduce((sum, entry) => sum + entry.value, 0);
                    currentBasalPercent = (totalDailyBasal / tdd) * 100;
                    
                    // Calculate average ISF (weighted by time would be better, but simple average works)
                    avgISF = isfSchedule.reduce((sum, entry) => sum + entry.value, 0) / isfSchedule.length;
                    
                    // Principled conversion:
                    // adjustmentPercent = (deviation * 100) / (avgISF * tdd)
                    // This gives: how much % of TDD would correct this deviation
                    const adjustmentPercent = (weightedDeviation * 100) / (avgISF * tdd);
                    
                    // Signal suggests: current basal % + adjustment needed
                    signalOnlyAnchor = currentBasalPercent + adjustmentPercent;
                    
                    console.log('=== Signal Analysis Debug (Principled) ===');
                    console.log('Current basal % of TDD:', currentBasalPercent.toFixed(2));
                    console.log('Average ISF:', avgISF.toFixed(1));
                    console.log('TDD:', tdd.toFixed(1));
                    console.log('Weighted deviation:', weightedDeviation.toFixed(2), 'mg/dL');
                    console.log('Adjustment %:', adjustmentPercent.toFixed(2));
                    console.log('Signal only anchor:', signalOnlyAnchor.toFixed(2));
                } else {
                    console.log('=== Signal Analysis Debug ===');
                    console.log('Missing data for principled calculation:');
                    console.log('  basalSchedule:', !!basalSchedule);
                    console.log('  isfSchedule:', !!isfSchedule);
                    console.log('  tdd:', tdd);
                    console.log('Weighted deviation:', weightedDeviation.toFixed(2), 'mg/dL');
                }
                
                console.log('Valid periods:', validPeriods.length);
                console.log('Periods:', periods.map(p => ({ name: p.name, windows: p.cleanWindowCount, median: p.medianDeviation, sufficient: p.hasSufficientData })));
                
                return {
                    periods,
                    cleanWindows: { total: cleanWindows.length },
                    signalOnlyAnchor,
                    weightedDeviation,
                    currentBasalPercent,
                    avgISF
                };
            }
        };

        // =========================================================================
        // BASAL OPTIMIZER MODULE
        // Generates hour-by-hour basal schedule recommendations based on Final %
        // and period signals. Ported from v25 BasalSignalModule.
        // =========================================================================
        
        const BasalOptimizer = {
            PUMP_INCREMENT: 0.05, // U/hr minimum pump adjustment
            
            /**
             * Round value to pump increment
             */
            roundToIncrement(value) {
                return Math.round(value / this.PUMP_INCREMENT) * this.PUMP_INCREMENT;
            },
            
            /**
             * Get period for a given hour
             */
            getPeriodForHour(hour) {
                return CIRCADIAN_PERIODS.find(p => hour >= p.startHour && hour < p.endHour);
            },
            
            /**
             * Generate proposed basal schedule based on Final % and period signals
             * 
             * @param {Object} options
             * @param {Array} options.currentBasalSchedule - Current 24-hour basal schedule [{time, value}]
             * @param {Array} options.periodSignals - Period analysis with median deviations
             * @param {Number} options.finalPercent - Rate-limited target % of TDD
             * @param {Number} options.tdd - Total daily dose
             * @returns {Object} Proposed schedule and distribution info
             */
            generateProposedSchedule(options) {
                const {
                    currentBasalSchedule,
                    periodSignals,
                    finalPercent,
                    tdd
                } = options;
                
                if (!currentBasalSchedule || currentBasalSchedule.length === 0 || !tdd || !finalPercent) {
                    console.log('BasalOptimizer: Missing required data');
                    return null;
                }
                
                // Build 24-hour array from schedule
                const currentHourly = this.scheduleToHourlyArray(currentBasalSchedule);
                const currentTotal = currentHourly.reduce((sum, r) => sum + r, 0);
                
                // Calculate target total from Final %
                const targetTotal = (finalPercent / 100) * tdd;
                const difference = targetTotal - currentTotal;
                const incrementsNeeded = Math.round(difference / this.PUMP_INCREMENT);
                
                console.log('=== BasalOptimizer ===');
                console.log('Current total:', currentTotal.toFixed(2), 'U/day');
                console.log('Target total:', targetTotal.toFixed(2), 'U/day (Final %:', finalPercent.toFixed(1) + '%)');
                console.log('Difference:', difference.toFixed(2), 'U (', incrementsNeeded, 'increments)');
                
                if (incrementsNeeded === 0) {
                    return {
                        proposedSchedule: currentBasalSchedule,
                        hourlyChanges: currentBasalSchedule.map(entry => ({
                            hour: entry.time,
                            current: entry.value,
                            proposed: entry.value,
                            change: 0,
                            hasChange: false
                        })),
                        distribution: {
                            incrementsNeeded: 0,
                            direction: 'none',
                            appliedHours: [],
                            currentTotal,
                            proposedTotal: currentTotal
                        }
                    };
                }
                
                // Distribute increments
                const distribution = this.distributeIncrements(
                    currentHourly,
                    periodSignals,
                    incrementsNeeded
                );
                
                // Build proposed schedule
                const proposedSchedule = distribution.schedule.map((value, idx) => ({
                    time: `${idx.toString().padStart(2, '0')}:00`,
                    value: this.roundToIncrement(value)
                }));
                
                // Build hourly changes for display
                const hourlyChanges = proposedSchedule.map((entry, idx) => {
                    const current = currentHourly[idx];
                    const proposed = entry.value;
                    const change = proposed - current;
                    return {
                        hour: entry.time,
                        current: current,
                        proposed: proposed,
                        change: change,
                        hasChange: Math.abs(change) >= 0.001,
                        period: this.getPeriodForHour(idx)?.name
                    };
                });
                
                const proposedTotal = proposedSchedule.reduce((sum, e) => sum + e.value, 0);
                
                console.log('Proposed total:', proposedTotal.toFixed(2), 'U/day');
                console.log('Hours changed:', hourlyChanges.filter(h => h.hasChange).length);
                
                return {
                    proposedSchedule,
                    hourlyChanges,
                    distribution: {
                        incrementsNeeded,
                        direction: incrementsNeeded > 0 ? 'increase' : 'decrease',
                        appliedHours: distribution.appliedHours,
                        matchingPeriods: distribution.matchingPeriods,
                        neutralPeriods: distribution.neutralPeriods,
                        skippedPeriods: distribution.skippedPeriods,
                        incrementsSkipped: distribution.incrementsSkipped || 0,
                        currentTotal,
                        proposedTotal
                    }
                };
            },
            
            /**
             * Convert schedule array to 24-element hourly array
             */
            scheduleToHourlyArray(schedule) {
                const hourly = new Array(24).fill(0);
                
                // Sort by time
                const sorted = [...schedule].sort((a, b) => {
                    const hourA = parseInt(a.time.split(':')[0]);
                    const hourB = parseInt(b.time.split(':')[0]);
                    return hourA - hourB;
                });
                
                // Fill each hour with the appropriate rate
                for (let h = 0; h < 24; h++) {
                    // Find the schedule entry that applies to this hour
                    let rate = sorted[0]?.value || 0;
                    for (const entry of sorted) {
                        const entryHour = parseInt(entry.time.split(':')[0]);
                        if (entryHour <= h) {
                            rate = entry.value;
                        } else {
                            break;
                        }
                    }
                    hourly[h] = rate;
                }
                
                return hourly;
            },
            
            /**
             * Distribute increments across hours, prioritizing periods where
             * signal matches the direction of change needed.
             */
            distributeIncrements(currentHourly, periodSignals, incrementsNeeded) {
                const schedule = [...currentHourly];
                const isDecrease = incrementsNeeded < 0;
                const isIncrease = !isDecrease;
                
                // Build period info with signal direction categorization
                const periodInfo = CIRCADIAN_PERIODS.map(period => {
                    const signal = periodSignals?.find(p => p.name === period.name);
                    const medianDev = signal?.medianDeviation || 0;
                    
                    // Categorize: MATCHING, NEUTRAL, or OPPOSITE
                    let category;
                    if (isIncrease) {
                        // For INCREASE: HIGH is matching, LOW is opposite
                        if (medianDev > 5) category = 'MATCHING';
                        else if (medianDev < -5) category = 'OPPOSITE';
                        else category = 'NEUTRAL';
                    } else {
                        // For DECREASE: LOW is matching, HIGH is opposite
                        if (medianDev < -5) category = 'MATCHING';
                        else if (medianDev > 5) category = 'OPPOSITE';
                        else category = 'NEUTRAL';
                    }
                    
                    return {
                        period,
                        signalValue: medianDev,
                        signalStrength: Math.abs(medianDev),
                        category,
                        hours: []
                    };
                });
                
                // Build spread-ordered hours within each period
                periodInfo.forEach(p => {
                    const hours = [];
                    for (let h = p.period.startHour; h < p.period.endHour; h++) {
                        hours.push(h);
                    }
                    // Interleave: even indices first, then odd (spreads changes)
                    const evens = hours.filter((_, i) => i % 2 === 0);
                    const odds = hours.filter((_, i) => i % 2 === 1);
                    p.hours = [...evens, ...odds];
                });
                
                // Separate into three groups: MATCHING, NEUTRAL, OPPOSITE
                const matching = periodInfo.filter(p => p.category === 'MATCHING');
                const neutral = periodInfo.filter(p => p.category === 'NEUTRAL');
                const opposite = periodInfo.filter(p => p.category === 'OPPOSITE');
                
                // Sort each group by signal strength (strongest first for matching/opposite, weakest first for neutral)
                const sortByStrength = (a, b) => {
                    const strengthDiff = b.signalStrength - a.signalStrength;
                    if (Math.abs(strengthDiff) > 0.1) return strengthDiff;
                    return a.period.startHour - b.period.startHour;
                };
                matching.sort(sortByStrength);
                neutral.sort((a, b) => a.signalStrength - b.signalStrength); // Weakest signal first for neutral
                // Don't sort opposite - we won't use them
                
                // Build spread order: MATCHING first, then NEUTRAL
                // OPPOSITE periods are excluded - don't add insulin where BG is already low (or vice versa)
                const buildGroupOrder = (periods) => {
                    const maxHours = Math.max(...periods.map(p => p.hours.length), 0);
                    const order = [];
                    for (let pass = 0; pass < maxHours; pass++) {
                        for (const p of periods) {
                            if (pass < p.hours.length) {
                                order.push({ hour: p.hours[pass], period: p.period.name });
                            }
                        }
                    }
                    return order;
                };
                
                const matchingOrder = buildGroupOrder(matching);
                const neutralOrder = buildGroupOrder(neutral);
                // Note: opposite periods excluded from spread order
                const spreadOrder = [...matchingOrder, ...neutralOrder];
                
                // Apply increments
                let remaining = Math.abs(incrementsNeeded);
                const delta = isDecrease ? -this.PUMP_INCREMENT : this.PUMP_INCREMENT;
                const appliedHours = [];
                
                for (const { hour, period } of spreadOrder) {
                    if (remaining <= 0) break;
                    const newRate = schedule[hour] + delta;
                    if (newRate >= this.PUMP_INCREMENT) {
                        schedule[hour] = this.roundToIncrement(newRate);
                        remaining--;
                        appliedHours.push({
                            hour,
                            period,
                            delta,
                            newRate: schedule[hour]
                        });
                    }
                }
